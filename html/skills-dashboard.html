<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills 控制台 · 阿珊</title>
<style>
  /* ===== LIGHT THEME ===== */
  :root, [data-theme="light"] {
    --g0: #fdfdfc; --g1: #f8f7f5; --g2: #f0eeea; --g3: #e6e3de;
    --g4: #d4d0c9; --g5: #b8b3aa; --g6: #8b867e; --g7: #5c5852;
    --g8: #3d3a35; --g9: #1e1d1a;
    --blue: #4a8bc2; --blue-bg: #edf4fa;
    --green: #5c9a6b; --green-bg: #eaf4ec;
    --amber: #c4883c; --amber-bg: #faf3e8;
    --rose: #c4726a; --rose-bg: #faf0ee;
    --purple: #8b6dbe; --purple-bg: #f3eefa;
    --star: #e8a840; --star-bg: #fef7e6;
    --topbar-bg: rgba(248,247,245,0.82);
    --copy-flash: #3d3a35;
    --r-sm: 8px; --r: 14px; --r-lg: 20px;
    --sh-xs: 0 1px 2px rgba(0,0,0,0.03);
    --sh-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
    --sh-md: 0 4px 12px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.03);
    --sh-lg: 0 12px 32px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.03);
  }
  /* ===== DARK THEME ===== */
  [data-theme="dark"] {
    --guide-bg: linear-gradient(135deg, #2a2218 0%, #2d2418 50%, #2a2218 100%);
    --guide-border: #4a3a20;
    --guide-title: #d4a843;
    --guide-text: #b8965c;
    --guide-strong: #d4b060;
    --guide-step-bg: #1e1a12;
    --guide-step-border: #5a4a2a;
    --guide-step-text: #c4a850;
    --g0: #1e1d1a; --g1: #242320; --g2: #2d2b27; --g3: #3a3732;
    --g4: #4a4741; --g5: #6b665e; --g6: #8b867e; --g7: #b8b3aa;
    --g8: #d4d0c9; --g9: #f0eeea;
    --blue: #6ba3d4; --blue-bg: #1e2a35;
    --green: #6dab7c; --green-bg: #1e2a22;
    --amber: #d49a4c; --amber-bg: #2d2518;
    --rose: #d4847a; --rose-bg: #2d1e1c;
    --purple: #9b7dce; --purple-bg: #251e2d;
    --star: #e8a840; --star-bg: #2d2518;
    --topbar-bg: rgba(36,35,32,0.85);
    --copy-flash: #f0eeea;
    --sh-xs: 0 1px 2px rgba(0,0,0,0.2);
    --sh-sm: 0 1px 3px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.15);
    --sh-md: 0 4px 12px rgba(0,0,0,0.25), 0 1px 3px rgba(0,0,0,0.15);
    --sh-lg: 0 12px 32px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--g1); color: var(--g8); line-height:1.6;
    -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s;
  }

  /* ===== TOPBAR ===== */
  .topbar {
    position:sticky; top:0; z-index:100;
    background:var(--topbar-bg); backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    border-bottom:1px solid var(--g3); padding:0 24px; transition: background 0.3s;
  }
  .topbar-inner {
    max-width:1320px; margin:0 auto; display:flex; align-items:center;
    height:56px; gap:14px;
  }
  .topbar-logo { font-weight:750; font-size:1.25rem; white-space:nowrap; letter-spacing:-0.02em; }
  .topbar-logo span { color:var(--rose); font-weight:800; }
  .topbar-search { flex:1; max-width:420px; position:relative; }
  .topbar-search input {
    width:100%; padding:8px 14px 8px 36px; border:1px solid var(--g3); border-radius:22px;
    font-size:0.85rem; background:var(--g0); color:var(--g8); outline:none;
    transition:all 0.2s; font-family:inherit;
  }
  .topbar-search input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(74,139,194,0.12); }
  .topbar-search input::placeholder { color:var(--g5); }
  .topbar-search .si {
    position:absolute; left:13px; top:50%; transform:translateY(-50%);
    color:var(--g5); font-size:0.85rem; pointer-events:none;
  }
  .topbar-shortcut {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    font-size:0.65rem; color:var(--g5); background:var(--g2); border-radius:4px;
    padding:2px 6px; font-family:"JetBrains Mono",monospace; pointer-events:none;
  }
  .topbar-actions { display:flex; gap:6px; flex-shrink:0; align-items:center; }
  .tbtn {
    width:34px; height:34px; border:1px solid var(--g3); border-radius:var(--r-sm);
    background:var(--g0); cursor:pointer; font-size:0.95rem; display:flex;
    align-items:center; justify-content:center; transition:all 0.2s; color:var(--g7);
  }
  .tbtn:hover { background:var(--g2); border-color:var(--g4); }
  .tbtn.active-tbtn { background:var(--g8); color:var(--g0); border-color:var(--g8); }
  .fav-count { font-size:0.7rem; background:var(--star); color:#fff; border-radius:10px;
    padding:1px 7px; font-weight:600; display:none; margin-left:-2px; }

  /* ===== CONTAINER ===== */
  .container { max-width:1320px; margin:0 auto; padding:28px 24px 48px; }

  /* ===== HEADER ===== */
  .page-header { margin-bottom:28px; }
  .page-header h1 { font-size:1.8rem; font-weight:750; letter-spacing:-0.025em; margin-bottom:2px; }
  .page-header .subtitle { color:var(--g6); font-size:0.92rem; }

  /* ===== STATS ===== */
  .stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:32px; }

  /* ===== USAGE GUIDE ===== */
  .guide-panel {
    background:var(--guide-bg, linear-gradient(135deg, #fef9f0 0%, #fdf6ec 50%, #fef8f2 100%));
    border:1px solid var(--guide-border, #f0d9a8); border-radius:var(--r);
    padding:18px 22px; margin-bottom:28px;
    box-shadow:0 2px 12px rgba(200,160,80,0.08);
    transition:all 0.3s;
  }
  .guide-panel.collapsed .guide-body { display:none; }
  .guide-panel.collapsed { padding:12px 22px; }
  .guide-header {
    display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none;
  }
  .guide-header h3 { font-size:0.95rem; font-weight:700; color:var(--guide-title, #8b6914); margin:0; }
  .guide-header .guide-toggle { margin-left:auto; font-size:0.75rem; color:var(--guide-title, #b8963c); transition:transform 0.3s; }
  .guide-panel.collapsed .guide-toggle { transform:rotate(-90deg); }
  .guide-body { margin-top:14px; }
  .guide-philosophy { font-size:0.84rem; color:var(--guide-text, #8b7355); margin-bottom:14px; line-height:1.6; }
  .guide-philosophy strong { color:var(--guide-strong, #6b4c1e); }
  .guide-flow {
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  }
  .guide-step {
    display:inline-flex; align-items:center; gap:5px;
    padding:7px 13px; border-radius:20px;
    background:var(--guide-step-bg, #fff); border:1px solid var(--guide-step-border, #e8d5a3);
    font-size:0.82rem; font-weight:550; color:var(--guide-strong, #6b4c1e);
    white-space:nowrap; transition:all 0.2s;
    text-decoration:none;
  }
  .guide-step:hover { background:#fff8e8; border-color:#d4a843; box-shadow:0 2px 8px rgba(200,160,60,0.15); transform:translateY(-1px); }
  .guide-step .step-num {
    display:inline-flex; width:20px; height:20px; border-radius:50%;
    background:linear-gradient(135deg, #d4a843, #c49030);
    color:#fff; font-size:0.68rem; font-weight:700;
    align-items:center; justify-content:center; flex-shrink:0;
  }
  .guide-arrow { color:#d4b060; font-size:0.75rem; flex-shrink:0; }
  .stat-card {
    background:var(--g0); border:1px solid var(--g3); border-radius:var(--r);
    padding:16px 18px; display:flex; align-items:center; gap:12px;
    box-shadow:var(--sh-xs); transition:all 0.25s; cursor:pointer;
  }
  .stat-card:hover { box-shadow:var(--sh-md); transform:translateY(-1px); }
  .stat-icon {
    width:38px; height:38px; border-radius:var(--r-sm); display:flex;
    align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0;
  }
  .stat-info { min-width:0; }
  .stat-value { font-size:1.55rem; font-weight:720; letter-spacing:-0.02em; line-height:1.1; }
  .stat-label { font-size:0.74rem; color:var(--g6); margin-top:1px; }
  .stat-bar-wrap { margin-top:5px; height:3px; background:var(--g2); border-radius:3px; overflow:hidden; }
  .stat-bar-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }

  /* ===== FILTER PILLS ===== */
  .filter-row { display:flex; gap:7px; margin-bottom:32px; flex-wrap:wrap; align-items:center; }
  .pill {
    padding:8px 18px; border:1px solid var(--g3); border-radius:22px; background:var(--g0);
    cursor:pointer; font-size:0.87rem; font-weight:500; transition:all 0.2s;
    white-space:nowrap; font-family:inherit; color:var(--g7);
  }
  .pill:hover { background:var(--g2); }
  .pill.active { background:var(--g8); color:var(--g0); border-color:var(--g8); }
  .pill-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; vertical-align:middle; position:relative; top:-1px; }
  .pill-fav { border-color:var(--star); color:var(--amber); }

  /* ===== CATEGORY ===== */
  .category { margin-bottom:44px; animation:fadeIn 0.4s ease both; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .category-header {
    display:flex; align-items:baseline; gap:8px; margin-bottom:14px;
    position:sticky; top:56px; padding:10px 16px; z-index:10;
    background:var(--topbar-bg); backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--g3); border-radius:var(--r-sm) var(--r-sm) 0 0;
    margin-left:-4px; margin-right:-4px;
  }
  .category-header h2 { font-size:1.3rem; font-weight:700; letter-spacing:-0.01em; }
  .category-count { font-size:0.82rem; color:var(--g6); font-weight:500; }
  .category-toggle {
    margin-left:auto; font-size:0.76rem; color:var(--g5); cursor:pointer;
    border:none; background:none; padding:4px 10px; border-radius:6px;
    transition:all 0.15s; font-family:inherit;
  }
  .category-toggle:hover { color:var(--g7); background:var(--g2); }

  /* ===== CARDS GRID ===== */
  .cards {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));
    gap:12px; transition:all 0.3s;
  }
  /* List mode */
  body.list-mode .cards { grid-template-columns:1fr; max-width:900px; }
  body.list-mode .card { flex-direction:row; }
  body.list-mode .card-inner { flex-direction:row; gap:20px; align-items:flex-start; }
  body.list-mode .card-top { flex-shrink:0; min-width:160px; max-width:200px; margin-bottom:0; }
  body.list-mode .card-desc { flex:1; margin-bottom:0; min-width:200px; }
  body.list-mode .card-trigger { flex:1; margin-bottom:0; max-width:380px; }
  body.list-mode .card-author { flex-shrink:0; align-self:center; margin-bottom:0; }
  body.list-mode .card-link { flex-shrink:0; align-self:center; }
  body.list-mode .card-meta { flex-shrink:0; align-self:center; }

  /* ===== CARD ===== */
  .card {
    background:var(--g0); border:1px solid var(--g3); border-radius:var(--r);
    box-shadow:var(--sh-xs); transition:all 0.25s cubic-bezier(0.16,1,0.3,1);
    position:relative; overflow:hidden; display:flex; flex-direction:column;
    animation:fadeIn 0.4s ease both; cursor:pointer;
  }
  .card:hover { box-shadow:var(--sh-lg); transform:translateY(-2px); border-color:var(--g4); }
  .card-inner { padding:18px 20px; flex:1; display:flex; flex-direction:column; }
  .card-top { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .card-title-group { flex:1; min-width:0; display:flex; flex-direction:column; gap:6px; }
  .card-title-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .card-icon { font-size:1.35rem; line-height:1; flex-shrink:0; margin-top:2px; }
  .card-name { font-weight:700; font-size:1.02rem; flex:1; min-width:0; line-height:1.35; }
  .card-desc { color:var(--g7); font-size:0.9rem; margin-bottom:8px; line-height:1.55; flex:1; }
  .card-author {
    display:inline-flex; align-items:center; gap:5px;
    background:linear-gradient(135deg, #fef3c7, #fde68a);
    color:#92400e; font-size:0.72rem; font-weight:700;
    padding:3px 10px; border-radius:12px;
    margin-bottom:10px; border:1px solid #fcd34d;
    width:fit-content;
  }
  .card-link {
    display:inline-flex; align-items:center; gap:4px;
    padding:6px 14px; background:var(--purple); color:#fff;
    border-radius:8px; text-decoration:none; font-size:0.78rem;
    font-weight:600; width:fit-content; transition:all .15s;
  }
  .card-link:hover { background:#7c3aed; transform:translateY(-1px); }
  .card-trigger {
    background:var(--g1); border:1px solid var(--g2); border-radius:var(--r-sm);
    padding:10px 30px 10px 12px; font-size:0.84rem; color:var(--g7);
    line-height:1.5; margin-bottom:10px; position:relative; cursor:pointer;
    transition: all 0.15s; user-select:none;
  }
  .card-trigger:hover { border-color:var(--g4); background:var(--g2); }
  .card-trigger strong { color:var(--g9); font-weight:600; }
  .card-trigger .copy-btn {
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    width:22px; height:22px; border-radius:4px; border:none; background:transparent;
    cursor:pointer; font-size:0.7rem; color:var(--g5); display:flex;
    align-items:center; justify-content:center; transition:all 0.15s; opacity:0;
  }
  .card-trigger:hover .copy-btn { opacity:1; }
  .card-trigger .copy-btn:hover { background:var(--g3); color:var(--g8); }
  .card-trigger .copy-btn.copied { background:var(--green); color:#fff; }
  .card-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

  /* Star button */
  .star-btn {
    position:absolute; right:10px; top:10px; width:28px; height:28px; border-radius:50%;
    border:none; background:transparent; cursor:pointer; font-size:0.9rem;
    display:flex; align-items:center; justify-content:center; transition:all 0.2s;
    z-index:2; opacity:0; color:var(--g5);
  }
  .card:hover .star-btn { opacity:1; }
  .star-btn:hover { background:var(--star-bg); transform:scale(1.15); }
  .star-btn.starred { opacity:1; color:var(--star); }

  /* Badge */
  .badge {
    display:inline-flex; align-items:center; gap:4px; padding:4px 10px;
    border-radius:18px; font-size:0.73rem; font-weight:550;
  }
  .badge::before { content:""; width:5px; height:5px; border-radius:50%; }
  .badge.ready { background:var(--green-bg); color:var(--green); } .badge.ready::before { background:var(--green); }
  .badge.ghost { background:var(--rose-bg); color:var(--rose); } .badge.ghost::before { background:var(--rose); }
  .badge.file {
    font-size:1.1rem; color:var(--g6); font-weight:480;
    font-family:"JetBrains Mono","SF Mono","Cascadia Code",monospace;
    padding:3px 0; border-radius:0; letter-spacing:-0.01em;
    display:inline-flex; align-items:center; gap:5px;
  }
  .badge.file::before {
    content:"📄"; width:auto; height:auto; border-radius:0;
    font-size:0.82rem; display:inline; background:none;
  }
  .badge.file::before { display:none; }

  /* Color stripe */
  .card::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; transition:width 0.2s; }
  .card:hover::before { width:4px; }
  .card.c-content::before { background:var(--blue); }
  .card.c-self::before { background:var(--amber); }
  .card.c-dev::before { background:var(--green); }
  .card.c-design::before { background:var(--rose); }
  .card.c-tools::before { background:var(--purple); }
  .card.c-empty::before { background:var(--g4); }

  /* Dimmed empty cards */
  .card.is-ghost { opacity:0.6; }
  .card.is-ghost:hover { opacity:0.85; }
  .card.is-ghost .card-name { color:var(--g6); }


  /* ===== BACK-TO-TOP ===== */
  .btt {
    position:fixed; right:28px; bottom:48px; z-index:998;
    width:48px; height:48px; border-radius:50%; border:none;
    background:linear-gradient(135deg, #c4726a 0%, #e8927c 60%, #f0a090 100%);
    color:#fff; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:1.25rem; box-shadow:0 4px 18px rgba(196,114,106,0.45), 0 1px 4px rgba(0,0,0,0.08);
    opacity:0; transform:translateY(16px) scale(0.85); pointer-events:none;
    transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btt.show { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .btt:hover {
    background:linear-gradient(135deg, #b0625a 0%, #d87a6a 60%, #e89080 100%);
    box-shadow:0 6px 28px rgba(196,114,106,0.6), 0 2px 8px rgba(0,0,0,0.12);
    transform:translateY(-4px) scale(1.08);
  }
  .btt:active { transform:translateY(0) scale(0.95); }
  @keyframes bttPulse {
    0%, 100% { box-shadow:0 4px 18px rgba(196,114,106,0.45), 0 1px 4px rgba(0,0,0,0.08); }
    50% { box-shadow:0 4px 28px rgba(196,114,106,0.7), 0 2px 8px rgba(196,114,106,0.3); }
  }
  .btt.show { animation:bttPulse 2.5s ease-in-out infinite; }
  .btt.show:hover { animation:none; }
  /* ===== TOAST ===== */
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--g8); color:var(--g0); padding:10px 22px; border-radius:22px;
    font-size:0.84rem; font-weight:500; z-index:999; pointer-events:none;
    transition:transform 0.3s cubic-bezier(0.16,1,0.3,1); box-shadow:var(--sh-lg);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* ===== NO RESULTS ===== */
  .no-results { text-align:center; padding:80px 20px; color:var(--g5); grid-column:1/-1; }
  .no-results .bi { font-size:3rem; display:block; margin-bottom:14px; }

  /* ===== FOOTER ===== */
  .page-footer {
    text-align:center; color:var(--g5); font-size:0.78rem;
    margin-top:36px; padding-top:22px; border-top:1px solid var(--g3);
  }
  .page-footer strong { color:var(--g7); }
  .page-footer span { margin:0 8px; color:var(--g4); }

  /* ===== RESPONSIVE ===== */
  @media(max-width:900px) {
    .stats-row { grid-template-columns:repeat(3,1fr); }
    .cards { grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); }
    .topbar-shortcut { display:none; }
    body.list-mode .card-inner { flex-direction:column; gap:0; }
    body.list-mode .card-top { max-width:none; min-width:0; }
    body.list-mode .card-trigger { max-width:none; }
  }
  @media(max-width:640px) {
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .cards { grid-template-columns:1fr; }
    .container { padding:18px 12px; }
    .topbar { padding:0 12px; }
    .topbar-logo { font-size:0.85rem; }
    .topbar-search { max-width:none; }
    .filter-row { gap:5px; }
    .pill { padding:6px 12px; font-size:0.78rem; }
    .page-header h1 { font-size:1.3rem; }
  }

  /* ===== DETAIL MODAL ===== */
  .modal-overlay {
    position:fixed; inset:0; z-index:900; background:rgba(0,0,0,0.45);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.25s;
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
  }
  .modal-overlay.open { opacity:1; pointer-events:auto; }
  .modal {
    background:var(--g0); border:1px solid var(--g3); border-radius:var(--r-lg);
    box-shadow:var(--sh-lg); width:min(780px, 92vw); max-height:85vh;
    display:flex; flex-direction:column; overflow:hidden;
    transform:translateY(20px) scale(0.97); transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .modal-overlay.open .modal { transform:translateY(0) scale(1); }
  .modal-header {
    display:flex; align-items:center; gap:12px; padding:20px 24px;
    border-bottom:1px solid var(--g3); flex-shrink:0;
  }
  .modal-header-icon { font-size:1.8rem; line-height:1; }

// ===== FAVORITES (localStorage) =====
const STORAGE_KEY = 'skills_dash_favs';
let favs = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

function saveFavs() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...favs])); }
function toggleFav(skillName) {
  if (favs.has(skillName)) favs.delete(skillName); else favs.add(skillName);
  saveFavs(); renderAll(); updateFavCount();
}
function updateFavCount() {
  const el = document.getElementById('favCount');
  const n = favs.size;
  el.textContent = n;
  el.style.display = n > 0 ? 'inline' : 'none';
}

// ===== STATS =====
function renderStats() {
  const total = skills.length;
  const active = skills.filter(s=>s.s==='active').length;
  const byCat = {}; skills.forEach(s=>{ byCat[s.c]=(byCat[s.c]||0)+1; });
  const defs = [
    { icon:"📦", label:"全部技能", value:total, color:"var(--g7)", bg:"var(--g2)", fill:100, cat:'all' },
    { icon:"✨", label:"可用", value:active, color:"var(--green)", bg:"var(--green-bg)", fill:Math.round(active/total*100), cat:'all' },
    { icon:"📝", label:"内容创作", value:byCat.content||0, color:"var(--blue)", bg:"var(--blue-bg)", fill:Math.round((byCat.content||0)/total*100), cat:'content' },
    { icon:"💻", label:"开发方法", value:byCat.dev||0, color:"var(--green)", bg:"var(--green-bg)", fill:Math.round((byCat.dev||0)/total*100), cat:'dev' },
    { icon:"📱", label:"自媒体", value:byCat.self||0, color:"var(--amber)", bg:"var(--amber-bg)", fill:Math.round((byCat.self||0)/total*100), cat:'self' },
  ];
  document.getElementById('statsRow').innerHTML = defs.map(s=>`
    <div class="stat-card" data-stat-cat="${s.cat}">
      <div class="stat-icon" style="background:${s.bg};color:${s.color}">${s.icon}</div>
      <div class="stat-info">
        <div class="stat-value">${s.value}</div>
        <div class="stat-label">${s.label}</div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${s.fill}%;background:${s.color}"></div></div>
      </div>
    </div>`).join('');
  // Event delegation for stat cards (avoids inline onclick quote hell)
  document.getElementById('statsRow').onclick = function(e) {
    const card = e.target.closest('.stat-card');
    if (!card) return;
    const cat = card.dataset.statCat;
    const btn = document.querySelector('.pill[data-cat="'+cat+'"]');
    if (btn) filterCategory(cat, btn);
  };
}

// ===== RENDER CARDS =====
let currentFilter = 'all';

function renderAll() {
  renderCards();
  renderStats();
  updateFavCount();
  document.getElementById('subtitle').textContent =
    `${skills.length} 个技能目录 · ${skills.filter(s=>s.s==='active').length} 个可用 · 按 5 个类别整理`;
  document.getElementById('footer').innerHTML =
    `<strong>${skills.length}</strong> 个目录<span>·</span><strong>${skills.filter(s=>s.s==='active').length}</strong> 个可用<span>·</span><strong>${skills.filter(s=>s.s==='empty').length}</strong> 个空壳<span>·</span>更新于 2026-07-06<span>·</span>跑在 Claude Code 上`;
}

function renderCards() {
  const query = (document.getElementById('search')?.value || '').toLowerCase();
  let filtered = skills;

  if (currentFilter === 'fav') {
    filtered = skills.filter(s => favs.has(s.n));
  } else if (currentFilter !== 'all') {
    filtered = skills.filter(s => s.c === currentFilter);
  }
  if (query) {
    filtered = filtered.filter(s => {
      const txt = (s.n + s.d + s.t + s.f + (s.a||'')).toLowerCase();
      return txt.includes(query);
    });
  }

  // Group by category
  const groups = {};
  const catOrder = ['content','self','dev','tools','design','empty'];
  filtered.forEach(s => {
    if (!groups[s.c]) groups[s.c] = [];
    groups[s.c].push(s);
  });

  let html = '';
  for (const cat of catOrder) {
    if (!groups[cat]) continue;
    const meta = CAT_META[cat];
    const cardItems = groups[cat].map((s, idx) => {
      const ghost = s.s === 'empty' ? ' is-ghost' : '';
      const starred = favs.has(s.n) ? ' starred' : '';
      return `
      <div class="card ${meta.catClass}${ghost}" data-name="${s.n}" data-cat="${s.c}" data-idx="${idx}" style="animation-delay:${idx*0.015}s">
        <button class="star-btn${starred}" data-action="fav" data-skill="${s.n.replace(/"/g,'&quot;')}" title="${starred?'取消收藏':'收藏'}">${starred?'★':'☆'}</button>
        <div class="card-inner">
          <div class="card-top">
            <span class="card-icon">${s.i}</span>
            <div class="card-title-group">
              <div class="card-title-row">
                <span class="card-name">${s.n}</span>
                <span class="badge ${s.s==='active'?'ready':'ghost'}">${s.s==='active'?'可用':'空壳'}</span>
              </div>
              <span class="badge file">${s.f}</span>
            </div>
          </div>
          <div class="card-desc">${s.d}</div>
          <div class="card-author">👤 ${s.a || '阿珊'}</div>
          ${s.url ? `<a href="${s.url}" target="_blank" class="card-link" onclick="event.stopPropagation()">打开工具 →</a>` : ''}
          <div class="card-trigger" data-action="copy" data-copy="${s.t.replace(/<[^>]*>/g,'').replace(/"/g,'&quot;')}" title="点击复制触发词">
            ${s.t}
            <button class="copy-btn" data-action="copy" data-copy="${s.t.replace(/<[^>]*>/g,'').replace(/"/g,'&quot;')}">📋</button>
          </div>
        </div>
      </div>`;
    });
    const cardsHtml = cardItems.join('');
    const cardCount = cardItems.length;

    html += `
    <div class="category" data-category="${cat}">
      <div class="category-header">
        <h2>${meta.title}</h2>
        <span class="category-count">${cardCount} 个</span>
        <button class="category-toggle" onclick="toggleCategory(this)">收起 ▴</button>
      </div>
      <div class="cards">${cardsHtml}</div>
    </div>`;
  }

  const container = document.getElementById('cardsContainer');
  container.innerHTML = html || `<div class="no-results"><span class="bi">🔎</span><p>没有匹配的技能，试试换个关键词？</p></div>`;

  // Show/hide based on current filter
  if (currentFilter !== 'all' && currentFilter !== 'fav') {
    document.querySelectorAll('.category').forEach(sec => {
      sec.style.display = sec.dataset.category === currentFilter ? '' : 'none';
    });
  }
}

// ===== FILTER =====
function filterCategory(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderCards();
}

// ===== SEARCH =====
function applyFilters() {
  renderCards();
}

// ===== COLLAPSE =====
function toggleCategory(btn) {
  const cards = btn.closest('.category').querySelector('.cards');
  if (cards.style.display === 'none') {
    cards.style.display = '';
    btn.textContent = '收起 ▴';
  } else {
    cards.style.display = 'none';
    btn.textContent = '展开 ▾';
  }
}
function collapseAll() {
  document.querySelectorAll('.category .cards').forEach(c => c.style.display = 'none');
  document.querySelectorAll('.category-toggle').forEach(b => b.textContent = '展开 ▾');
}
function expandAll() {
  document.querySelectorAll('.category .cards').forEach(c => c.style.display = '');
  document.querySelectorAll('.category-toggle').forEach(b => b.textContent = '收起 ▴');
}

// ===== VIEW TOGGLE =====
function setView(mode) {
  if (mode === 'list') {
    document.body.classList.add('list-mode');
    document.getElementById('btnList').classList.add('active-tbtn');
    document.getElementById('btnGrid').classList.remove('active-tbtn');
    localStorage.setItem('skills_dash_view', 'list');
  } else {
    document.body.classList.remove('list-mode');
    document.getElementById('btnGrid').classList.add('active-tbtn');
    document.getElementById('btnList').classList.remove('active-tbtn');
    localStorage.setItem('skills_dash_view', 'grid');
  }
}

// ===== THEME TOGGLE =====
function toggleTheme() {
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('btnTheme').textContent = next === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('skills_dash_theme', next);
}

// ===== EVENT DELEGATION (copy + fav) =====
document.getElementById('cardsContainer').addEventListener('click', function(e) {
  // Handle copy
  const copyEl = e.target.closest('[data-action="copy"]');
  if (copyEl) {
    const text = copyEl.dataset.copy;
    if (!text) return;
    const plain = text.replace(/ · /g, '\n');
    navigator.clipboard.writeText(plain).then(() => {
      if (copyEl.classList.contains('copy-btn')) {
        copyEl.textContent = '✓'; copyEl.classList.add('copied');
        setTimeout(() => { copyEl.textContent = '📋'; copyEl.classList.remove('copied'); }, 1200);
      }
      showToast('已复制触发词 ✓');
    }).catch(() => showToast('复制失败，请手动选择'));
    return;
  }
  // Handle fav
  const favEl = e.target.closest('[data-action="fav"]');
  if (favEl) {
    const skillName = favEl.dataset.skill;
    if (skillName) toggleFav(skillName);
  }
});


// ===== BACK-TO-TOP =====
function scrollToTop() { window.scrollTo({top:0, behavior:"smooth"}); }
window.addEventListener("scroll", function(){
  var b = document.getElementById("btt");
  if (!b) return;
  if (window.scrollY > 500) b.classList.add("show"); else b.classList.remove("show");
});
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), 1800);
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').classList.contains('open')) {
      closeDetail(); return;
    }
    const s = document.getElementById('search');
    s.blur(); s.value = ''; applyFilters();
  }
  // Number keys 1-6 filter categories
  if (!e.target.closest('input') && e.key >= '1' && e.key <= '6') {
    const cats = ['all','content','self','dev','tools','design','empty'];
    const idx = parseInt(e.key)-1;
    const btn = document.querySelector(`.pill[data-cat="${cats[idx]}"]`);
    if (btn) filterCategory(cats[idx], btn);
  }
  // j/k navigate cards
  if (!e.target.closest('input') && (e.key==='j'||e.key==='k')) {
    const visible = [...document.querySelectorAll('.card')].filter(c=>c.style.display!=='none');
    if (!visible.length) return;
    const cur = document.activeElement?.closest('.card');
    let idx = cur ? visible.indexOf(cur) : -1;
    if (e.key==='j') idx = Math.min(idx+1, visible.length-1);
    else idx = Math.max(idx-1, 0);
    visible[idx].focus({preventScroll:false});
  }
});

// ===== DETAIL MODAL =====
function resolveDetailKey(skillF) {
  // Clean up the f field to match SKILL_DETAILS keys
  let key = skillF.trim();
  // Remove parenthetical notes like （软链接）
  key = key.replace(/[（(][^)）]*[)）]/g, '').trim();
  // Handle compound entries (skill-forge · skill-review)
  if (key.includes(' · ')) {
    return key.split(' · ')[0].trim();
  }
  return key;
}

function renderMarkdown(md) {
  if (!md) return '';
  // Escape HTML first
  let html = md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // YAML frontmatter --- ... ---
  html = html.replace(/^---([\s\S]*?)---/, '<div class="md-frontmatter">$1</div>');

  // Code blocks ``` ... ```
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre class="md-code"><code>$2</code></pre>');

  // Inline code `...`
  html = html.replace(/`([^`]+)`/g, '<code class="md-inline">$1</code>');

  // Headings
  html = html.replace(/^#### (.+)$/gm, '<h5 class="md-h5">$1</h5>');
  html = html.replace(/^### (.+)$/gm, '<h4 class="md-h4">$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3 class="md-h3">$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2 class="md-h2">$1</h2>');

  // Bold / Italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/_(.+?)_/g, '<em>$1</em>');

  // Horizontal rule --- or ***
  html = html.replace(/^(---|\*\*\*)$/gm, '<hr class="md-hr">');

  // Tables (simple: | a | b |)
  html = html.replace(/^\|(.+)\|$/gm, function(line) {
    var cells = line.replace(/^\||\|$/g, '').split('|');
    var isSep = cells.every(function(c) { return /^[\s:-]+$/.test(c); });
    if (isSep) return '<!-- table-sep -->';
    var tds = cells.map(function(c) { return '<td>' + c.trim() + '</td>'; }).join('');
    return '<tr>' + tds + '</tr>';
  });
  // Wrap consecutive <tr>s in <table>
  html = html.replace(/((?:(?:<tr>.*?<\/tr>|<!-- table-sep -->)\s*)+)/g, function(m) {
    return '<table class="md-table">' + m.replace(/<!-- table-sep -->\s*/g, '') + '</table>';
  });

  // Unordered lists
  html = html.replace(/^(\s*)[-*] (.+)$/gm, '<li>$2</li>');
  html = html.replace(/((?:<li>.*?<\/li>\s*)+)/g, '<ul class="md-ul">$1</ul>');

  // Line breaks
  html = html.replace(/\n\n/g, '<br><br>');
  html = html.replace(/\n/g, '<br>');

  return html;
}

function openDetail(skill) {
  const overlay = document.getElementById('modalOverlay');
  const lookupKey = resolveDetailKey(skill.f);
  let detail = (typeof SKILL_DETAILS !== 'undefined') ? SKILL_DETAILS[lookupKey] : null;

  // Set header
  document.getElementById('modalIcon').textContent = skill.i;
  document.getElementById('modalName').textContent = skill.n;
  document.getElementById('modalPath').textContent = detail ? detail.path : skill.f;

  // Build body
  let html = '';

  // Trigger phrases
  html += '<div class="modal-section">';
  html += '<div class="modal-section-title">💬 触发词</div>';
  html += '<div class="detail-trigger-box"><div class="tt">' + skill.t + '</div></div>';
  html += '</div>';

  if (detail) {
    // Description
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title">📝 简介</div>';
    html += '<div class="detail-meta">' + skill.d + '</div>';
    html += '</div>';

    // Meta info
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title">📊 统计</div>';
    html += '<div class="detail-meta">';
    html += '<span class="detail-meta-item">📁 目录 <strong>' + detail.path + '</strong></span>';
    html += '<span class="detail-meta-item">📄 ' + detail.totalFiles + ' 个文件</span>';
    if (detail.hasSkillMd) html += '<span class="detail-meta-item">✅ 有 SKILL.md</span>';
    else html += '<span class="detail-meta-item">⚠️ 无 SKILL.md</span>';
    html += '</div></div>';

    // Subdirectories
    if (detail.subdirs && detail.subdirs.length > 0) {
      html += '<div class="modal-section">';
      html += '<div class="modal-section-title">📂 子目录 (' + detail.subdirs.length + ')</div>';
      html += '<div>' + detail.subdirs.map(d => '<span class="detail-subdir">📁 ' + d + '</span>').join('') + '</div>';
      html += '</div>';
    }

    // Files
    if (detail.files && detail.files.length > 0) {
      html += '<div class="modal-section">';
      html += '<div class="modal-section-title">📄 文件列表</div>';
      html += '<div class="detail-files">';
      html += detail.files.map(f => {
        let cls = '', icon = '📄';
        if (f.endsWith('.md')) { cls = ' is-md'; icon = '📝'; }
        else if (f.endsWith('.py')) { icon = '🐍'; }
        else if (f.endsWith('.js')||f.endsWith('.ts')||f.endsWith('.mjs')) { icon = '🟨'; }
        else if (f.endsWith('.html')) { icon = '🌐'; }
        else if (f.endsWith('.css')) { icon = '🎨'; }
        else if (f.endsWith('.json')) { icon = '📋'; }
        else if (f.endsWith('.sh')) { icon = '💻'; }
        return '<span class="detail-file' + cls + '"><span class="fi">' + icon + '</span>' + f + '</span>';
      }).join('') + '</div></div>';
    }

    // SKILL.md excerpt
    if (detail.hasSkillMd && detail.excerpt) {
      html += '<div class="modal-section">';
      html += '<div class="modal-section-title">📖 SKILL.md 预览</div>';
      html += '<div class="detail-excerpt">' + renderMarkdown(detail.excerpt) + '</div>';
      html += '</div>';
    }
  } else {
    // No detail found
    html += '<div class="detail-empty">';
    html += '<span class="detail-empty-icon">📦</span>';
    html += '<p>暂无详细目录信息</p>';
    html += '<p style="font-size:0.78rem;color:var(--g5);margin-top:4px">查找键: ' + lookupKey + '</p>';
    html += '</div>';
  }

  document.getElementById('modalBody').innerHTML = html;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// Add card click to open detail (delegate on container)
document.getElementById('cardsContainer').addEventListener('click', function(e) {
  // Don't open detail if clicking copy button, fav button, or trigger text
  if (e.target.closest('[data-action="copy"]') || e.target.closest('[data-action="fav"]')) return;
  const card = e.target.closest('.card');
  if (!card) return;
  const skillName = card.dataset.name;
  const skill = skills.find(s => s.n === skillName);
  if (skill) openDetail(skill);
});

// ===== INIT =====
(function init() {
  // Restore theme
  const saved = localStorage.getItem('skills_dash_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('btnTheme').textContent = saved === 'dark' ? '☀️' : '🌙';

  // Restore view
  const view = localStorage.getItem('skills_dash_view') || 'grid';
  setView(view);

  renderAll();
  updateFavCount();
})();
</script>
