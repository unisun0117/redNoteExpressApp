<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeamPulse — 团队成员管理系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap');

:root {
  --bg:#f8f9fb; --card:#fff; --border:#e4e7ed; --text:#1e293b; --muted:#94a3b8;
  --indigo:#4f46e5; --indigo-dark:#4338ca; --indigo-light:#eef2ff;
  --amber:#f59e0b; --amber-light:#fffbeb;
  --success:#10b981; --warn:#f59e0b; --danger:#ef4444; --slate:#64748b;
  --radius:14px; --shadow:0 1px 3px rgba(0,0,0,.03); --shadow-lg:0 8px 24px rgba(79,70,229,.06),0 2px 6px rgba(0,0,0,.03);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}

.app{display:flex;min-height:100vh;}
.sidebar{width:210px;background:var(--card);border-right:1px solid var(--border);flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;z-index:10;}
.side-logo{padding:18px 16px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:#1e293b;border-bottom:1px solid #f1f5f9;}
.side-logo span{width:30px;height:30px;background:var(--indigo);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0;font-weight:800;}
.nav-sec{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:14px 16px 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:2px 10px;border-radius:7px;font-size:13px;font-weight:500;color:var(--slate);cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 20px);text-align:left;}
.nav-item:hover{background:#f1f5f9;color:#334155;}
.nav-item.active{background:var(--indigo-light);color:var(--indigo);font-weight:600;}
.nav-item svg{width:15px;height:15px;flex-shrink:0;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:5;}
.top-title{font-size:14px;font-weight:600;color:#1e293b;}
.top-sub{font-size:10px;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:.4px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--indigo);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;}
.content{padding:20px 24px;flex:1;overflow-y:auto;}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);transition:box-shadow .25s;}
.card:hover{box-shadow:var(--shadow-lg);}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-hd h3{font-size:13px;font-weight:600;color:#334155;}

.btn{font-size:11px;font-weight:500;padding:6px 12px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:var(--indigo);color:#fff;}
.btn-p:hover{background:var(--indigo-dark);}
.btn-a{background:var(--amber);color:#fff;}
.btn-a:hover{background:#d97706;}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{background:#f8fafc;}
.inp{font-size:12px;padding:6px 10px;border-radius:7px;border:1px solid var(--border);outline:none;background:#f8fafc;transition:border-color .15s;}
.inp:focus{border-color:#a5b4fc;background:#fff;}

.pil{display:inline-flex;align-items:center;padding:2px 8px;border-radius:11px;font-size:10px;font-weight:600;gap:3px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

@media(max-width:768px){.sidebar{display:none;}.content{padding:10px;}}

/* ===== UNIQUE LAYOUT STYLES ===== */

/* Layout 1: 工作台 - Canvas: floating stat bubbles + large center chart + bottom scroll strip */
.canvas-grid{display:grid;grid-template-columns:200px 1fr 200px;gap:16px;margin-bottom:16px;}
.stat-bubble{
  width:90px;height:90px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;margin:0 auto 12px;
  box-shadow:0 4px 16px rgba(0,0,0,.06);transition:transform .2s;
}
.stat-bubble:hover{transform:scale(1.08);}
.stat-bubble .val{font-size:22px;font-weight:900;line-height:1;}
.stat-bubble .lbl{font-size:9px;opacity:.7;margin-top:2px;}
.sprint-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:20px 24px;text-align:center;}
.sprint-card .days-left{font-size:56px;font-weight:900;color:var(--indigo);line-height:1;}
.sprint-card .sprint-name{font-size:13px;font-weight:600;color:#334155;margin-top:4px;}
.horz-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
.horz-scroll::-webkit-scrollbar{height:3px;}
.project-strip-card{
  min-width:260px;background:var(--card);border-radius:12px;border:1px solid var(--border);
  padding:16px;flex-shrink:0;transition:box-shadow .2s;cursor:pointer;
}
.project-strip-card:hover{box-shadow:var(--shadow-lg);}

/* Layout 2: 团队成员 - Directory: left filter + masonry cards */
.dir-layout{display:grid;grid-template-columns:180px 1fr;gap:16px;}
.filter-panel{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;height:fit-content;}
.filter-panel h4{font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.filter-tag{display:block;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--slate);margin-bottom:3px;transition:all .12s;}
.filter-tag:hover,.filter-tag.on{background:var(--indigo-light);color:var(--indigo);font-weight:600;}
.masonry{columns:3;column-gap:14px;}
.member-card{
  break-inside:avoid;background:var(--card);border-radius:12px;border:1px solid var(--border);
  padding:16px;margin-bottom:14px;transition:box-shadow .2s;
}
.member-card:hover{box-shadow:var(--shadow-lg);}
.skill-tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:500;margin:2px 3px 2px 0;}

/* Layout 3: 项目管理 - Swimlane 时间轴 */
.swimlane{margin-bottom:8px;}
.swimlane-hd{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:12px;font-weight:600;color:#334155;}
.swimlane-bar-wrap{position:relative;height:32px;background:#f1f5f9;border-radius:6px;margin-bottom:4px;overflow:visible;}
.swimlane-phase{position:absolute;top:0;height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.swimlane-milestone{position:absolute;top:-6px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;transform:translateX(-50%);}
.swimlane-months{display:flex;font-size:9px;color:var(--muted);padding-left:0;}
.swimlane-months span{flex:1;text-align:center;}

/* Layout 4: 任务看板 - Kanban columns */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start;}
.kanban-col{background:#f1f5f9;border-radius:12px;padding:12px;min-height:300px;}
.kanban-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #e2e8f0;}
.kanban-col-hd .title{font-size:12px;font-weight:700;color:#334155;}
.kanban-col-hd .count{font-size:11px;color:var(--muted);background:#fff;padding:1px 8px;border-radius:9px;}
.kanban-card{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.03);border:1px solid var(--border);cursor:pointer;transition:box-shadow .15s;}
.kanban-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.06);}
.kanban-card .k-id{font-size:10px;color:var(--indigo);font-family:monospace;}
.kanban-card .k-title{font-size:13px;font-weight:600;color:#1e293b;margin:4px 0;}
.kanban-card .k-meta{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:6px;}

/* Layout 5: 工时统计 - Heatmap calendar + weekly grid */
.heat-calendar{display:flex;gap:3px;}
.heat-month{display:flex;flex-direction:column;gap:3px;}
.heat-month .mlabel{font-size:9px;color:var(--muted);margin-bottom:2px;}
.heat-day{width:12px;height:12px;border-radius:2px;background:#f1f5f9;}
.timesheet-grid{display:grid;grid-template-columns:auto repeat(7,1fr);gap:1px;background:#e4e7ed;border:1px solid #e4e7ed;border-radius:8px;overflow:hidden;}
.ts-hd{background:var(--card);padding:6px;text-align:center;font-size:10px;font-weight:600;color:var(--slate);}
.ts-cell{background:var(--card);padding:6px;text-align:center;font-size:11px;min-height:36px;display:flex;align-items:center;justify-content:center;}
.ts-cell.has-hours{background:var(--indigo-light);font-weight:600;color:var(--indigo);}
.ts-name{background:var(--card);padding:6px 10px;font-size:11px;font-weight:500;display:flex;align-items:center;}

/* Layout 6: 绩效评估 - Radar + comparison bars */
.radar-section{display:flex;align-items:center;gap:30px;}
.radar-placeholder{position:relative;width:200px;height:200px;flex-shrink:0;}
.radar-ring{position:absolute;border-radius:50%;border:1px solid #e2e8f0;inset:0;}
.radar-ring:nth-child(2){inset:15%;}.radar-ring:nth-child(3){inset:30%;}.radar-ring:nth-child(4){inset:45%;}.radar-ring:nth-child(5){inset:60%;}
.radar-point{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--indigo);transform:translate(-50%,-50%);}
.radar-label{position:absolute;font-size:9px;color:var(--slate);white-space:nowrap;}
.okr-progress{margin-top:10px;}
.okr-bar{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;}
.okr-bar .okr-name{width:100px;text-align:right;font-weight:500;font-size:11px;flex-shrink:0;}
.okr-bar .okr-track{flex:1;height:18px;background:#f1f5f9;border-radius:9px;overflow:hidden;position:relative;}
.okr-bar .okr-fill{height:100%;border-radius:9px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:9px;font-weight:700;color:#fff;}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">

<script>
const P = {dash:'工作台',members:'团队成员',projects:'项目管理',kanban:'任务看板',timesheet:'工时统计',perf:'绩效评估',set:'系统设置'};

// ===== PAGE 1: 工作台 — Canvas: floating bubbles + center sprint + scroll strip =====

</div>
<!-- Bottom: horizontal project strip -->
<div style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;"><h3 style="font-size:13px;font-weight:600;color:#334155;">📁 进行中的项目</h3><button class="btn btn-g">查看全部 →</button></div>

// ===== PAGE 2: 团队成员 — Directory: filter sidebar + masonry cards =====
function pgMembers(){
  const members=[{n:'张伟',role:'技术负责人',skills:['React','Node.js','架构设计','团队管理'],project:'电商平台重构',avail:'full',mood:'😤'},{n:'李芳',role:'前端开发',skills:['Vue','TypeScript','Tailwind','UI设计'],project:'电商平台重构',avail:'busy',mood:'😊'},{n:'王明',role:'后端开发',skills:['Python','FastAPI','PostgreSQL','Docker'],project:'数据中台建设',avail:'full',mood:'🤔'},{n:'赵丽',role:'全栈开发',skills:['React','Go','K8s','微服务'],project:'数据中台建设',avail:'full',mood:'💪'},{n:'孙强',role:'测试工程师',skills:['自动化测试','Cypress','性能测试','安全测试'],project:'移动端App',avail:'partial',mood:'😎'},{n:'周晓',role:'UI设计师',skills:['Figma','设计系统','用户研究','动效'],project:'移动端App',avail:'full',mood:'🎨'},{n:'陈静',role:'产品经理',skills:['需求分析','敏捷管理','数据分析','用户增长'],project:'电商平台重构',avail:'busy',mood:'📊'},{n:'刘洋',role:'DevOps',skills:['CI/CD','AWS','Terraform','监控'],project:'基础设施升级',avail:'partial',mood:'🔧'}];

// ===== PAGE 3: 项目管理 — Swimlane 时间轴 =====
function pgProjects(){
  const projects=[{name:'电商平台重构',progress:62,color:'var(--indigo)',phases:[{n:'需求评审',w:15,c:'#a5b4fc'},{n:'核心开发',w:50,c:'#6366f1'},{n:'联调测试',w:25,c:'#4f46e5'},{n:'上线',w:10,c:'#4338ca'}]},{name:'数据中台建设',progress:38,color:'var(--amber)',phases:[{n:'调研',w:20,c:'#fde68a'},{n:'架构设计',w:25,c:'#fbbf24'},{n:'实施',w:45,c:'#f59e0b'},{n:'验收',w:10,c:'#d97706'}]},{name:'移动端App V3',progress:85,color:'var(--success)',phases:[{n:'设计',w:10,c:'#6ee7b7'},{n:'开发',w:40,c:'#34d399'},{n:'测试',w:20,c:'#10b981'},{n:'发版',w:30,c:'#059669'}]},{name:'基础设施升级',progress:50,color:'var(--slate)',phases:[{n:'评估',w:15,c:'#cbd5e1'},{n:'迁移',w:55,c:'#94a3b8'},{n:'验证',w:20,c:'#64748b'},{n:'收尾',w:10,c:'#475569'}]}];
  const months=['1月','2月','3月','4月','5月','6月'];
  let swimlanes='';
  projects.forEach(p=>{
    let phases='';let pos=0;
    p.phases.forEach(ph=>{
      phases+=`<div class="swimlane-phase" style="left:${pos}%;width:${ph.w}%;background:${ph.c};">${ph.n}</div>`;
