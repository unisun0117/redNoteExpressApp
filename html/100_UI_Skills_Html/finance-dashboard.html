<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>瑞富通 — 客户资产管理系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        navy: { 50:'#eef2f8',100:'#d5ddec',200:'#aebfd9',300:'#7d9ac2',400:'#5575a8',500:'#3b5998',600:'#1a365d',700:'#122847',800:'#0f1d3a',900:'#0a1428' },
        gold: { 400:'#e8b830',500:'#c5942c',600:'#a67c24' }
      }
    }
  }
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap');

:root {
  --bg:#f1f5f9; --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#94a3b8;
  --primary:#0f1d3a; --p2:#1a365d; --p3:#3b5998;
  --gold:#c5942c; --gold-light:#fdf6e8;
  --success:#10b981; --warn:#f59e0b; --danger:#ef4444;
  --radius:14px; --shadow:0 1px 3px rgba(0,0,0,.04); --shadow-lg:0 10px 30px rgba(15,29,58,.08),0 3px 8px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter','Noto Sans SC',system-ui,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}

.app{display:flex;min-height:100vh;}
.sidebar{
  width:220px;background:var(--primary);border-right:1px solid rgba(255,255,255,.06);
  flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;z-index:10;
}
.side-logo{padding:18px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:#fff;border-bottom:1px solid rgba(255,255,255,.08);}
.side-logo span{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:14px;flex-shrink:0;font-weight:800;}
.nav-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;padding:14px 18px 5px;}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 14px;margin:2px 10px;
  border-radius:8px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);
  cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 20px);text-align:left;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{
  height:52px;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  position:sticky;top:0;z-index:5;
}
.top-title{font-size:14px;font-weight:600;color:var(--primary);}
.top-sub{font-size:10px;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:.4px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;}

.content{padding:20px 24px;flex:1;overflow-y:auto;}

/* Shared */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);transition:box-shadow .25s,transform .25s;}
.card:hover{box-shadow:var(--shadow-lg);}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-hd h3{font-size:13px;font-weight:600;color:#334155;display:flex;align-items:center;gap:7px;}
.card-hd h3::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--gold);flex-shrink:0;}

.btn{font-size:11px;font-weight:500;padding:6px 12px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:var(--primary);color:#fff;}
.btn-p:hover{background:var(--p2);}
.btn-gold{background:var(--gold);color:#fff;}
.btn-gold:hover{background:#a67c24;}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{background:#f8fafc;}
.inp{font-size:12px;padding:6px 10px;border-radius:7px;border:1px solid var(--border);outline:none;background:#f8fafc;transition:border-color .15s;}
.inp:focus{border-color:#aebfd9;background:#fff;}

.pil{display:inline-flex;align-items:center;padding:3px 9px;border-radius:13px;font-size:11px;font-weight:600;gap:3px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:2px solid #e2e8f0;}
.tbl td{padding:10px;font-size:12px;color:#334155;border-bottom:1px solid #f8fafc;}
.tbl tbody tr:hover td{background:#f8fafc;}

@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(197,148,44,.4)}50%{box-shadow:0 0 0 6px rgba(197,148,44,0)}}

@media(max-width:768px){.sidebar{display:none;}.content{padding:12px;}}
</style>
</head>
<body>

<div class="app">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="side-logo"><span>瑞</span>瑞富通</div>
    <div class="nav-sec">业务管理</div>
    <button class="nav-item active" data-pg="dash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>工作台</button>
    <button class="nav-item" data-pg="client"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>客户管理</button>
    <button class="nav-item" data-pg="portfolio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>资产分析</button>
    <button class="nav-item" data-pg="trade"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>交易记录</button>
    <div class="nav-sec">产品 & 风控</div>
    <button class="nav-item" data-pg="products"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>产品库</button>
    <button class="nav-item" data-pg="risk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>风险监控</button>
    <div class="nav-sec">系统</div>
    <button class="nav-item" data-pg="set"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>系统设置</button>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main">
    <header class="topbar">
      <div><span class="top-sub" id="bc">工作台 / 概览</span><span class="top-title" id="pt">工作台</span></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:11px;color:var(--muted);" id="clock">2026-07-01 周三 14:30</span>
        <div class="avatar">陈</div>
      </div>
    </header>
    <div class="content" id="ct"></div>
  </div>
</div>

<script>
const PAGES = {dash:'工作台',client:'客户管理',portfolio:'资产分析',trade:'交易记录',products:'产品库',risk:'风险监控',set:'系统设置'};

// ==================== PAGE 1: 工作台 — Hero Banner + 非对称网格 ====================
function pageDash(){
  return `<div style="background:linear-gradient(135deg, #0f1d3a 0%, #1a365d 40%, #3b5998 100%);border-radius:16px;padding:28px 32px;color:#fff;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;">
    <div style="position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;"></div>
    <div style="position:relative;z-index:1;"><h2 style="font-size:21px;font-weight:800;">早上好，陈经理 👋</h2><div style="font-size:11px;opacity:.65;margin-top:3px;">瑞富通财富管理 · 今日市场：沪深300 ↑0.82% · 创业板指 ↑1.35%</div></div>
    <div style="display:flex;gap:28px;position:relative;z-index:1;">
      <div style="text-align:center;"><div style="font-size:30px;font-weight:900;">¥8.56<span style="font-size:16px;">亿</span></div><div style="font-size:10px;opacity:.65;">在管资产规模 (AUM)</div></div>
      <div style="text-align:center;"><div style="font-size:30px;font-weight:900;color:#10b981;">+12.8<span style="font-size:16px;">%</span></div><div style="font-size:10px;opacity:.65;">本年化收益率</div></div>
      <div style="text-align:center;"><div style="font-size:30px;font-weight:900;">1,248</div><div style="font-size:10px;opacity:.65;">活跃客户数</div></div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;">
    ${[{icon:'📋',c:'#eef2f8',tc:'var(--p2)',t:'新建客户',d:'录入客户档案'},{icon:'💰',c:'var(--gold-light)',tc:'var(--gold)',t:'资产配置',d:'调整投资组合'},{icon:'📊',c:'#ecfdf5',tc:'var(--success)',t:'生成报告',d:'客户持仓报告'},{icon:'📅',c:'#eef2f8',tc:'var(--p3)',t:'预约提醒',d:'今日3个预约'}].map(q=>`<div style="background:var(--card);border-radius:11px;border:1px solid var(--border);padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;" onmouseover="this.style.boxShadow='var(--shadow-lg)';this.style.transform='translateY(-2px)';" onmouseout="this.style.boxShadow='';this.style.transform='';"><div style="width:36px;height:36px;border-radius:9px;background:${q.c};display:flex;align-items:center;justify-content:center;font-size:16px;">${q.icon}</div><div><div style="font-weight:600;font-size:12px;color:${q.tc};">${q.t}</div><div style="font-size:10px;color:var(--muted);">${q.d}</div></div></div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;">
    <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>本月AUM趋势 (亿元)</h3></div><div id="d1aum" style="display:flex;align-items:flex-end;gap:10px;height:180px;"></div></div>
    <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>待办提醒</h3></div><div id="d1todo"></div></div>
    <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>最新动态</h3></div><div id="d1feed"></div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:14px;">
    <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>产品类型分布</h3></div><div id="d1prod"></div></div>
    <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>今日预约</h3></div><div id="d1appt"></div></div>
    <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>业绩概览</h3></div><div id="d1kpi"></div></div>
  </div>`;
}

// ==================== PAGE 2: 客户管理 — Bento Grid ====================
function pageClient(){
  return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;">
    ${[{icon:'👥',c:'#eef2f8',tc:'var(--p2)',n:'1,248',l:'客户总数',b:'↑ 5.2%',bc:'#ecfdf5 #059669'},{icon:'🆕',c:'var(--gold-light)',tc:'var(--gold)',n:'28',l:'本月新增',b:'↑ 12.0%',bc:'#ecfdf5 #059669'},{icon:'⭐',c:'#eef2f8',tc:'var(--p3)',n:'186',l:'VIP客户',b:'AUM>500万',bc:'var(--gold-light) var(--gold)'},{icon:'⚠',c:'#fef2f2',tc:'var(--danger)',n:'3',l:'需关注',b:'资产异动',bc:'#fef2f2 #dc2626'}].map(m=>`<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;gap:12px;transition:box-shadow .2s;" onmouseover="this.style.boxShadow='var(--shadow-lg)'" onmouseout="this.style.boxShadow=''"><div style="width:40px;height:40px;border-radius:10px;background:${m.c};display:flex;align-items:center;justify-content:center;font-size:17px;">${m.icon}</div><div><div style="font-size:24px;font-weight:800;color:var(--primary);">${m.n}</div><div style="font-size:11px;color:var(--muted);">${m.l}</div><span class="pil" style="background:${m.bc.split(' ')[0]};color:${m.bc.split(' ')[1]};margin-top:3px;display:inline-flex;">${m.b}</span></div></div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:5fr 7fr;gap:14px;">
    <div class="card" style="padding:18px 20px;">
      <div class="card-hd"><h3>客户风险偏好分布</h3></div>
      <div id="c2risk"></div>
    </div>
    <div class="card" style="padding:18px 20px;">
      <div class="card-hd"><h3>AUM Top10 客户</h3></div>
      <div id="c2aumtop"></div>
    </div>
  </div>
  <div style="background:var(--card);border-radius:12px;border:1px solid var(--border);margin-top:14px;overflow:hidden;">
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;">
      <input class="inp" placeholder="🔍 搜索客户姓名/手机号..." style="width:200px;"><select class="inp"><option>全部风险等级</option><option>保守型</option><option>稳健型</option><option>进取型</option></select><select class="inp"><option>AUM范围</option><option>100万以下</option><option>100-500万</option><option>500万以上</option></select><button class="btn btn-p">查询</button><button class="btn btn-g" style="margin-left:auto;">📥 导出</button>
    </div>
    <table class="tbl" style="margin:0;"><thead><tr><th>客户编号</th><th>姓名</th><th>风险等级</th><th>AUM(万元)</th><th>持仓产品数</th><th>本年收益率</th><th>客户经理</th><th>KYC状态</th><th>操作</th></tr></thead><tbody id="c2tbl"></tbody></table>
    <div style="display:flex;justify-content:space-between;padding:10px 16px;font-size:11px;color:var(--muted);border-top:1px solid #f1f5f9;"><span>共 <b style="color:var(--primary);">1,248</b> 条</span><div style="display:flex;gap:2px;">${['‹','1','2','3','…','42','›'].map(p=>`<button style="padding:2px 7px;border-radius:5px;border:1px solid var(--border);background:${p==='1'?'var(--primary)':'#fff'};color:${p==='1'?'#fff':'#64748b'};font-size:10px;font-weight:600;cursor:pointer;">${p}</button>`).join('')}</div></div>
  </div>`;
}

// ==================== PAGE 3: 资产分析 — KPI Hero + 图表矩阵 ====================
function pagePortfolio(){
  return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;">
    ${[{bg:'linear-gradient(135deg,#0f1d3a,#1a365d)',n:'¥85,620',l:'总资产(万元)',sub:'↑ 8.3% 较上季'},{bg:'linear-gradient(135deg,#c5942c,#e8b830)',n:'¥12,480',l:'本月净流入',sub:'↑ 15.2%'},{bg:'linear-gradient(135deg,#059669,#10b981)',n:'+12.8%',l:'年化收益率',sub:'跑赢基准 +3.2pp'},{bg:'linear-gradient(135deg,#7c3aed,#8b5cf6)',n:'82.6',l:'夏普比率',sub:'优秀'}].map(k=>`<div style="background:${k.bg};border-radius:14px;padding:22px 20px;color:#fff;position:relative;overflow:hidden;min-height:110px;"><div style="position:absolute;right:-20px;bottom:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.06);"></div><div style="position:relative;z-index:1;"><div style="font-size:30px;font-weight:900;">${k.n}</div><div style="font-size:11px;opacity:.75;">${k.l}</div><div style="font-size:10px;opacity:.6;margin-top:2px;">${k.sub}</div></div></div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;">
    <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>资产大类配置</h3></div><div id="p3alloc"></div></div>
    <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>月度收益走势 (%)</h3></div><div id="p3yield" style="display:flex;align-items:flex-end;gap:10px;height:160px;"></div></div>
    <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>产品类型占比</h3></div><div id="p3type"></div></div>
  </div>
  <div class="card" style="padding:18px 20px;">
    <div class="card-hd"><h3>持仓明细</h3><button class="btn btn-g">导出报表</button></div>
    <div style="overflow-x:auto;"><table class="tbl"><thead><tr><th>产品代码</th><th>产品名称</th><th>类型</th><th>持仓市值(万)</th><th>占比</th><th>成本(万)</th><th>浮动盈亏</th><th>收益率</th><th>风险等级</th></tr></thead><tbody id="p3hold"></tbody></table></div>
  </div>`;
}

// ==================== PAGE 4: 交易记录 — 全宽筛选+表 ====================
function pageTrade(){
  return `<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 18px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <input class="inp" placeholder="🔍 交易编号/客户姓名..." style="width:200px;"><select class="inp"><option>全部类型</option><option>申购</option><option>赎回</option><option>分红</option><option>转换</option></select><select class="inp"><option>全部产品</option><option>股票型基金</option><option>债券型基金</option><option>混合型基金</option><option>私募产品</option></select><input class="inp" type="date" value="2026-06-01"><span style="font-size:11px;color:var(--muted);">至</span><input class="inp" type="date" value="2026-07-01"><button class="btn btn-p">查询</button><button class="btn btn-gold">导出</button>
  </div>
  <div style="background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;">
