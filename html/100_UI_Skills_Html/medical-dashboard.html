<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>慧医通 — 医疗管理后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50:'#eef4ff',100:'#d9e5ff',200:'#bcd0ff',300:'#8eb1ff',400:'#5987ff',500:'#3366ff',600:'#1a40e8',700:'#1430d6',800:'#1629ad',900:'#172888',950:'#131b53' }
      }
    }
  }
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap');

:root {
  --bg:#f1f5f9; --card:#fff; --border:#e8ecf1; --text:#1e293b; --muted:#94a3b8;
  --primary:#3366ff; --pdark:#1a40e8; --success:#10b981; --warn:#f59e0b; --danger:#f43f5e; --violet:#8b5cf6; --cyan:#06b6d4;
  --radius:14px; --shadow:0 1px 3px rgba(0,0,0,.04); --shadow-lg:0 10px 30px rgba(30,64,175,.08),0 3px 8px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter','Noto Sans SC',system-ui,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}

.app{display:flex;min-height:100vh;}
.sidebar{
  width:220px;background:var(--card);border-right:1px solid var(--border);
  flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;z-index:10;
}
.side-logo{padding:18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:#0f172a;}
.side-logo span{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0;}
.nav-sec{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:14px 16px 5px;}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 14px;margin:2px 10px;
  border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 20px);text-align:left;
}
.nav-item:hover{background:#f1f5f9;color:#334155;}
.nav-item.active{background:#eef4ff;color:var(--primary);font-weight:600;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{
  height:52px;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  position:sticky;top:0;z-index:5;
}
.top-title{font-size:14px;font-weight:600;color:#0f172a;}
.top-sub{font-size:10px;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:.4px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;}

.content{padding:20px 24px;flex:1;overflow-y:auto;}

/* Shared */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);transition:box-shadow .25s,transform .25s;}
.card:hover{box-shadow:var(--shadow-lg);}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-hd h3{font-size:13px;font-weight:600;color:#334155;display:flex;align-items:center;gap:7px;}
.card-hd h3::before{content:'';width:3px;height:12px;border-radius:2px;flex-shrink:0;}
.pg{display:none;}
.pg.active{display:block;}

.btn{font-size:11px;font-weight:500;padding:6px 12px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:var(--primary);color:#fff;}
.btn-p:hover{background:var(--pdark);}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{background:#f8fafc;}
.inp{font-size:12px;padding:6px 10px;border-radius:7px;border:1px solid var(--border);outline:none;background:#f8fafc;transition:border-color .15s;}
.inp:focus{border-color:#93c5fd;background:#fff;}

.pil{display:inline-flex;align-items:center;padding:3px 9px;border-radius:13px;font-size:11px;font-weight:600;gap:3px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

@keyframes pulse-a{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 6px rgba(245,158,11,0)}}
@keyframes pulse-b{0%,100%{box-shadow:0 0 0 0 rgba(51,102,255,.4)}50%{box-shadow:0 0 0 6px rgba(51,102,255,0)}}

@media(max-width:768px){.sidebar{display:none;}.content{padding:12px;}}

/* ========== PAGE 1: 工作台 — 欢迎横幅 + 非对称网格 ========== */
.dash-banner{
  background:linear-gradient(135deg, #1e3a5f 0%, #1629ad 40%, #1a40e8 100%);
  border-radius:16px; padding:28px 32px; color:#fff; margin-bottom:18px;
  display:flex; align-items:center; justify-content:space-between; overflow:hidden; position:relative;
}
.dash-banner::after{
  content:''; position:absolute; right:-40px; top:-40px;
  width:200px; height:200px; border-radius:50%;
  background:rgba(255,255,255,.06); pointer-events:none;
}
.dash-banner h2{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.dash-banner .sub{font-size:12px;opacity:.7;margin-top:4px;}
.dash-banner .banner-stat{text-align:center;position:relative;z-index:1;}
.dash-banner .banner-stat .val{font-size:32px;font-weight:900;}
.dash-banner .banner-stat .lbl{font-size:11px;opacity:.7;}
.dash-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.dash-quick-item{
  background:var(--card);border-radius:12px;border:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;
}
.dash-quick-item:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
.dash-quick-item .qicon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.dash-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;}
.dash-grid2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:14px;}

/* ========== PAGE 2: 患者管理 — Bento 不等宽网格 ========== */
.pat-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.pat-mcard{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;gap:14px;transition:box-shadow .2s;}
.pat-mcard:hover{box-shadow:var(--shadow-lg);}
.pat-mcard .icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.pat-mcard .num{font-size:26px;font-weight:800;color:#0f172a;letter-spacing:-1px;line-height:1;}
.pat-mcard .lab{font-size:11px;color:var(--muted);margin-top:2px;}
.pat-bento{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;}
.hgrid{display:grid;grid-template-columns:auto repeat(4,1fr);gap:4px;}
.hcell{
  aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;min-width:32px;cursor:default;transition:transform .15s;
}
.hcell:hover{transform:scale(1.2);z-index:2;box-shadow:0 3px 10px rgba(0,0,0,.15);}
.hlab{font-size:10px;font-weight:500;color:var(--muted);display:flex;align-items:center;}
.qrow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f8fafc;}
.qrow:last-child{border-bottom:none;}
.qtg{font-size:10px;font-weight:600;padding:2px 9px;border-radius:10px;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;border-bottom:2px solid #e2e8f0;}
.tbl td{padding:10px;font-size:12px;color:#334155;border-bottom:1px solid #f8fafc;}
.tbl tbody tr:hover td{background:#f8fafc;}

/* ========== PAGE 3: 门诊排班 — 左右分栏 + 时间轴 ========== */
.sched-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;}
.sched-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.sched-day{
  background:var(--card);border-radius:10px;border:1px solid var(--border);
  padding:10px 8px;text-align:center;min-height:120px;transition:box-shadow .2s;
}
.sched-day:hover{box-shadow:var(--shadow-lg);}
.sched-day .day-num{font-size:20px;font-weight:800;color:#0f172a;}
.sched-day .day-wk{font-size:10px;color:var(--muted);margin-bottom:6px;}
.sched-day.today{border:2px solid var(--primary);box-shadow:0 0 0 3px rgba(51,102,255,.1);}
.sched-day .apt-dot{display:block;font-size:10px;padding:2px 5px;border-radius:3px;margin-top:2px;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sched-timeline{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;}
.sched-timeline h3{font-size:13px;font-weight:600;color:#334155;margin-bottom:12px;}
.tl-item{display:flex;gap:10px;padding:10px 0;border-left:2px solid #e2e8f0;padding-left:14px;position:relative;font-size:12px;}
.tl-item::before{content:'';position:absolute;left:-5px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--primary);}
.tl-item .tl-time{color:var(--primary);font-weight:600;font-size:11px;white-space:nowrap;}
.tl-item .tl-info{color:var(--muted);font-size:11px;}

/* ========== PAGE 4: 电子病历 — 顶部筛选 + 全宽表 ========== */
.emr-filters{
  background:var(--card);border-radius:12px;border:1px solid var(--border);
  padding:14px 18px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.emr-table-wrap{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;}

/* ========== PAGE 5: 运营报表 — KPI 大数字 + 三列图表 ========== */
.rpt-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.rpt-hero-card{
  border-radius:14px;padding:22px 20px;color:#fff;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;min-height:120px;
}
.rpt-hero-card::after{content:'';position:absolute;right:-20px;bottom:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.08);}
.rpt-hero-card .num{font-size:32px;font-weight:900;position:relative;z-index:1;}
.rpt-hero-card .lab{font-size:12px;opacity:.8;position:relative;z-index:1;}
.rpt-charts{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.rpt-table-wrap{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;}

/* ========== PAGE 6: 趋势分析 — 大图 + 两侧数据卡片 ========== */
.trend-layout{display:grid;grid-template-columns:240px 1fr 240px;gap:14px;}
.trend-big{grid-column:2;}
.trend-side-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;}
.trend-side-card h4{font-size:12px;font-weight:600;color:#334155;margin-bottom:10px;}
.trend-mid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.trend-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}

/* ========== PAGE 7: 系统设置 — 两列表单 + 卡片列表 ========== */
.settings-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.settings-section{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:20px;}
.settings-section h3{font-size:14px;font-weight:600;color:#0f172a;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f1f5f9;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f8fafc;}
.setting-row:last-child{border-bottom:none;}
.toggle{
  width:38px;height:20px;border-radius:10px;position:relative;cursor:pointer;transition:background .2s;
}
.toggle.on{background:var(--primary);}
.toggle.off{background:#cbd5e1;}
.toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;}
.toggle.on::after{left:20px;}
.toggle.off::after{left:2px;}
</style>
</head>
<body>

<div class="app">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="side-logo"><span>惠</span>慧医通</div>
    <div class="nav-sec">主导航</div>
    <button class="nav-item active" data-pg="dash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>工作台</button>
    <button class="nav-item" data-pg="pat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>患者管理</button>
    <button class="nav-item" data-pg="sched"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>门诊排班</button>
    <button class="nav-item" data-pg="emr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>电子病历</button>
    <div class="nav-sec">数据统计</div>
    <button class="nav-item" data-pg="rpt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>运营报表</button>
    <button class="nav-item" data-pg="trend"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>趋势分析</button>
    <div class="nav-sec">系统</div>
    <button class="nav-item" data-pg="set"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>系统设置</button>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main">
    <header class="topbar">
      <div><span class="top-sub" id="bc">工作台 / 概览</span><span class="top-title" id="pt">工作台</span></div>
      <div class="avatar">李</div>
    </header>
    <div class="content" id="ct"></div>
  </div>
</div>

<script>
const P = {dash:'工作台',pat:'患者管理',sched:'门诊排班',emr:'电子病历',rpt:'运营报表',trend:'趋势分析',set:'系统设置'};

// ===================== PAGE 1: 工作台 =====================
function pageDash(){
  return `
  <div class="dash-banner">
    <div>
      <h2>早上好，李主任 👋</h2>
      <div class="sub">今日门诊 · 心内科 · 2026年7月1日 周三</div>
    </div>
    <div style="display:flex;gap:30px;position:relative;z-index:1;">
      <div class="banner-stat"><div class="val">18</div><div class="lbl">今日待接诊</div></div>
      <div class="banner-stat"><div class="val">12</div><div class="lbl">已完成</div></div>
      <div class="banner-stat"><div class="val">6</div><div class="lbl">候诊中</div></div>
    </div>
  </div>

  <div class="dash-quick">
    <div class="dash-quick-item"><div class="qicon" style="background:#eef4ff;color:var(--primary);">📋</div><div><div style="font-weight:600;font-size:13px;">快速挂号</div><div style="font-size:11px;color:var(--muted);">新建患者档案</div></div></div>
    <div class="dash-quick-item"><div class="qicon" style="background:#ecfdf5;color:var(--success);">💊</div><div><div style="font-weight:600;font-size:13px;">开具处方</div><div style="font-size:11px;color:var(--muted);">电子处方系统</div></div></div>
    <div class="dash-quick-item"><div class="qicon" style="background:#fffbeb;color:var(--warn);">📅</div><div><div style="font-weight:600;font-size:13px;">预约管理</div><div style="font-size:11px;color:var(--muted);">查看排班日程</div></div></div>
    <div class="dash-quick-item"><div class="qicon" style="background:#fdf2f8;color:#ec4899;">📊</div><div><div style="font-weight:600;font-size:13px;">数据报表</div><div style="font-size:11px;color:var(--muted);">运营数据概览</div></div></div>
  </div>

  <div class="dash-grid">
    <div class="card" style="padding:18px 20px;">
      <div class="card-hd"><h3 style="--c:var(--primary);">近7日门诊量</h3></div>
      <div id="d1bars" style="display:flex;align-items:flex-end;gap:10px;height:180px;padding-top:8px;"></div>
    </div>
    <div class="card" style="padding:16px 18px;">
      <div class="card-hd"><h3 style="--c:var(--warn);">紧急提醒</h3></div>
      <div id="d1alerts"></div>
    </div>
    <div class="card" style="padding:16px 18px;">
      <div class="card-hd"><h3 style="--c:var(--success);">今日动态</h3></div>
      <div id="d1act"></div>
    </div>
  </div>

  <div class="dash-grid2">
    <div class="card" style="padding:16px 18px;">
      <div class="card-hd"><h3 style="--c:var(--primary);">科室门诊量 Top5</h3></div>
      <div id="d1dept"></div>
    </div>
    <div class="card" style="padding:16px 18px;">
      <div class="card-hd"><h3 style="--c:var(--violet);">下午预约</h3></div>
      <div id="d1appts"></div>
    </div>
    <div class="card" style="padding:16px 18px;">
      <div class="card-hd"><h3 style="--c:var(--cyan);">本周小结</h3></div>
      <div id="d1summary"></div>
    </div>
  </div>`;
}

// ===================== PAGE 2: 患者管理 (Bento) =====================
function pagePat(){
  return `
  <div class="pat-metrics">
    <div class="pat-mcard"><div class="icon" style="background:#eef4ff;color:var(--primary);">👥</div><div><div class="num">2,486</div><div class="lab">总患者数</div><span class="pil" style="background:#ecfdf5;color:#059669;margin-top:4px;display:inline-flex;">↑ 3.2%</span></div></div>
    <div class="pat-mcard"><div class="icon" style="background:#ecfdf5;color:var(--success);">➕</div><div><div class="num">38</div><div class="lab">今日新增</div><span class="pil" style="background:#ecfdf5;color:#059669;margin-top:4px;display:inline-flex;">↑ 12.5%</span></div></div>
    <div class="pat-mcard"><div class="icon" style="background:#fffbeb;color:var(--warn);">📋</div><div><div class="num" style="color:#d97706;">28</div><div class="lab">待随访数</div><span class="pil" style="background:#fffbeb;color:#d97706;margin-top:4px;display:inline-flex;">⚠ 12人本周到期</span></div></div>
  </div>
