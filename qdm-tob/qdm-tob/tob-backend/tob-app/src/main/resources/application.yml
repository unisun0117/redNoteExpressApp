server:
  port: 8081

spring:
  application:
    name: tob-app
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    locale: zh_CN
  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*Mapper.xml
    type-aliases-package: cn.qdm.tob.modules.**.domain
    type-aliases-super-type: java.lang.Object
    type-enums-package: cn.qdm.tob.modules.system,cn.qdm.tob.modules.order.sales.enums
    global-config:
      banner: false
      db-config:
        id-type: auto
        table-underline: true
        logic-delete-value: 1
        logic-not-delete-value: 0
    configuration:
      map-underscore-to-camel-case: true
      auto-mapping-behavior: partial
      log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:rm-bp1395nx3y10abehj.mysql.rds.aliyuncs.com}:3306/qdm_tob?serverTimezone=Asia/Shanghai&useUnicode=yes&characterEncoding=UTF8
    username: ${MYSQL_USERNAME:pmsadmin}
    password: ${MYSQL_PASSWORD:QDMpmsqasdb@202009}
  sql:
    init:
      mode: always
  data:
    redis:
      host: r-bp15md64bp78xg18nb.redis.rds.aliyuncs.com
      port: 6379
      password: QDMpmsqasdb@202009
      lettuce:
        pool:
          max-idle: 8
          min-idle: 0
          max-active: 8
          max-wait: 3000ms

app:
  auth:
    sms:
      max-attempts: 30
      # 验证码有效期（秒），对应 SmsCodeService 的 app.auth.sms.code-expiration
      code-expiration: 300
      resend-interval: 60
      # 临时跳过短信验证码：true 时 sendSmsCode/verifySmsCode 直接放行，不读写 Redis。
      # 用于本地联调（阿里云 Redis 有 IP 白名单，开发机出口 IP 不在白名单时短信流程不可用）。
      # 上线前必须改回 false（或通过环境变量 APP_AUTH_SMS_BYPASS_ENABLED 覆盖）。
      bypass-enabled: ${APP_AUTH_SMS_BYPASS_ENABLED:false}
    cas:
      server-url: ${APP_AUTH_CAS_SERVER_URL:https://cas-qa.qdama.cn}
    wechat:
      # 小程序微信登录，对应 WechatAuthenticationProvider 的 app.auth.wechat.app-id / app.auth.wechat.app-secret
      app-id: ${APP_AUTH_WECHAT_APP_ID:wxc3b9dd50ac286233}
      app-secret: ${APP_AUTH_WECHAT_SECRET:4bfe27708f7fd77842308dd12317d4b3}
  wecom:
    corp-id: ${APP_WECOM_CORP_ID:}
    secret: ${APP_WECOM_SECRET:}

