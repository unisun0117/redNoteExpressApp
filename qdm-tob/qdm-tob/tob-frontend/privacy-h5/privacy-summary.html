<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>隐私政策摘要</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#FEF2F2;color:#450A0A;min-height:100vh}
.header{position:sticky;top:0;z-index:10;background:#fff;padding:12px 16px;border-bottom:1px solid #fecaca;display:flex;align-items:center;gap:8px}
.header h1{font-size:17px;font-weight:700;flex:1}
.loading{display:flex;align-items:center;justify-content:center;padding:80px 0}
.spinner{width:32px;height:32px;border:3px solid #fecaca;border-top-color:#DC2626;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;color:#7F1D1D}
.empty svg{width:64px;height:64px;margin-bottom:16px;opacity:.3}
.content{padding:16px;background:#fff;min-height:60vh;line-height:1.8;font-size:15px;word-wrap:break-word;overflow-x:auto}
.content img{max-width:100%!important;height:auto!important}
.content table{max-width:100%!important;display:block;overflow-x:auto}
.error-msg{text-align:center;padding:40px;color:#DC2626}
</style>
</head>
<body>
<div class="header"><h1>隐私政策摘要</h1></div>
<div id="loading" class="loading"><div class="spinner"></div></div>
<div id="empty" class="empty" style="display:none"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><p>暂无内容</p></div>
<div id="error" class="error-msg" style="display:none">加载失败，请下拉刷新重试</div>
<div id="content" class="content" style="display:none"></div>
<script>
var API = 'http://localhost:8081'
fetch(API+'/api/public/privacy/docs/privacy-summary')
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json() })
  .then(function(res){
    document.getElementById('loading').style.display='none'
    var d=res.data
    if(d&&d.richContent){ document.getElementById('content').innerHTML=d.richContent; document.getElementById('content').style.display='block' }
    else{ document.getElementById('empty').style.display='flex' }
  })
  .catch(function(){ document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block' })
</script>
</body>
</html>
