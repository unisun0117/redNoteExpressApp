<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>隐私政策</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#FEF2F2;color:#450A0A;min-height:100vh}
.header{position:sticky;top:0;z-index:10;background:#fff;padding:12px 16px;border-bottom:1px solid #fecaca;display:flex;align-items:center;gap:8px}
.header h1{font-size:17px;font-weight:700;flex:1}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #fecaca;flex-wrap:wrap}
.version-btn{background:#F3F4F6;border:none;border-radius:8px;padding:8px 14px;font-size:14px;color:#1F2937;cursor:pointer;display:flex;align-items:center;gap:4px}
.version-btn svg{width:12px;height:12px}
.action-btn{background:transparent;border:1px solid #DC2626;border-radius:8px;padding:6px 14px;font-size:13px;color:#DC2626;cursor:pointer}
.loading{display:flex;align-items:center;justify-content:center;padding:80px 0}
.spinner{width:32px;height:32px;border:3px solid #fecaca;border-top-color:#DC2626;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;color:#7F1D1D}
.empty svg{width:64px;height:64px;margin-bottom:16px;opacity:.3}
.content{padding:16px;background:#fff;min-height:60vh;line-height:1.8;font-size:15px;word-wrap:break-word;overflow-x:auto}
.content img{max-width:100%!important;height:auto!important}
.content table{max-width:100%!important;display:block;overflow-x:auto}
.error-msg{text-align:center;padding:40px;color:#DC2626}
/* 版本弹窗 */
.overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:center}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.picker{position:relative;background:#fff;border-radius:12px 12px 0 0;width:100%;max-height:60vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.picker-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #F3F4F6}
.picker-header button{background:transparent;border:none;font-size:15px;padding:0;cursor:pointer}
.picker-cancel{color:#9CA3AF}
.picker-confirm{color:#DC2626;font-weight:600}
.picker-title{font-size:16px;font-weight:600}
.version-item{padding:14px 16px;border-bottom:1px solid #F8FAFC;cursor:pointer;font-size:15px;color:#1F2937;display:flex;align-items:center;justify-content:space-between}
.version-item:hover{background:#FEF2F2}
.version-item.active{color:#DC2626;font-weight:600;background:#FEF2F2}
.version-item .check{color:#DC2626;font-size:18px}
</style>
</head>
<body>
<div class="header"><h1>隐私政策</h1></div>
<div id="toolbar" class="toolbar" style="display:none">
  <button id="versionBtn" class="version-btn" onclick="togglePicker()"><span id="versionLabel">最新版本</span><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></button>
  <div style="flex:1"></div>
  <button class="action-btn" onclick="copyLink()">复制地址</button>
  <button id="downloadBtn" class="action-btn" onclick="downloadDoc()" style="display:none">下载</button>
</div>
<div id="loading" class="loading"><div class="spinner"></div></div>
<div id="empty" class="empty" style="display:none"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><p>暂无内容</p></div>
<div id="error" class="error-msg" style="display:none">加载失败，请下拉刷新重试</div>
<div id="content" class="content" style="display:none"></div>

<div id="pickerOverlay" class="overlay" style="display:none">
  <div class="overlay-bg" onclick="togglePicker()"></div>
  <div class="picker">
    <div class="picker-header">
      <button class="picker-cancel" onclick="togglePicker()">取消</button>
      <span class="picker-title">选择版本日期</span>
      <button class="picker-confirm" onclick="confirmVersion()">确定</button>
    </div>
    <div id="versionList"></div>
  </div>
</div>

<script>
var API = 'http://localhost:8081'
var versions=[], currentVersion='', currentFileUrl='', selectedVersion=''

function fmtVer(v,ua){ if(!v)return''; return v.slice(0,4)+'年'+v.slice(4,6)+'月'+v.slice(6,8)+'日' }

function togglePicker(){
  var el=document.getElementById('pickerOverlay')
  el.style.display=el.style.display==='none'?'flex':'none'
  if(el.style.display==='flex') renderVersionList()
}
function renderVersionList(){
  var html=''
  for(var i=0;i<versions.length;i++){
    var v=versions[i], label=fmtVer(v.version,v.updatedAt)
    html+='<div class="version-item'+(selectedVersion===v.version?' active':'')+'" onclick="selectVersion(\''+v.version+'\')">'+label+'<span class="check">'+(selectedVersion===v.version?'✓':'')+'</span></div>'
  }
  document.getElementById('versionList').innerHTML=html
}
function selectVersion(v){ selectedVersion=v; renderVersionList() }
function confirmVersion(){
  togglePicker()
  if(selectedVersion&&selectedVersion!==currentVersion) loadVersion(selectedVersion)
}
function loadVersion(ver){
  document.getElementById('loading').style.display='flex'
  document.getElementById('content').style.display='none'
  fetch(API+'/api/public/privacy/docs/privacy-policy/version?version='+encodeURIComponent(ver))
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json() })
    .then(function(res){
      document.getElementById('loading').style.display='none'
      var d=res.data
      if(d&&d.richContent){
        currentVersion=d.version; selectedVersion=d.version
        document.getElementById('versionLabel').textContent=fmtVer(d.version,d.createdAt)
        document.getElementById('content').innerHTML=d.richContent
        document.getElementById('content').style.display='block'
      }
    })
    .catch(function(){ document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block' })
}
function copyLink(){
  var url=window.location.href
  if(navigator.clipboard){ navigator.clipboard.writeText(url).then(function(){ alert('复制成功') }).catch(function(){ prompt('复制地址：',url) }) }
  else{ prompt('复制地址：',url) }
}
function downloadDoc(){
  if(currentFileUrl){ window.open(currentFileUrl,'_blank') }
  else{ alert('暂无下载文件') }
}

// 初始化
var params=new URLSearchParams(window.location.search)
var preVer=params.get('version')

// 先加载版本列表
fetch(API+'/api/public/privacy/docs/privacy-policy/versions')
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json() })
  .then(function(res){
    versions=res.data||[]
    if(versions.length>0){
      selectedVersion=preVer||versions[0].version
      document.getElementById('toolbar').style.display='flex'
    }
    // 再加载文档内容
    var loadVer=preVer||''
    var url=loadVer?API+'/api/public/privacy/docs/privacy-policy/version?version='+encodeURIComponent(loadVer):API+'/api/public/privacy/docs/privacy-policy'
    return fetch(url)
  })
  .then(function(r){ if(!r||!r.ok) throw new Error('HTTP '+(r?r.status:'unknown')); return r.json() })
  .then(function(res){
    document.getElementById('loading').style.display='none'
    var d=res.data
    if(d&&d.richContent){
      currentVersion=d.version||''; currentFileUrl=d.fileUrl||''
      document.getElementById('versionLabel').textContent=fmtVer(d.version,d.createdAt)
      if(d.fileUrl) document.getElementById('downloadBtn').style.display='inline-block'
      document.getElementById('content').innerHTML=d.richContent
      document.getElementById('content').style.display='block'
    }else{
      document.getElementById('empty').style.display='flex'
    }
  })
  .catch(function(){
    document.getElementById('loading').style.display='none'
    document.getElementById('error').style.display='block'
  })
</script>
</body>
</html>
