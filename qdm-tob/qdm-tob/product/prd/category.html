```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>生鲜优选 - 分类页</title>
    <style>
        :root {
            --primary-color: #DC2626; /* 红色主色调 */
            --secondary-color: #CA8A04; /* 暖金色 */
            --bg-color: #F9FAFB; /* 暖灰底色 */
            --text-dark: #1F2937;
            --text-muted: #6B7280;
            --border-color: #F3F4F6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* 模拟手机容器 */
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 4px solid #222;
        }

        /* 微信顶部状态栏模拟 */
        .status-bar {
            height: 24px;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 11px;
            font-weight: 500;
            color: #000;
        }
        .status-bar .icons {
            display: flex;
            gap: 4px;
        }

        /* 1. 顶部搜索栏及地址 */
        .header-section {
            background-color: #fff;
            padding: 8px 12px 6px 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .location {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
            color: var(--text-dark);
            max-width: 90px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .location::before {
            content: "📍";
            margin-right: 2px;
            font-size: 12px;
        }
        .search-bar {
            flex: 1;
            height: 32px;
            background-color: #F3F4F6;
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            cursor: pointer;
        }
        .search-icon {
            font-size: 12px;
            margin-right: 6px;
        }
        .search-placeholder {
            font-size: 12px;
            color: var(--text-muted);
        }
        .header-tips {
            font-size: 10px;
            color: var(--primary-color);
            background-color: #FEF2F2;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 2. 分类标签区（横向滚动） */
        .category-nav-wrapper {
            background-color: #fff;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        .category-nav {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 4px;
            scroll-behavior: smooth;
        }
        .category-nav::-webkit-scrollbar {
            display: none; /* 隐藏滚动条 */
        }
        .category-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 0 12px;
            cursor: pointer;
            position: relative;
        }
        .category-icon {
            font-size: 20px;
            margin-bottom: 4px;
            width: 36px;
            height: 36px;
            background-color: #FFF5F5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .category-name {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }
        /* 选中状态 */
        .category-item.active .category-icon {
            transform: scale(1.05);
            background-color: #FEE2E2;
        }
        .category-item.active .category-name {
            color: var(--primary-color);
            font-weight: bold;
        }
        .category-item.active::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 25%;
            width: 50%;
            height: 3px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        /* 主体内容滚动区 */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 60px; /* 为底栏留空 */
        }
        .main-content::-webkit-scrollbar {
            display: none;
        }

        /* 3. Banner促销区 */
        .banner-container {
            padding: 10px 12px 4px 12px;
        }
        .promo-banner {
            width: 100%;
            height: 90px;
            background: linear-gradient(135deg, #F87171, #DC2626);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 16px;
            color: white;
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.15);
        }
        .banner-text h3 {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .banner-text p {
            font-size: 11px;
            opacity: 0.9;
        }
        .banner-badge {
            background-color: var(--secondary-color);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
            display: inline-block;
        }
        .banner-emoji {
            position: absolute;
            right: 12px;
            font-size: 56px;
            opacity: 0.85;
            transform: rotate(15deg);
        }

        /* 4. 商品列表区 */
        .goods-section {
            padding: 8px 12px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 2px;
        }
        .section-title {
            font-size: 15px;
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .section-title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 14px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }
        .section-more {
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* 双列网格 */
        .goods-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .goods-card {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }
        .goods-card:active {
            transform: scale(0.98);
        }
        .goods-img-box {
            background-color: #FAF5F5;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 64px;
            position: relative;
        }
        .goods-badge-top {
            position: absolute;
            top: 6px;
            left: 6px;
            background-color: #FEF2F2;
            color: var(--primary-color);
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .goods-info {
            padding: 8px;
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: space-between;
        }
        .goods-name {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-dark);
            line-height: 1.3;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 34px;
        }
        .tag-row {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .tag-orange {
            background-color: #FFF7ED;
            color: #EA580C;
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 2px;
        }
        .tag-red {
            background-color: #FEF2F2;
            color: var(--primary-color);
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 2px;
        }
        .price-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-top: auto;
        }
        .price-group {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }
        .price-unit {
            font-size: 11px;
            color: var(--primary-color);
            font-weight: bold;
        }
        .price-num {
            font-size: 15px;
            color: var(--primary-color);
            font-weight: bold;
        }
        .price-origin {
            font-size: 10px;
            color: var(--text-muted);
            text-decoration: line-through;
            margin-left: 2px;
        }
        .add-cart-btn {
            width: 24px;
            height: 24px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(220, 38, 38, 0.3);
            border: none;
            outline: none;
        }
        .add-cart-btn:active {
            transform: scale(0.9);
        }

        /* 5. 底部 TabBar */
        .tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 52px;
            background-color: #fff;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            width: 25%;
            height: 100%;
        }
        .tab-icon {
            font-size: 18px;
            margin-bottom: 2px;
        }
        .tab-label {
            font-size: 10px;
        }
        /* 选中态 */
        .tab-item.active {
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <span>9:41</span>
            <div class="icons">📶 🛜 🔋</div>
        </div>

        <!-- 1. 顶部搜索及地址 -->
        <div class="header-section">
            <div class="header-top">
                <div class="location" id="locationBtn">康富花园</div>
                <div class="search-bar" id="searchBar">
                    <span class="search-icon">🔍</span>
                    <span class="search-placeholder">搜索商品，特价原切牛排</span>
                </div>
            </div>
            <div class="header-tips">
                <span>⏰ 今日 22:30 截单</span>
                <span>次日 07:30 起送 • 免运费</span>
            </div>
        </div>

        <!-- 2. 分类标签区 -->
        <div class="category-nav-wrapper">
            <div class="category-nav" id="categoryNav">
                <!-- 由 JS 渲染 -->
            </div>
        </div>

        <!-- 主体滚动区域 -->
        <div class="main-content">
            <!-- 3. Banner促销区 -->
            <div class="banner-container">
                <div class="promo-banner" id="promoBanner">
                    <div class="banner-text">
                        <h3>限时超值秒杀</h3>
                        <p>抢新鲜好食材 产地直达</p>
                        <span class="banner-badge">先领券再下单</span>
                    </div>
                    <span class="banner-emoji" id="bannerEmoji">🥬</span>
                </div>
            </div>

            <!-- 4. 商品列表区 -->
            <div class="goods-section">
                <div class="section-header">
                    <div class="section-title" id="sectionTitle">今日推荐</div>
                    <div class="section-more" onclick="alert('即将进入更多专题列表')">查看更多 &gt;</div>
                </div>
                <div class="goods-grid" id="goodsGrid">
                    <!-- 由 JS 动态渲染 -->
                </div>
            </div>
        </div>

        <!-- 5. 底部 TabBar -->
        <div class="tab-bar">
            <div class="tab-item" onclick="switchTab(this, '首页')">
                <span class="tab-icon">🏠</span>
                <span class="tab-label">首页</span>
            </div>
            <div class="tab-item active" onclick="switchTab(this, '分类')">
                <span class="tab-icon">🗂️</span>
                <span class="tab-label">分类</span>
            </div>
            <div class="tab-item" onclick="switchTab(this, '购物车')">
                <span class="tab-icon">🛒</span>
                <span class="tab-label">购物车</span>
            </div>
            <div class="tab-item" onclick="switchTab(this, '我的')">
                <span class="tab-icon">👤</span>
                <span class="tab-label">我的</span>
            </div>
        </div>
    </div>

    <script>
        // 数据定义
        const categories = [
            { id: "recommend", name: "今日推荐", icon: "✨", emoji: "🥬" },
            { id: "pork", name: "优选黑猪肉", icon: "🐷", emoji: "🥩" },
            { id: "vegetables", name: "新鲜蔬菜", icon: "🥬", emoji: "🥦" },
            { id: "eggs", name: "新鲜禽蛋", icon: "🥚", emoji: "🍳" },
            { id: "seafood", name: "活鲜水产", icon: "🐟", emoji: "🦞" },
            { id: "frozen", name: "鲜冻冰品", icon: "🍦", emoji: "🧊" },
            { id: "fruits", name: "新鲜水果", icon: "🍎", emoji: "🍇" },
            { id: "beans", name: "豆制品", icon: "🍢", emoji: "🥡" },
            { id: "cooked", name: "熟食卤味", icon: "🍗", emoji: "🍖" },
            { id: "seasoning", name: "调味干货", icon: "🌶️", emoji: "🧂" }
        ];

        const goodsData = {
            recommend: [
                { name: "本地原产 A级大白菜 (颗)", img: "🥬", tag1: "A级优选", tag2: "特价", price: "2.80", originPrice: "4.90" },
                { name: "崇明生态原产 沙地土豆 约500g", img: "🥔", tag1: "高性价比", tag2: "秒杀", price: "3.20", originPrice: "5.50" },
                { name: "新鲜特甜红富士苹果 4粒装", img: "🍎", tag1: "A级果", tag2: "爆款", price: "12.90", originPrice: "18.80" },
                { name: "农家散养土鸡蛋 10枚盒装", img: "🥚", tag1: "精选蛋", tag2: "特惠", price: "9.90", originPrice: "14.90" }
            ],
            pork: [
                { name: "农家冷鲜黑猪五花肉 350g", img: "🥩", tag1: "高品质", tag2: "鲜肉", price: "22.80", originPrice: "29.90" },
                { name: "精选黑猪前腿肉馅 300g", img: "🥩", tag1: "A级", tag2: "免切", price: "15.90", originPrice: "21.00" }
            ],
            vegetables: [
                { name: "有机鲜嫩小油菜 250g", img: "🥦", tag1: "绿色有机", tag2: "特价", price: "1.99", originPrice: "3.50" },
                { name: "本地新鲜大葱 500g", img: "🌱", tag1: "去根", tag2: "极速达", price: "2.40", originPrice: "3.80" }
            ],
            eggs: [
                { name: "散养初生蛋 30枚整箱装", img: "🍳", tag1: "高营养", tag2: "特惠", price: "26.80", originPrice: "35.00" }
            ],
            seafood: [
                { name: "鲜活深海鲈鱼 1条 500g左右", img: "🐟", tag1: "现捞现宰", tag2: "爆品", price: "18.90", originPrice: "26.00" },
                { name: "鲜活大基围虾 500g", img: "🦞", tag1: "活鲜", tag2: "限时秒杀", price: "45.00", originPrice: "59.00" }
            ],
            frozen: [
                { name: "湾仔码头三鲜水饺 720g", img: "🥟", tag1: "家庭装", tag2: "囤货", price: "21.90", originPrice: "28.90" }
            ],
            fruits: [
                { name: "精选进口车厘子 250g JJ级", img: "🍒", tag1: "特级", tag2: "超甜", price: "29.90", originPrice: "45.00" },
                { name: "海南贵妃芒果 1kg", img: "🥭", tag1: "树上熟", tag2: "爆款", price: "15.80", originPrice: "22.00" }
            ],
            beans: [
                { name: "农家手工老豆腐 400g", img: "🍢", tag1: "非转基因", tag2: "特价", price: "1.80", originPrice: "3.00" }
            ],
            cooked: [
                { name: "五香招牌酱牛肉 200g/袋", img: "🥩", tag1: "开袋即食", tag2: "热销", price: "28.50", originPrice: "36.00" }
            ],
            seasoning: [
                { name: "四川特产干红辣椒 100g", img: "🌶️", tag1: "特辣", tag2: "精选", price: "5.80", originPrice: "8.00" }
            ]
        };

        let activeCategoryId = "recommend";

        // 初始化渲染
        window.addEventListener('DOMContentLoaded', () => {
            renderCategories();
            switchCategory(activeCategoryId);

            // 搜索框点击事件
            document.getElementById('searchBar').addEventListener('click', () => {
                alert('🔍 正在跳转微信搜索小程序页面...');
            });

            // 定位点击事件
            document.getElementById('locationBtn').addEventListener('click', () => {
                alert('📍 正在为您定位，可选择周边其他提货小区');
            });
        });

        // 渲染分类导航
        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = categories.map((cat, index) => `
                <div class="category-item ${index === 0 ? 'active' : ''}" data-id="${cat.id}" onclick="clickCategory(this, '${cat.id}')">
                    <div class="category-icon">${cat.icon}</div>
                    <span class="category-name">${cat.name}</span>
                </div>
            `).join('');
        }

        // 分类点击处理
        function clickCategory(element, id) {
            // 清除旧的选中态
            document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
            // 设为新选中态
            element.classList.add('active');
            
            // 自动将选中的项平滑居中滚动
            const nav = document.getElementById('categoryNav');
            const offsetLeft = element.offsetLeft;
            const clientWidth = element.clientWidth;
            const navWidth = nav.clientWidth;
            nav.scrollTo({
                left: offsetLeft - (navWidth / 2) + (clientWidth / 2),
                behavior: 'smooth'
            });

            switchCategory(id);
        }

        // 切换品类数据并渲染
        function switchCategory(id) {
            activeCategoryId = id;
            const category = categories.find(c => c.id === id);
            
            // 更新 Banner 和标题
            document.getElementById('bannerEmoji').innerText = category.emoji;
            document.getElementById('sectionTitle').innerText = category.name;

            // 渲染商品列表
            const grid = document.getElementById('goodsGrid');
            const list = goodsData[id] || [];

            if (list.length === 0) {
                grid.innerHTML = '<div style="grid-column: span 2; text-align: center; color: #999; padding: 40px 0; font-size: 13px;">该分类下暂无商品</div>';
                return;
            }

            grid.innerHTML = list.map(item => `
                <div class="goods-card">
                    <div class="goods-img-box">
                        ${item.img}
                        <span class="goods-badge-top">今日直达</span>
                    </div>
                    <div class="goods-info">
                        <div class="goods-name">${item.name}</div>
                        <div class="tag-row">
                            <span class="tag-orange">${item.tag1}</span>
                            <span class="tag-red">${item.tag2}</span>
                        </div>
                        <div class="price-row">
                            <div class="price-group">
                                <span class="price-unit">¥</span>
                                <span class="price-num">${item.price}</span>
                                <span class="price-origin">¥${item.originPrice}</span>
                            </div>
                            <button class="add-cart-btn" onclick="addToCart(event, '${item.name}')">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 添加购物车逻辑
        function addToCart(event, name) {
            event.stopPropagation(); // 阻止冒泡
            alert(`🛒 已为您将 [${name}] 加至购物车!`);
        }

        // 底部 Tab 切换模拟
        function switchTab(element, name) {
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            if (name !== '分类') {
                alert(`🧭 即将切换跳转至 [${name}] 页面`);
            }
        }
    </script>
</body>
</html>
