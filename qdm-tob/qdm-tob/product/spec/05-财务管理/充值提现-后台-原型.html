<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充值提现</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        :root { --primary: #409eff; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 10px;
        }
        .search-card {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            padding-bottom: 0px;
            margin-bottom: 10px;
        }
        .summary-card {
            background: #fff;
            border-radius: 8px;
            padding: 10px 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 14px;
        }
        .summary-card .label { color: #909399; }
        .summary-card .value { color: #e6a23c; font-weight: 600; font-size: 16px; }
        .data-card {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .toolbar-left {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: #909399;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
        .tag-recharge-success { background: #f0f9eb; color: #67c23a; border:1px solid #e1f3d8; }
        .tag-recharging { background: #fdf6ec; color: #e6a23c; border:1px solid #faecd8; }
        .tag-withdrawing { background: #fdf6ec; color: #e6a23c; border:1px solid #faecd8; }
        .tag-withdrawn { background: #f0f9eb; color: #67c23a; border:1px solid #e1f3d8; }
        .tag-withdraw-fail { background: #fef0f0; color: #f56c6c; border:1px solid #fde2e2; }
    </style>
</head>
<body>
    <div id="prd-root">
        <!-- ========== 查询区 ========== -->
        <div class="search-card">
            <el-form :inline="true" :model="search">
                <el-form-item label="类型">
                    <el-radio-group v-model="search.direction" @change="doSearch">
                        <el-radio-button label="">全部</el-radio-button>
                        <el-radio-button label="recharge">充值</el-radio-button>
                        <el-radio-button label="withdraw">提现</el-radio-button>
                    </el-radio-group>
                </el-form-item>
                <el-form-item label="状态">
                    <el-select v-model="search.status" placeholder="全部" clearable style="width:150px;" @change="doSearch">
                        <el-option label="充值中" value="recharging"></el-option>
                        <el-option label="充值成功" value="recharge_success"></el-option>
                        <el-option label="提现中" value="withdrawing"></el-option>
                        <el-option label="已提现" value="withdrawn"></el-option>
                        <el-option label="提现失败" value="withdraw_fail"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="结算账户">
                    <el-input v-model="search.account" placeholder="账户名称/编号" clearable style="width:180px;"></el-input>
                </el-form-item>
                <el-form-item label="入账时间">
                    <el-date-picker
                        v-model="search.dateRange"
                        type="daterange"
                        range-separator="~"
                        start-placeholder="开始日期"
                        end-placeholder="结束日期"
                        value-format="YYYY-MM-DD"
                        style="width:260px;"
                    ></el-date-picker>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" @click="doSearch">查询</el-button>
                    <el-button @click="resetSearch">重置</el-button>
                </el-form-item>
            </el-form>
        </div>

        <!-- ========== 汇总区 ========== -->
        <div class="summary-card">
            <span class="label">待处理提现金额</span>
            <span class="value">{{ formatMoney(pendingWithdrawTotal) }} 元</span>
        </div>

        <!-- ========== 操作&数据区 ========== -->
        <div class="data-card">
            <div class="toolbar">
                <div class="toolbar-left">
                    <el-button @click="handleExport">导出</el-button>
                </div>
                <span style="font-size:14px; color:#909399;">共 <b style="color:#303133;">{{ total }}</b> 条记录</span>
            </div>

            <el-table
                :data="tableData"
                v-loading="loading"
                stripe
                style="width:100%;"
                :header-cell-style="{background:'#f5f7fa', color:'#606266', fontWeight:500}"
            >
                <el-table-column type="selection" width="50" fixed="left"></el-table-column>
                <el-table-column prop="requestTime" label="入账时间" width="160" fixed="left"></el-table-column>
                <el-table-column prop="orderNo" label="单号" width="120" show-overflow-tooltip></el-table-column>
                <el-table-column prop="accountId" label="结算账户ID" width="110" show-overflow-tooltip></el-table-column>
                <el-table-column prop="accountName" label="结算账户名称" width="120"></el-table-column>
                <el-table-column label="类型" width="80" align="center">
                    <template #default="scope">
                        <span :style="{color: scope.row.direction === 'recharge' ? '#67c23a' : '#f56c6c'}">{{ scope.row.direction === 'recharge' ? '充值' : '提现' }}</span>
                    </template>
                </el-table-column>
                <el-table-column label="金额" width="120" align="right">
                    <template #default="scope">
                        <span :style="{color: scope.row.direction === 'recharge' ? '#67c23a' : '#f56c6c', fontWeight:500}">
                            {{ scope.row.direction === 'recharge' ? '+' : '-' }}{{ formatMoney(scope.row.amount) }}
                        </span>
                    </template>
                </el-table-column>
                <el-table-column label="状态" width="100" align="center">
                    <template #default="scope">
                        <el-tag :class="statusTagClass(scope.row)" size="small" disable-transitions>{{ statusText(scope.row) }}</el-tag>
                    </template>
                </el-table-column>
                <el-table-column prop="payMethod" label="收/付款方式" width="110"></el-table-column>
                <el-table-column prop="bankCardNo" label="银行卡号" width="140" show-overflow-tooltip>
                    <template #default="scope">{{ scope.row.bankCardNo || '-' }}</template>
                </el-table-column>
                <el-table-column prop="cardHolder" label="持卡人" width="90">
                    <template #default="scope">{{ scope.row.cardHolder || '-' }}</template>
                </el-table-column>
                <el-table-column prop="bankName" label="银行名称" width="100">
                    <template #default="scope">{{ scope.row.bankName || '-' }}</template>
                </el-table-column>
                <el-table-column prop="thirdPartyNo" label="第三方流水号" width="150" show-overflow-tooltip>
                    <template #default="scope">{{ scope.row.thirdPartyNo || '-' }}</template>
                </el-table-column>
                <el-table-column label="打款凭证" width="90" align="center">
                    <template #default="scope">
                        <span v-if="scope.row.voucher" style="color:#409eff;cursor:pointer;" @click="previewVoucher(scope.row)">查看</span>
                        <span v-else style="color:#c0c4cc;">-</span>
                    </template>
                </el-table-column>
                <el-table-column prop="operatorId" label="操作人ID" width="100" show-overflow-tooltip>
                    <template #default="scope">{{ scope.row.operatorId || '-' }}</template>
                </el-table-column>
                <el-table-column prop="operatorName" label="操作人" width="90">
                    <template #default="scope">{{ scope.row.operatorName || '-' }}</template>
                </el-table-column>
                <el-table-column prop="creator" label="创建人" width="100"></el-table-column>
                <el-table-column label="操作" width="130" fixed="right">
                    <template #default="scope">
                        <template v-if="scope.row.direction === 'withdraw' && scope.row.status === 'withdrawing'">
                            <el-button type="primary" link size="small" @click="openCompleteDialog(scope.row)">打款</el-button>
                            <el-button type="danger" link size="small" @click="openRejectDialog(scope.row)">驳回</el-button>
                        </template>
                        <el-button v-else type="primary" link size="small" @click="viewDetail(scope.row)">查看</el-button>
                    </template>
                </el-table-column>
            </el-table>

            <div v-if="tableData.length === 0 && !loading" class="empty-state">
                <div class="empty-state-icon">💰</div>
                <div>暂无充值提现记录</div>
            </div>

            <div style="margin-top:16px; display:flex; justify-content:flex-start;" v-if="total > 0">
                <el-pagination
                    v-model:current-page="pageNum"
                    v-model:page-size="pageSize"
                    :page-sizes="[10, 20, 50]"
                    :total="total"
                    layout="total, sizes, prev, pager, next"
                    background
                ></el-pagination>
            </div>
        </div>

        <!-- ========== 完成打款弹窗 ========== -->
        <el-dialog v-model="completeDialog.visible" title="完成打款" width="480px" :close-on-click-modal="false">
            <el-form :model="completeForm" ref="completeFormRef" label-width="100px" :rules="completeRules">
                <el-form-item label="转账银行卡号" prop="bankCardNo">
                    <el-input v-model="completeForm.bankCardNo" placeholder="请输入财务打款使用的银行卡号" maxlength="32"></el-input>
                </el-form-item>
                <el-form-item label="打款凭证" prop="voucher">
                    <el-upload
                        :auto-upload="false"
                        :limit="1"
                        accept=".jpg,.png"
                        :on-change="handleVoucherChange"
                    >
                        <el-button size="small" type="primary">上传凭证</el-button>
                        <template #tip><div style="font-size:12px;color:#909399;">银行转账截图，jpg/png，≤5MB</div></template>
                    </el-upload>
                </el-form-item>
                <el-form-item label="备注">
                    <el-input v-model="completeForm.remark" type="textarea" :rows="2" placeholder="补充说明" maxlength="200"></el-input>
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="completeDialog.visible = false">取消</el-button>
                <el-button type="primary" @click="submitComplete" :loading="completeDialog.submitting">确定</el-button>
            </template>
        </el-dialog>

        <!-- ========== 驳回提现弹窗 ========== -->
        <el-dialog v-model="rejectDialog.visible" title="驳回提现" width="480px" :close-on-click-modal="false">
            <el-form :model="rejectForm" ref="rejectFormRef" label-width="100px" :rules="rejectRules">
                <el-form-item label="驳回原因" prop="reason">
                    <el-input v-model="rejectForm.reason" type="textarea" :rows="3" placeholder="请输入驳回原因，客户可见" maxlength="200" show-word-limit></el-input>
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="rejectDialog.visible = false">取消</el-button>
                <el-button type="primary" @click="submitReject" :loading="rejectDialog.submitting">确定驳回</el-button>
            </template>
        </el-dialog>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script>

        // 1. 刚进入 A 界面时：立刻通知外壳隐藏底栏
        window.onload = function() {
            if (window.parent) {
                window.parent.postMessage('HIDE_OUTER_TABBAR', '*');
            }
        }

        // 2. 点击 A 界面的 Vant 返回按钮时：通知外壳显示底栏，然后后退
        function onClickLeft() {
            if (window.parent) {
                window.parent.postMessage('SHOW_OUTER_TABBAR', '*');
            }
            // 执行返回
            window.history.back(); 
        }

        const { createApp, ref, reactive, computed, watch, nextTick } = Vue;

        const app = createApp({
            setup() {
                const allData = ref([
                    { id: 1, requestTime: '2026-07-01 21:07:44', orderNo: 'WD20260701001', accountId: 'ACC001', accountName: '王博A', direction: 'recharge', amount: 500.00, status: 'recharge_success', payMethod: '微信', bankCardNo: '', cardHolder: '', bankName: '', thirdPartyNo: 'WX20260701210744', voucher: '', operatorId: '', operatorName: '', creator: '张三' },
                    { id: 2, requestTime: '2026-06-30 16:20:00', orderNo: 'WD20260630002', accountId: 'ACC001', accountName: '王博A', direction: 'recharge', amount: 1000.00, status: 'recharge_success', payMethod: '银行转账', bankCardNo: '6222021234567890', cardHolder: '王博A', bankName: '工商银行', thirdPartyNo: 'SAP20260630001', voucher: '', operatorId: '', operatorName: '', creator: 'SAP' },
                    { id: 3, requestTime: '2026-06-29 14:10:00', orderNo: 'WD20260629003', accountId: 'ACC001', accountName: '王博A', direction: 'withdraw', amount: 200.00, status: 'withdrawing', payMethod: '银行卡', bankCardNo: '6228480012345678', cardHolder: '王博A', bankName: '招商银行', thirdPartyNo: '', voucher: '', operatorId: '', operatorName: '', creator: '李四' },
                    { id: 4, requestTime: '2026-06-28 10:05:00', orderNo: 'WD20260628004', accountId: 'ACC001', accountName: '王博A', direction: 'withdraw', amount: 300.00, status: 'withdrawn', payMethod: '银行卡', bankCardNo: '6228480012345678', cardHolder: '王博A', bankName: '招商银行', thirdPartyNo: 'TRN20260628', voucher: 'voucher_url_001', operatorId: 'OP001', operatorName: '财务1', creator: '张三' },
                    { id: 5, requestTime: '2026-06-27 09:30:00', orderNo: 'WD20260627005', accountId: 'ACC002', accountName: '李四公司', direction: 'recharge', amount: 5000.00, status: 'recharge_success', payMethod: '微信', bankCardNo: '', cardHolder: '', bankName: '', thirdPartyNo: 'WX20260627093000', voucher: '', operatorId: '', operatorName: '', creator: '王五' },
                    { id: 6, requestTime: '2026-06-26 15:45:00', orderNo: 'WD20260626006', accountId: 'ACC002', accountName: '李四公司', direction: 'withdraw', amount: 800.00, status: 'withdraw_fail', payMethod: '银行卡', bankCardNo: '6227001234567890', cardHolder: '李四', bankName: '建设银行', thirdPartyNo: '', voucher: '', operatorId: 'OP002', operatorName: '财务2', creator: '李四' },
                ]);

                // ================================================================
                // 搜索 & 分页
                // ================================================================
                const search = reactive({ direction: '', status: '', account: '', dateRange: null });
                const pageNum = ref(1);
                const pageSize = ref(20);
                const loading = ref(false);

                const filteredData = computed(() => {
                    let list = allData.value;
                    if (search.direction) list = list.filter(r => r.direction === search.direction);
                    if (search.status) list = list.filter(r => r.status === search.status);
                    if (search.account) {
                        const kw = search.account.toLowerCase();
                        list = list.filter(r => r.accountName.toLowerCase().includes(kw) || r.accountId.toLowerCase().includes(kw));
                    }
                    if (search.dateRange && search.dateRange.length === 2) {
                        const [s, e] = search.dateRange;
                        list = list.filter(r => r.requestTime >= s && r.requestTime <= e + ' 23:59:59');
                    }
                    return list;
                });

                const total = computed(() => filteredData.value.length);

                const tableData = computed(() => {
                    const start = (pageNum.value - 1) * pageSize.value;
                    return filteredData.value.slice(start, start + pageSize.value);
                });

                const pendingWithdrawTotal = computed(() => {
                    return allData.value
                        .filter(r => r.direction === 'withdraw' && r.status === 'withdrawing')
                        .reduce((sum, r) => sum + r.amount, 0);
                });

                watch([() => search.direction, () => search.status, () => search.account, () => search.dateRange], () => { pageNum.value = 1; });

                function doSearch() { pageNum.value = 1; }
                function resetSearch() {
                    search.direction = '';
                    search.status = '';
                    search.account = '';
                    search.dateRange = null;
                    pageNum.value = 1;
                }

                // ================================================================
                // 工具
                // ================================================================
                function formatMoney(val) {
                    if (val == null) return '-';
                    return Number(val).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                }

                function statusTagClass(row) {
                    const map = { recharging: 'tag-recharging', recharge_success: 'tag-recharge-success', withdrawing: 'tag-withdrawing', withdrawn: 'tag-withdrawn', withdraw_fail: 'tag-withdraw-fail' };
                    return map[row.status] || '';
                }

                function statusText(row) {
                    const map = { recharging: '充值中', recharge_success: '充值成功', withdrawing: '提现中', withdrawn: '已提现', withdraw_fail: '提现失败' };
                    return map[row.status] || row.status;
                }

                function handleExport() {
                    ElementPlus.ElMessage.success('导出中，共 ' + total.value + ' 条（模拟）');
                }

                function viewDetail(row) {
                    ElementPlus.ElMessage.info('查看详情：' + row.orderNo);
                }

                function previewVoucher(row) {
                    ElementPlus.ElMessage.info('预览打款凭证（模拟）');
                }

                // ================================================================
                // 完成打款弹窗
                // ================================================================
                const completeDialog = reactive({ visible: false, submitting: false, row: null });
                const completeFormRef = ref(null);
                const completeForm = reactive({ bankCardNo: '', voucher: null, remark: '' });
                const completeRules = {
                    voucher: [{ required: true, message: '请上传打款凭证', trigger: 'change' }],
                };

                function openCompleteDialog(row) {
                    completeDialog.row = row;
                    completeDialog.submitting = false;
                    completeForm.bankCardNo = '';
                    completeForm.voucher = null;
                    completeForm.remark = '';
                    completeDialog.visible = true;
                    nextTick(() => { if (completeFormRef.value) completeFormRef.value.clearValidate(); });
                }

                function handleVoucherChange(file) {
                    completeForm.voucher = file.raw;
                }

                function submitComplete() {
                    if (!completeFormRef.value) return;
                    completeFormRef.value.validate((valid) => {
                        if (!valid) return;
                        completeDialog.submitting = true;
                        setTimeout(() => {
                            const row = completeDialog.row;
                            if (row) {
                                row.status = 'withdrawn';
                                row.voucher = '已上传';
                                row.thirdPartyNo = completeForm.bankCardNo || 'TRN' + Date.now();
                                row.operatorId = 'OP001';
                                row.operatorName = '当前用户';
                            }
                            completeDialog.submitting = false;
                            completeDialog.visible = false;
                            ElementPlus.ElMessage.success('打款完成');
                        }, 400);
                    });
                }

                // ================================================================
                // 驳回提现弹窗
                // ================================================================
                const rejectDialog = reactive({ visible: false, submitting: false, row: null });
                const rejectFormRef = ref(null);
                const rejectForm = reactive({ reason: '' });
                const rejectRules = {
                    reason: [{ required: true, message: '请输入驳回原因', trigger: 'blur' }],
                };

                function openRejectDialog(row) {
                    rejectDialog.row = row;
                    rejectDialog.submitting = false;
                    rejectForm.reason = '';
                    rejectDialog.visible = true;
                    nextTick(() => { if (rejectFormRef.value) rejectFormRef.value.clearValidate(); });
                }

                function submitReject() {
                    if (!rejectFormRef.value) return;
                    rejectFormRef.value.validate((valid) => {
                        if (!valid) return;
                        rejectDialog.submitting = true;
                        setTimeout(() => {
                            const row = rejectDialog.row;
                            if (row) {
                                row.status = 'withdraw_fail';
                                row.operatorId = 'OP001';
                                row.operatorName = '当前用户';
                            }
                            rejectDialog.submitting = false;
                            rejectDialog.visible = false;
                            ElementPlus.ElMessage.success('已驳回提现申请');
                        }, 400);
                    });
                }

                return {
                    search, pageNum, pageSize, loading, tableData, total, pendingWithdrawTotal,
                    completeDialog, completeFormRef, completeForm, completeRules,
                    rejectDialog, rejectFormRef, rejectForm, rejectRules,
                    doSearch, resetSearch, formatMoney, statusTagClass, statusText,
                    handleExport, viewDetail, previewVoucher,
                    openCompleteDialog, handleVoucherChange, submitComplete,
                    openRejectDialog, submitReject,
                };
            }
        });

        app.use(ElementPlus, { locale: ElementPlusLocaleZhCn }).mount('#prd-root');
    </script>
</body>
</html>
