<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库信息管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        :root { --primary: #409eff; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 10px;
        }
        .query-card {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            padding-bottom: 0px;
            margin-bottom: 10px;
        }
        .data-card {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
        }
        .wh-code-link {
            color: #409eff;
            cursor: pointer;
            font-weight: 500;
        }
        .wh-code-link:hover {
            color: #337ecc;
            text-decoration: underline;
        }
        .biz-notice {
            background: #ecf5ff;
            border-radius: 8px;
            padding: 16px 20px;
            margin-top: 16px;
        }
        .biz-notice h4 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #409eff;
        }
        .biz-notice ul {
            margin: 0;
            padding-left: 20px;
        }
        .biz-notice li {
            font-size: 13px;
            color: #606266;
            line-height: 2;
        }
        .toolbar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div id="prd-root">
        <!-- ========== 查询区 ========== -->
        <div class="query-card">
            <el-form :model="search" inline>
                <el-form-item label="仓库信息">
                    <el-input
                        v-model="search.keyword"
                        placeholder="仓库编码/名称"
                        clearable
                        style="width:200px;"
                        @keyup.enter="doSearch"
                    ></el-input>
                </el-form-item>
                <el-form-item label="销售大区">
                    <el-select v-model="search.region" placeholder="全部" clearable style="width:160px;">
                        <el-option label="海南区" value="hainan"></el-option>
                        <el-option label="广深区" value="guangshen"></el-option>
                        <el-option label="华东区" value="huadong"></el-option>
                        <el-option label="华中区" value="huazhong"></el-option>
                        <el-option label="西南区" value="xinan"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" @click="doSearch">查询</el-button>
                    <el-button @click="resetSearch">重置</el-button>
                </el-form-item>
            </el-form>
        </div>

        <!-- ========== 操作&数据区 ========== -->
        <div class="data-card">
            <div class="toolbar-row">
                <el-button type="primary" @click="openAdd">新增仓库</el-button>
                <span style="font-size:13px;color:#909399;">共 {{ total }} 条记录</span>
            </div>

            <el-table
                :data="tableData"
                stripe
                v-loading="loading"
                style="width:100%;"
                :default-sort="{prop: 'updateTime', order: 'descending'}"
                :header-cell-style="{background:'#f5f7fa', color:'#606266', fontWeight:500}"
                @selection-change="handleSelectionChange"
            >
                <el-table-column type="selection" width="50" fixed="left"></el-table-column>
                <el-table-column prop="code" label="仓库编码" width="120" fixed="left">
                    <template #default="scope">
                        <span class="wh-code-link" @click="viewDetail(scope.row)">{{ scope.row.code }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="name" label="仓库名称" width="140" show-overflow-tooltip></el-table-column>
                <el-table-column label="销售大区" width="120">
                    <template #default="scope">
                        <span class="region-new-tag">{{ scope.row.region }}</span>
                    </template>
                </el-table-column>
                <el-table-column prop="type" label="仓库性质" width="110"></el-table-column>
                <el-table-column label="仓库地区" width="200" show-overflow-tooltip>
                    <template #default="scope">
                        {{ scope.row.province }} {{ scope.row.city }} {{ scope.row.district }}
                    </template>
                </el-table-column>
                <el-table-column prop="address" label="仓库地址" min-width="180" show-overflow-tooltip></el-table-column>
                <el-table-column prop="lng" label="经度" width="110" align="right"></el-table-column>
                <el-table-column prop="lat" label="纬度" width="110" align="right"></el-table-column>
                <el-table-column prop="updater" label="修改人" width="110"></el-table-column>
                <el-table-column prop="updateTime" label="修改时间" width="170" sortable></el-table-column>
                <el-table-column label="操作" width="80" fixed="right">
                    <template #default="scope">
                        <el-button type="primary" link @click="openEdit(scope.row)">编辑</el-button>
                    </template>
                </el-table-column>
            </el-table>

            <div style="margin-top:16px;display:flex;justify-content:flex-start;">
                <el-pagination
                    v-model:current-page="pageNum"
                    v-model:page-size="pageSize"
                    :page-sizes="[10, 20, 50]"
                    :total="total"
                    layout="total, sizes, prev, pager, next"
                    background
                ></el-pagination>
            </div>
        </div>

        <!-- ========== 编辑弹窗 ========== -->
        <el-dialog
            v-model="dialog.visible"
            :title="dialog.isEdit ? '编辑仓库 — ' + form.code : '新增仓库'"
            width="560px"
            :close-on-click-modal="false"
            @close="resetForm"
        >
            <el-form ref="formRef" :model="form" :rules="rules" label-width="100px">
                <el-form-item label="仓库编码" prop="code">
                    <el-input v-model="form.code" :disabled="dialog.isEdit" placeholder="请输入仓库编码" maxlength="20"></el-input>
                </el-form-item>
                <el-form-item label="仓库名称" prop="name">
                    <el-input v-model="form.name" placeholder="请输入仓库名称" maxlength="50"></el-input>
                </el-form-item>
                <el-form-item label="销售大区" prop="region">
                    <el-select v-model="form.region" placeholder="请选择销售大区" style="width:100%;">
                        <el-option label="海南区" value="hainan"></el-option>
                        <el-option label="广深区" value="guangshen"></el-option>
                        <el-option label="华东区" value="huadong"></el-option>
                        <el-option label="华中区" value="huazhong"></el-option>
                        <el-option label="西南区" value="xinan"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="仓库性质" prop="type">
                    <el-select v-model="form.type" placeholder="请选择仓库性质" style="width:100%;">
                        <el-option label="蔬果仓" value="蔬果仓"></el-option>
                        <el-option label="猪肉仓" value="猪肉仓"></el-option>
                        <el-option label="水产仓" value="水产仓"></el-option>
                        <el-option label="禽肉仓" value="禽肉仓"></el-option>
                        <el-option label="综合仓" value="综合仓"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="仓库地区" prop="district">
                    <el-cascader
                        v-model="form.district"
                        :options="regionOptions"
                        placeholder="请选择省/市/区"
                        style="width:100%;"
                    ></el-cascader>
                </el-form-item>
                <el-form-item label="仓库地址" prop="address">
                    <el-input v-model="form.address" placeholder="请输入详细地址" maxlength="200"></el-input>
                </el-form-item>
                <el-form-item label="经度" prop="lng">
                    <el-input-number
                        v-model="form.lng"
                        :precision="6"
                        :min="-180"
                        :max="180"
                        :step="0.000001"
                        placeholder="经度"
                        style="width:100%;"
                    ></el-input-number>
                </el-form-item>
                <el-form-item label="纬度" prop="lat">
                    <el-input-number
                        v-model="form.lat"
                        :precision="6"
                        :min="-90"
                        :max="90"
                        :step="0.000001"
                        placeholder="纬度"
                        style="width:100%;"
                    ></el-input-number>
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="dialog.visible = false">取消</el-button>
                <el-button type="primary" @click="submitForm">确定</el-button>
            </template>
        </el-dialog>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script>
        const { createApp, ref, reactive, nextTick, watch } = Vue;

        createApp({
            setup() {
                const loading = ref(false);
                const pageNum = ref(1);
                const pageSize = ref(20);
                const total = ref(0);
                const tableData = ref([]);
                const selectedRows = ref([]);
                const formRef = ref(null);

                const search = reactive({ keyword: '', region: '' });

                const dialog = reactive({ visible: false, isEdit: false });
                const form = reactive({
                    code: '', name: '', region: '', type: '',
                    district: [], address: '', lng: null, lat: null,
                });

                const rules = {
                    code: [
                        { required: true, message: '请输入仓库编码', trigger: 'blur' },
                        { pattern: /^[A-Z0-9]+$/, message: '编码仅支持大写字母和数字', trigger: 'blur' },
                    ],
                    name: [{ required: true, message: '请输入仓库名称', trigger: 'blur' }],
                    region: [{ required: true, message: '请选择销售大区', trigger: 'change' }],
                    type: [{ required: true, message: '请选择仓库性质', trigger: 'change' }],
                    district: [{ required: true, message: '请选择仓库地区', trigger: 'change' }],
                    address: [{ required: true, message: '请输入详细地址', trigger: 'blur' }],
                    lng: [
                        { required: true, message: '请输入经度', trigger: 'blur' },
                        { type: 'number', min: -180, max: 180, message: '经度范围 -180~180', trigger: 'blur' },
                    ],
                    lat: [
                        { required: true, message: '请输入纬度', trigger: 'blur' },
                        { type: 'number', min: -90, max: 90, message: '纬度范围 -90~90', trigger: 'blur' },
                    ],
                };

                const regionOptions = [
                    { value: '广东省', label: '广东省', children: [
                        { value: '广州市', label: '广州市', children: [{ value: '天河区', label: '天河区' }, { value: '白云区', label: '白云区' }, { value: '番禺区', label: '番禺区' }] },
                        { value: '深圳市', label: '深圳市', children: [{ value: '南山区', label: '南山区' }, { value: '福田区', label: '福田区' }, { value: '龙岗区', label: '龙岗区' }] },
                        { value: '东莞市', label: '东莞市', children: [{ value: '莞城区', label: '莞城区' }] },
                    ]},
                    { value: '海南省', label: '海南省', children: [
                        { value: '海口市', label: '海口市', children: [{ value: '龙华区', label: '龙华区' }, { value: '美兰区', label: '美兰区' }] },
                        { value: '三亚市', label: '三亚市', children: [{ value: '吉阳区', label: '吉阳区' }] },
                    ]},
                    { value: '浙江省', label: '浙江省', children: [
                        { value: '杭州市', label: '杭州市', children: [{ value: '余杭区', label: '余杭区' }, { value: '萧山区', label: '萧山区' }] },
                    ]},
                    { value: '湖北省', label: '湖北省', children: [
                        { value: '武汉市', label: '武汉市', children: [{ value: '洪山区', label: '洪山区' }, { value: '江岸区', label: '江岸区' }] },
                    ]},
                    { value: '四川省', label: '四川省', children: [
                        { value: '成都市', label: '成都市', children: [{ value: '武侯区', label: '武侯区' }, { value: '锦江区', label: '锦江区' }] },
                    ]},
                ];

                const allData = [
                    { id: 1, code: 'D011', name: '海南海口仓', region: '海南区', type: '蔬果仓', province: '海南省', city: '海口市', district: '龙华区', address: '海口市龙华区椰海大道123号冷链物流园', lng: '110.329518', lat: '20.031890', updater: '张三', updateTime: '2026-06-30 14:22:00' },
                    { id: 2, code: 'D012', name: '广深区一号仓', region: '广深区', type: '猪肉仓', province: '广东省', city: '广州市', district: '白云区', address: '广州市白云区太和镇沙太路88号', lng: '113.280765', lat: '23.210456', updater: '李四', updateTime: '2026-06-29 10:15:00' },
                    { id: 3, code: 'D013', name: '广深区二号仓', region: '广深区', type: '水产仓', province: '广东省', city: '深圳市', district: '南山区', address: '深圳市南山区西丽街道留仙大道2001号', lng: '113.944528', lat: '22.581008', updater: '王五', updateTime: '2026-06-28 16:08:00' },
                    { id: 4, code: 'D014', name: '华东杭州仓', region: '华东区', type: '综合仓', province: '浙江省', city: '杭州市', district: '余杭区', address: '杭州市余杭区仓前街道文一西路1500号', lng: '120.006780', lat: '30.303450', updater: '赵六', updateTime: '2026-06-27 09:30:00' },
                    { id: 5, code: 'D015', name: '华中武汉仓', region: '华中区', type: '蔬果仓', province: '湖北省', city: '武汉市', district: '洪山区', address: '武汉市洪山区珞喻路1037号', lng: '114.371598', lat: '30.519213', updater: '张三', updateTime: '2026-06-26 11:45:00' },
                    { id: 6, code: 'D016', name: '西南成都仓', region: '西南区', type: '禽肉仓', province: '四川省', city: '成都市', district: '武侯区', address: '成都市武侯区天府大道北段1700号', lng: '104.068546', lat: '30.567312', updater: '李四', updateTime: '2026-06-25 08:20:00' },
                    { id: 7, code: 'D017', name: '海南三亚仓', region: '海南区', type: '水产仓', province: '海南省', city: '三亚市', district: '吉阳区', address: '三亚市吉阳区迎宾路456号', lng: '109.512418', lat: '18.246859', updater: '王五', updateTime: '2026-06-24 15:10:00' },
                    { id: 8, code: 'D018', name: '华东冷链仓', region: '华东区', type: '综合仓', province: '浙江省', city: '杭州市', district: '萧山区', address: '杭州市萧山区宁围街道鸿达路99号', lng: '120.330867', lat: '30.198532', updater: '赵六', updateTime: '2026-06-23 12:00:00' },
                    { id: 9, code: 'D019', name: '广深三号仓', region: '广深区', type: '蔬果仓', province: '广东省', city: '东莞市', district: '莞城区', address: '东莞市莞城区东城大道55号', lng: '113.751951', lat: '23.021472', updater: '张三', updateTime: '2026-06-22 17:30:00' },
                    { id: 10, code: 'D020', name: '华中冷链仓', region: '华中区', type: '猪肉仓', province: '湖北省', city: '武汉市', district: '江岸区', address: '武汉市江岸区沿江大道168号', lng: '114.307581', lat: '30.601234', updater: '李四', updateTime: '2026-06-21 09:45:00' },
                ];

                const loadData = () => {
                    loading.value = true;
                    setTimeout(() => {
                        let filtered = [...allData];
                        if (search.keyword) {
                            const kw = search.keyword.toLowerCase();
                            filtered = filtered.filter(item =>
                                item.code.toLowerCase().includes(kw) ||
                                item.name.toLowerCase().includes(kw)
                            );
                        }
                        if (search.region) {
                            filtered = filtered.filter(item => item.region === search.region);
                        }
                        total.value = filtered.length;
                        const start = (pageNum.value - 1) * pageSize.value;
                        tableData.value = filtered.slice(start, start + pageSize.value);
                        loading.value = false;
                    }, 300);
                };

                const doSearch = () => {
                    pageNum.value = 1;
                    loadData();
                };

                const resetSearch = () => {
                    search.keyword = '';
                    search.region = '';
                    pageNum.value = 1;
                    loadData();
                };

                const handleSelectionChange = (rows) => {
                    selectedRows.value = rows;
                };

                const viewDetail = (row) => {
                    ElementPlus.ElMessage.info('查看仓库详情：' + row.code + ' ' + row.name);
                };

                const openAdd = () => {
                    dialog.isEdit = false;
                    resetForm();
                    dialog.visible = true;
                };

                const openEdit = (row) => {
                    dialog.isEdit = true;
                    form.code = row.code;
                    form.name = row.name;
                    form.region = row.region;
                    form.type = row.type;
                    form.district = [row.province, row.city, row.district];
                    form.address = row.address;
                    form.lng = parseFloat(row.lng);
                    form.lat = parseFloat(row.lat);
                    dialog.visible = true;
                };

                const resetForm = () => {
                    form.code = '';
                    form.name = '';
                    form.region = '';
                    form.type = '';
                    form.district = [];
                    form.address = '';
                    form.lng = null;
                    form.lat = null;
                    nextTick(function() { formRef.value && formRef.value.clearValidate(); });
                };

                const submitForm = () => {
                    formRef.value && formRef.value.validate(function(valid) {
                        if (!valid) return;
                        var now = new Date().toISOString().replace('T', ' ').slice(0, 19);
                        if (dialog.isEdit) {
                            var item = allData.find(function(i) { return i.code === form.code; });
                            if (item) {
                                item.name = form.name;
                                item.region = form.region;
                                item.type = form.type;
                                item.province = form.district[0] || '';
                                item.city = form.district[1] || '';
                                item.district = form.district[2] || '';
                                item.address = form.address;
                                item.lng = form.lng.toFixed(6);
                                item.lat = form.lat.toFixed(6);
                                item.updater = '管理员';
                                item.updateTime = now;
                            }
                            ElementPlus.ElMessage.success('仓库信息更新成功');
                        } else {
                            allData.unshift({
                                id: Date.now(),
                                code: form.code,
                                name: form.name,
                                region: form.region,
                                type: form.type,
                                province: form.district[0] || '',
                                city: form.district[1] || '',
                                district: form.district[2] || '',
                                address: form.address,
                                lng: form.lng.toFixed(6),
                                lat: form.lat.toFixed(6),
                                updater: '管理员',
                                updateTime: now,
                            });
                            ElementPlus.ElMessage.success('仓库创建成功');
                        }
                        dialog.visible = false;
                        loadData();
                    });
                };

                loadData();

                watch([pageNum, pageSize], function() { loadData(); });

                return {
                    search, loading, pageNum, pageSize, total, tableData, selectedRows,
                    dialog, form, formRef, rules, regionOptions,
                    doSearch, resetSearch, handleSelectionChange,
                    viewDetail, openAdd, openEdit, resetForm, submitForm,
                };
            }
        }).use(ElementPlus, { locale: ElementPlusLocaleZhCn }).mount('#prd-root');
    </script>
</body>
</html>
