<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>隐私政策</title>
  <link rel="stylesheet" href="https://unpkg.com/vant@4/lib/index.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root { --van-primary-color: #ff0000; }
    body {
      background-color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      margin: 0; padding: 0; box-sizing: border-box;
    }
    ::-webkit-scrollbar { display: none; }

    .page-view { padding: 12px; padding-bottom: 24px; }

    /* 分组卡片 */
    .section-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .section-title { font-size: 14px; color: #9ca3af; margin-bottom: 12px; font-weight: 500; }

    /* 子入口行 */
    .sub-entry-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; cursor: pointer; border-bottom: 1px solid #f8fafc;
    }
    .sub-entry-row:last-child { border-bottom: none; }
    .sub-entry-row:active { opacity: 0.7; }
    .sub-entry-label { font-size: 14px; color: #374151; }

    .entry-arrow { color: #c0c4cc; font-size: 16px; }

    /* 下载内容行 */
    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f8fafc;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 14px; color: #6b7280; }
    .info-value { font-size: 14px; color: #1f2937; }

    /* 富文本渲染区 */
    .rich-content { padding: 12px 0; font-size: 15px; line-height: 1.8; color: #374151; word-break: break-all; }
    .rich-content h1, .rich-content h2, .rich-content h3 { margin: 16px 0 8px; }
    .rich-content p { margin: 8px 0; }
    .rich-content ul, .rich-content ol { padding-left: 20px; margin: 8px 0; }

    /* 版本选择器 */
    .version-trigger {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 14px; color: #1f2937; font-weight: 500;
      background: #f3f4f6; padding: 6px 12px; border-radius: 6px; cursor: pointer;
    }
    .version-trigger:active { background: #e5e7eb; }

    .privacy-header-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px; gap: 8px;
    }
    .privacy-header-row .actions { display: flex; gap: 6px; flex-shrink: 0; }

    .fixed-tip {
      background: #fef3c7; color: #92400e; font-size: 13px;
      padding: 10px 14px; border-radius: 8px; line-height: 1.6; margin-top: 12px;
    }
  </style>
</head>
<body>
  <div id="prd-root">

    <!-- ============================================================ -->
    <!-- 视图：隐私管理（二级）                                         -->
    <!-- ============================================================ -->
    <div v-if="currentView === 'privacy-manage'">
      <van-nav-bar title="隐私管理" left-text="返回" left-arrow @click-left="goBack"></van-nav-bar>
      <div class="page-view">
        <div class="section-card" style="padding:0;">
          <div class="sub-entry-row" style="padding:12px 16px;" @click="goTo('personal-info')">
            <span class="sub-entry-label">👤 个人信息</span>
            <span class="entry-arrow">›</span>
          </div>
        </div>

        <div class="section-card">
          <div class="section-title">📷 相机/相册授权</div>
          <van-cell title="相机" center>
            <template #right-icon>
              <van-switch v-model="authCamera" size="24px" @change="onAuthChange('camera', authCamera)"></van-switch>
            </template>
          </van-cell>
          <van-cell title="相册" center>
            <template #right-icon>
              <van-switch v-model="authAlbum" size="24px" @change="onAuthChange('album', authAlbum)"></van-switch>
            </template>
          </van-cell>
        </div>

        <div class="section-card" style="padding:0;">
          <div class="section-title" style="padding:16px 16px 0 16px;">📄 隐私说明</div>
          <div class="sub-entry-row" style="padding:12px 16px;" @click="goToDoc('隐私政策')">
            <span class="sub-entry-label">隐私政策</span>
            <span class="entry-arrow">›</span>
          </div>
          <div class="sub-entry-row" style="padding:12px 16px;" @click="goToDoc('隐私政策摘要')">
            <span class="sub-entry-label">隐私政策摘要</span>
            <span class="entry-arrow">›</span>
          </div>
          <div class="sub-entry-row" style="padding:12px 16px;" @click="goToDoc('用户管理规则及公约')">
            <span class="sub-entry-label">用户管理规则及公约</span>
            <span class="entry-arrow">›</span>
          </div>
          <div class="sub-entry-row" style="padding:12px 16px 16px;" @click="goToDoc('用户协议')">
            <span class="sub-entry-label">用户协议</span>
            <span class="entry-arrow">›</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ============================================================ -->
    <!-- 视图：个人信息（三级）                                         -->
    <!-- ============================================================ -->
    <div v-if="currentView === 'personal-info'">
      <van-nav-bar title="个人信息" left-text="返回" left-arrow @click-left="goBack"></van-nav-bar>
      <div class="page-view">
        <div class="section-card">
          <div class="section-title">下载内容</div>
          <div class="info-row">
            <span class="info-label">用户名</span>
            <span class="info-value">{{ userInfo.name }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">手机号码</span>
            <span class="info-value">{{ maskPhone(userInfo.phone) }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">车牌号</span>
            <span class="info-value">{{ userInfo.plateNo }}</span>
          </div>
        </div>

        <div class="section-card">
          <div class="section-title">下载设置</div>
          <van-field v-model="emailInput" label="邮箱地址" placeholder="请输入您的邮箱地址" type="email" clearable></van-field>
          <div class="fixed-tip" style="margin:0 16px 16px 16px;">我们将在5个工作日内将文件以Excel格式发送至您的邮箱。</div>
          <div style="padding:0 16px 16px;">
            <van-button type="primary" block round @click="submitDownload">提交申请</van-button>
          </div>
        </div>
      </div>
    </div>

    <!-- ============================================================ -->
    <!-- 视图：只读文档（个人信息收集清单 / 第三方共享个人信息清单）      -->
    <!-- ============================================================ -->
    <div v-if="currentView === 'readonly-doc'">
      <van-nav-bar :title="readonlyDocTitle" left-text="返回" left-arrow @click-left="goBack"></van-nav-bar>
      <div class="page-view">
        <div class="rich-content" v-html="readonlyContent"></div>
        <div v-if="!readonlyContent" style="text-align:center;padding:60px 0;color:#9ca3af;">
          <div style="font-size:48px;margin-bottom:8px;">📄</div>
          <div style="font-size:14px;">暂无内容</div>
        </div>
      </div>
    </div>

    <!-- ============================================================ -->
    <!-- 视图：文档详情（隐私政策 / 摘要 / 公约 / 用户协议）              -->
    <!-- ============================================================ -->
    <div v-if="currentView === 'doc-detail'">
      <van-nav-bar :title="docType" left-text="返回" left-arrow @click-left="goBack"></van-nav-bar>
      <div class="page-view">
        <!-- 隐私政策专属：版本 + 复制 + 下载 -->
        <div v-if="docType === '隐私政策'" class="privacy-header-row">
          <span class="version-trigger" @click="showVersionPicker = true">{{ selectedVersionDate }} <span style="font-size:10px;">▼</span></span>
          <div class="actions">
            <van-button size="small" plain type="primary" @click="copyDocUrl">复制地址</van-button>
            <van-button size="small" plain type="default" @click="downloadDoc">下载</van-button>
          </div>
        </div>

        <div class="rich-content" v-html="docContent"></div>
        <div v-if="!docContent" style="text-align:center;padding:60px 0;color:#9ca3af;">
          <div style="font-size:48px;margin-bottom:8px;">📄</div>
          <div style="font-size:14px;">暂无内容</div>
        </div>
      </div>
    </div>

    <!-- ============================================================ -->
    <!-- 版本选择器弹窗                                                 -->
    <!-- ============================================================ -->
    <van-popup v-model:show="showVersionPicker" position="bottom" round>
      <van-picker :columns="versionColumns" :default-index="selectedVersionIndex" @confirm="onVersionConfirm" @cancel="showVersionPicker = false" title="选择版本日期"></van-picker>
    </van-popup>

  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vant@4/lib/vant.min.js"></script>
  <script>
    const { createApp, ref, reactive, computed } = Vue;

    createApp({
      setup() {
        // ===== 视图状态（导航栈） =====
        const viewStack = ref([]);
        const currentView = ref('');

        // ===== 文档类型/标题 =====
        const docType = ref('');
        const readonlyDocTitle = ref('');

        // ===== 授权开关 =====
        const authCamera = ref(true);
        const authAlbum = ref(true);

        // ===== 用户信息 =====
        const userInfo = reactive({ name: '张三', phone: '13812345678', plateNo: '粤A12345' });
        const emailInput = ref('');

        // ===== 隐私政策版本 =====
        const versionList = ref(['2026年07月01日','2026年06月15日','2026年05月20日','2026年04月10日']);
        const selectedVersionDate = ref('2026年07月01日');
        const selectedVersionIndex = ref(0);
        const showVersionPicker = ref(false);
        const versionColumns = computed(() => versionList.value.map(v => ({ text: v, value: v })));

        // ===== 文档内容 =====
        const docContent = ref('');
        const readonlyContent = ref('');

        // ===== 模拟文档内容 =====
        const mockDocContent = (type) => {
          if (type === '隐私政策') return '<h2>隐私政策</h2><p>更新日期：2026年07月01日</p><p>生效日期：2026年07月08日</p><h3>引言</h3><p>本隐私政策旨在向您说明我们如何收集、使用、存储和保护您的个人信息。请您在使用我们的服务前，仔细阅读并了解本隐私政策。</p><h3>一、我们收集的信息</h3><p>在您使用我们的服务时，我们可能会收集以下类型的信息：</p><ul><li>个人身份信息（如姓名、手机号码、车牌号等）</li><li>设备信息（如设备型号、操作系统版本等）</li><li>日志信息（如访问时间、访问页面等）</li></ul><h3>二、信息的使用</h3><p>我们收集的信息将用于以下用途：</p><ol><li>为您提供产品和服务</li><li>改进和优化我们的服务</li><li>保障账户安全</li></ol><h3>三、信息的存储</h3><p>我们将采取合理的安全措施保护您的个人信息，防止未经授权的访问、使用或泄露。您的个人信息将存储在中华人民共和国境内。</p>';
          if (type === '隐私政策摘要') return '<h2>隐私政策摘要</h2><p>本摘要旨在以简洁、清晰的方式，帮助您快速了解我们如何收集、使用和保护您的个人信息。</p><h3>收集的信息</h3><p>我们收集您的手机号码、位置信息、设备信息等必要的个人信息。</p><h3>信息的使用</h3><p>我们使用这些信息为您提供配送服务、优化商品推荐、保障交易安全。</p>';
          if (type === '用户管理规则及公约') return '<h2>用户管理规则及公约</h2><p>欢迎使用本平台服务。为维护平台秩序，保障用户权益，特制定本规则。</p><h3>第一条 总则</h3><p>用户在注册、使用本平台服务时，应遵守国家相关法律法规及本规则。</p><h3>第二条 用户义务</h3><p>用户应保证所提供的信息真实、准确、完整，并及时更新。</p>';
          if (type === '用户协议') return '<h2>用户协议</h2><p>本协议是您与平台之间关于使用本平台服务所订立的协议。</p><h3>一、服务条款的接受</h3><p>您在注册或使用本平台服务时，即表示您已阅读、理解并同意接受本协议的全部内容。</p><h3>二、服务内容</h3><p>本平台为您提供商品浏览、下单购买、物流查询、售后服务等功能。</p>';
          if (type === '个人信息收集清单') return '<h2>个人信息收集清单</h2><p>根据相关法律法规要求，我们向您披露以下个人信息收集情况：</p><h3>一、基本资料</h3><ul><li>手机号码：用于账号注册与登录</li><li>姓名：用于实名认证</li></ul><h3>二、位置信息</h3><ul><li>粗略位置：用于配送地址推荐</li></ul><h3>三、设备信息</h3><ul><li>设备型号、操作系统版本：用于适配优化</li></ul>';
          if (type === '第三方共享个人信息清单') return '<h2>第三方共享个人信息清单</h2><p>我们可能会与以下类型的第三方共享您的个人信息：</p><h3>一、物流服务商</h3><p>共享信息：收货人姓名、手机号码、收货地址。目的：完成商品配送。</p><h3>二、支付服务商</h3><p>共享信息：订单号、支付金额。目的：完成支付结算。</p><h3>三、技术服务商</h3><p>共享信息：设备信息、日志信息。目的：提供技术支持和系统优化。</p>';
          return '<p>暂无内容</p>';
        };

        // ===== 导航 =====
        const pushView = (view) => { viewStack.value.push(view); currentView.value = view; };
        const goTo = (view) => { pushView(view); };
        const goToDoc = (type) => {
          docType.value = type;
          docContent.value = mockDocContent(type);
          if (type === '隐私政策') { selectedVersionDate.value = versionList.value[0]; selectedVersionIndex.value = 0; }
          pushView('doc-detail');
        };
        const goToReadonly = (title) => {
          readonlyDocTitle.value = title;
          readonlyContent.value = mockDocContent(title);
          pushView('readonly-doc');
        };

        const goBack = () => {
          if (viewStack.value.length > 1) {
            viewStack.value.pop();
            currentView.value = viewStack.value[viewStack.value.length - 1];
          } else {
            window.parent.postMessage({ action: 'back' }, '*');
          }
        };

        // ===== 授权 =====
        const onAuthChange = (type, value) => {
          vant.showToast(type === 'camera' ? (value ? '相机授权已开启' : '相机授权已关闭') : (value ? '相册授权已开启' : '相册授权已关闭'));
        };

        // ===== 脱敏 =====
        const maskPhone = (phone) => {
          if (!phone || phone.length < 7) return phone;
          return phone.slice(0, 3) + '****' + phone.slice(7);
        };

        // ===== 提交下载 =====
        const submitDownload = () => {
          if (!emailInput.value) { vant.showToast('请输入邮箱地址'); return; }
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) { vant.showToast('请输入正确的邮箱地址'); return; }
          vant.showToast('申请已提交，我们将在5个工作日内将文件以Excel格式发送至您的邮箱');
          emailInput.value = '';
        };

        // ===== 隐私政策操作 =====
        const copyDocUrl = () => {
          navigator.clipboard.writeText('https://h5.qdama.cn/privacy/doc/' + encodeURIComponent(selectedVersionDate.value)).then(() => vant.showToast('复制成功')).catch(() => vant.showToast('复制失败，请手动复制'));
        };
        const downloadDoc = () => { vant.showToast('请复制链接到浏览器进行下载'); };
        const onVersionConfirm = ({ selectedOptions }) => {
          if (selectedOptions && selectedOptions[0]) {
            const v = selectedOptions[0].value;
            selectedVersionDate.value = v;
            selectedVersionIndex.value = versionList.value.indexOf(v);
            docContent.value = mockDocContent('隐私政策').replace('2026年07月01日', v);
            showVersionPicker.value = false;
          }
        };

        // ===== 初始化：根据 URL hash 决定初始视图 =====
        const hash = window.location.hash.replace('#', '');
        if (hash === 'privacy-manage') {
          pushView('privacy-manage');
        } else if (hash === 'info-collection') {
          goToReadonly('个人信息收集清单');
        } else if (hash === 'third-party-share') {
          goToReadonly('第三方共享个人信息清单');
        } else if (hash.startsWith('doc-')) {
          goToDoc(decodeURIComponent(hash.replace('doc-', '')));
        } else {
          pushView('privacy-manage');
        }

        // ===== 监听框架层返回 =====
        window.addEventListener('message', (event) => {
          if (event.data && event.data.action === 'back') { goBack(); }
        });

        return {
          currentView, docType, readonlyDocTitle,
          authCamera, authAlbum,
          userInfo, emailInput,
          versionList, selectedVersionDate, selectedVersionIndex, showVersionPicker, versionColumns,
          docContent, readonlyContent,
          goTo, goToDoc, goBack,
          onAuthChange, maskPhone, submitDownload,
          copyDocUrl, downloadDoc, onVersionConfirm,
        };
      }
    }).use(vant).mount('#prd-root');
  </script>
</body>
</html>
