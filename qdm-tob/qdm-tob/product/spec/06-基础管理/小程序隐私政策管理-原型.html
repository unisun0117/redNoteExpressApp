<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小程序隐私政策管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        :root { --primary: #409eff; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        .prd-page { padding: 0; }

        /* 页签外层 */
        .tab-wrap { background: #fff; border-radius: 8px 8px 0 0; padding: 0 20px; }

        /* 查询区卡片 */
        .search-card {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            padding-bottom: 0px;
            margin-bottom: 10px;
        }
        .search-card .el-form-item { margin-bottom: 10px; }

        /* 操作&数据区卡片 */
        .data-card {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
        }
        .data-card .toolbar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        /* 状态标签 */
        .tag-draft { background: #f5f7fa; color: #909399; border: 1px solid #e4e7ed; }
        .tag-published { background: #f0f9eb; color: #67c23a; border: 1px solid #e1f3d8; }
        .tag-withdrawn { background: #fef0f0; color: #f56c6c; border: 1px solid #fde2e2; }

        /* 操作按钮组 */
        .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
        .action-btns .el-button { margin: 0; }

        /* 富文本模拟 */
        .rich-editor {
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            min-height: 240px;
            width: 100%;
        }
        .rich-toolbar {
            border-bottom: 1px solid #dcdfe6;
            padding: 6px 8px;
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            background: #fafafa;
        }
        .rich-toolbar .el-button { margin: 0; min-width: 32px; height: 28px; padding: 0 8px; font-size: 12px; }
        .rich-content {
            min-height: 200px;
            padding: 12px;
            outline: none;
            font-size: 14px;
            line-height: 1.8;
        }
        .rich-content:focus { border-color: #409eff; }

        /* 必填红星 */
        .required-star { color: #f56c6c; margin-right: 4px; }

        /* 文件上传行 */
        .upload-row { display: flex; gap: 12px; align-items: center; }
        .upload-hint { font-size: 12px; color: #909399; margin-left: 4px; }
    </style>
</head>
<body>
    <div id="prd-root">
        <div class="prd-page">
            <!-- ========== 页签切换 ========== -->
            <div class="tab-wrap">
                <el-tabs v-model="activeTab" @tab-change="onTabChange">
                    <el-tab-pane label="小程序隐私文档维护" name="docs"></el-tab-pane>
                    <el-tab-pane label="用户授权记录" name="auth"></el-tab-pane>
                </el-tabs>
            </div>

            <!-- ============================================================ -->
            <!-- 页签一：小程序隐私文档维护                                     -->
            <!-- ============================================================ -->
            <div v-show="activeTab === 'docs'">
                <!-- 查询区 -->
                <div class="search-card">
                    <el-form :inline="true" :model="docSearch">
                        <el-form-item label="文档类型">
                            <el-select v-model="docSearch.docType" placeholder="全部" clearable style="width:200px;" @change="doDocSearch">
                                <el-option label="全部" value=""></el-option>
                                <el-option label="隐私政策" value="隐私政策"></el-option>
                                <el-option label="隐私政策摘要" value="隐私政策摘要"></el-option>
                                <el-option label="用户管理规则及公约" value="用户管理规则及公约"></el-option>
                                <el-option label="个人信息收集清单" value="个人信息收集清单"></el-option>
                                <el-option label="第三方共享个人信息清单" value="第三方共享个人信息清单"></el-option>
                                <el-option label="用户协议" value="用户协议"></el-option>
                            </el-select>
                        </el-form-item>
                        <el-form-item label="版本号">
                            <el-input v-model="docSearch.version" placeholder="请输入版本号" clearable style="width:180px;" @keyup.enter="doDocSearch"></el-input>
                        </el-form-item>
                        <el-form-item>
                            <el-button type="primary" @click="doDocSearch">查询</el-button>
                            <el-button type="success" @click="openAddDialog">新增</el-button>
                            <el-button type="warning" @click="exportDocs" :loading="docExportLoading">导出</el-button>
                        </el-form-item>
                    </el-form>
                </div>

                <!-- 操作&数据区 -->
                <div class="data-card">
                    <div class="toolbar-row">
                        <span style="font-size:14px;color:#909399;">共 <b style="color:#303133;">{{ docTotal }}</b> 条记录</span>
                    </div>
                    <el-table :data="docTableData" stripe v-loading="docLoading" style="width:100%;"
                        :header-cell-style="{background:'#f5f7fa',color:'#606266',fontWeight:500}">
                        <el-table-column label="序号" width="60" align="center">
                            <template #default="scope">
                                {{ (docPage.page - 1) * docPage.size + scope.$index + 1 }}
                            </template>
                        </el-table-column>
                        <el-table-column label="状态" width="90" align="center">
                            <template #default="scope">
                                <el-tag :class="statusTagClass(scope.row.status)" size="small" disable-transitions>
                                    {{ scope.row.status }}
                                </el-tag>
                            </template>
                        </el-table-column>
                        <el-table-column prop="docType" label="文档类型" width="160"></el-table-column>
                        <el-table-column label="H5地址" min-width="180" show-overflow-tooltip>
                            <template #default="scope">
                                <span style="color:#409eff;font-size:12px;">{{ scope.row.h5Url }}</span>
                            </template>
                        </el-table-column>
                        <el-table-column prop="version" label="版本号" width="100"></el-table-column>
                        <el-table-column prop="remark" label="备注" min-width="140" show-overflow-tooltip></el-table-column>
                        <el-table-column prop="createdBy" label="创建人" width="100"></el-table-column>
                        <el-table-column prop="createdAt" label="创建时间" width="150"></el-table-column>
                        <el-table-column prop="updatedBy" label="最后更新人" width="110"></el-table-column>
                        <el-table-column prop="updatedAt" label="最后更新时间" width="150"></el-table-column>
                        <el-table-column label="操作" width="280" fixed="right">
                            <template #default="scope">
                                <div class="action-btns">
                                    <el-button size="small" text type="primary" @click="copyUrl(scope.row)">复制地址</el-button>
                                    <el-button size="small" text type="primary" @click="openDetail(scope.row)">详情</el-button>
                                    <el-button v-if="scope.row.status === '未发布'" size="small" text type="success" @click="publishDoc(scope.row)">发布</el-button>
                                    <el-button v-if="scope.row.status === '未发布' || scope.row.status === '已发布'" size="small" text type="warning" @click="withdrawDoc(scope.row)">下架</el-button>
                                    <el-button v-if="scope.row.status === '已发布' && scope.row.docType === '隐私政策' && scope.row.hasFile" size="small" text type="info" @click="downloadFile(scope.row)">下载文件</el-button>
                                </div>
                            </template>
                        </el-table-column>
                    </el-table>
                    <el-pagination
                        v-if="docTotal > 0"
                        style="margin-top:16px;justify-content:flex-start;"
                        v-model:current-page="docPage.page"
                        v-model:page-size="docPage.size"
                        :total="docTotal"
                        :page-sizes="[20]"
                        layout="total, sizes, prev, pager, next, jumper"
                        @current-change="doDocSearch"
                    ></el-pagination>
                    <div v-if="docTableData.length === 0 && !docLoading" style="text-align:center;padding:60px 0;color:#909399;">
                        <div style="font-size:48px;margin-bottom:12px;">📄</div>
                        <div style="font-size:14px;">暂无文档数据</div>
                    </div>
                </div>
            </div>

            <!-- ============================================================ -->
            <!-- 页签二：用户授权记录                                           -->
            <!-- ============================================================ -->
            <div v-show="activeTab === 'auth'">
                <!-- 查询区 -->
                <div class="search-card">
                    <el-form :inline="true" :model="authSearch">
                        <el-form-item label="openid">
                            <el-input v-model="authSearch.openid" placeholder="请输入" clearable style="width:180px;" @keyup.enter="doAuthSearch"></el-input>
                        </el-form-item>
                        <el-form-item label="手机号">
                            <el-input v-model="authSearch.phone" placeholder="请输入" clearable style="width:180px;" @keyup.enter="doAuthSearch"></el-input>
                        </el-form-item>
                        <el-form-item label="类型">
                            <el-select v-model="authSearch.authType" placeholder="全部" clearable style="width:200px;" @change="doAuthSearch">
                                <el-option label="全部" value=""></el-option>
                                <el-option label="相机" value="相机"></el-option>
                                <el-option label="相册" value="相册"></el-option>
                                <el-option label="隐私政策" value="隐私政策"></el-option>
                                <el-option label="隐私政策摘要" value="隐私政策摘要"></el-option>
                                <el-option label="用户管理规则与公约" value="用户管理规则与公约"></el-option>
                                <el-option label="用户协议" value="用户协议"></el-option>
                                <el-option label="个人信息下载" value="个人信息下载"></el-option>
                            </el-select>
                        </el-form-item>
                        <el-form-item>
                            <el-button type="primary" @click="doAuthSearch">查询</el-button>
                            <el-button type="success" @click="exportAuth" :loading="exportLoading">导出</el-button>
                        </el-form-item>
                    </el-form>
                </div>

                <!-- 操作&数据区 -->
                <div class="data-card">
                    <div class="toolbar-row">
                        <span style="font-size:14px;color:#909399;">每页20条 共 <b style="color:#303133;">{{ authTotal }}</b> 条</span>
                    </div>
                    <el-table :data="authTableData" stripe v-loading="authLoading" style="width:100%;"
                        :header-cell-style="{background:'#f5f7fa',color:'#606266',fontWeight:500}">
                        <el-table-column prop="openid" label="openid" min-width="180" show-overflow-tooltip></el-table-column>
                        <el-table-column prop="phone" label="手机号码" width="140"></el-table-column>
                        <el-table-column prop="authType" label="类型" width="160"></el-table-column>
                        <el-table-column prop="version" label="版本" width="100"></el-table-column>
                        <el-table-column prop="authTime" label="授权时间" width="180"></el-table-column>
                    </el-table>
                    <el-pagination
                        v-if="authTotal > 0"
                        style="margin-top:16px;justify-content:flex-start;"
                        v-model:current-page="authPage.page"
                        v-model:page-size="authPage.size"
                        :total="authTotal"
                        :page-sizes="[20]"
                        layout="total, sizes, prev, pager, next, jumper"
                        @current-change="doAuthSearch"
                    ></el-pagination>
                    <div v-if="authTableData.length === 0 && !authLoading" style="text-align:center;padding:60px 0;color:#909399;">
                        <div style="font-size:48px;margin-bottom:12px;">📋</div>
                        <div style="font-size:14px;">暂无授权记录</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============================================================ -->
        <!-- 新增/编辑文档弹窗                                               -->
        <!-- ============================================================ -->
        <el-dialog
            v-model="dialogVisible"
            :title="dialogMode === 'add' ? '新增文档' : '文档详情'"
            width="800px"
            :close-on-click-modal="false"
            destroy-on-close
            top="3vh"
        >
            <el-form :model="docForm" label-width="80px" :disabled="dialogMode === 'view'">
                <!-- 文档类型 -->
                <el-form-item label="文档类型" required>
                    <el-select v-model="docForm.docType" placeholder="请选择" style="width:100%;" :disabled="dialogMode !== 'add'">
                        <el-option label="隐私政策" value="隐私政策"></el-option>
                        <el-option label="隐私政策摘要" value="隐私政策摘要"></el-option>
                        <el-option label="用户管理规则及公约" value="用户管理规则及公约"></el-option>
                        <el-option label="个人信息收集清单" value="个人信息收集清单"></el-option>
                        <el-option label="第三方共享个人信息清单" value="第三方共享个人信息清单"></el-option>
                        <el-option label="用户协议" value="用户协议"></el-option>
                    </el-select>
                </el-form-item>

                <!-- 版本号 + 上传文件 同行 -->
                <el-form-item label="版本号" required>
                    <div style="display:flex;gap:20px;width:100%;">
                        <el-input v-model="docForm.version" placeholder="请输入版本号" style="flex:1;"></el-input>
                        <div style="flex:1;display:flex;align-items:center;gap:8px;">
                            <span :class="{'required-star': docForm.docType === '隐私政策'}" style="white-space:nowrap;">上传文件：</span>
                            <el-upload
                                ref="uploadRef"
                                :auto-upload="false"
                                :limit="1"
                                :on-change="onFileChange"
                                :on-remove="onFileRemove"
                                :file-list="fileList"
                                accept=".pdf"
                                style="flex:1;"
                            >
                                <el-button size="small" type="primary" plain>选择文件</el-button>
                            </el-upload>
                            <span style="font-size:12px;color:#909399;white-space:nowrap;">仅限PDF格式</span>
                        </div>
                    </div>
                </el-form-item>

                <!-- URL地址 -->
                <el-form-item label="URL地址" required>
                    <el-input v-model="docForm.h5Url" placeholder="请输入URL地址"></el-input>
                </el-form-item>

                <!-- 备注 -->
                <el-form-item label="备注">
                    <el-input v-model="docForm.remark" type="textarea" :rows="3" placeholder="选填，最多200字" maxlength="200" show-word-limit></el-input>
                </el-form-item>

                <!-- 富文本编辑区 -->
                <el-form-item label="富文本内容" required>
                    <div class="rich-editor">
                        <div class="rich-toolbar">
                            <el-button size="small" @click="execCmd('bold')" :disabled="dialogMode === 'view'"><b>B</b></el-button>
                            <el-button size="small" @click="execCmd('italic')" :disabled="dialogMode === 'view'"><i>I</i></el-button>
                            <el-button size="small" @click="execCmd('underline')" :disabled="dialogMode === 'view'"><u>U</u></el-button>
                            <el-divider direction="vertical"></el-divider>
                            <el-button size="small" @click="execCmd('formatBlock','h1')" :disabled="dialogMode === 'view'">H1</el-button>
                            <el-button size="small" @click="execCmd('formatBlock','h2')" :disabled="dialogMode === 'view'">H2</el-button>
                            <el-button size="small" @click="execCmd('formatBlock','h3')" :disabled="dialogMode === 'view'">H3</el-button>
                            <el-divider direction="vertical"></el-divider>
                            <el-button size="small" @click="execCmd('insertOrderedList')" :disabled="dialogMode === 'view'">1.</el-button>
                            <el-button size="small" @click="execCmd('insertUnorderedList')" :disabled="dialogMode === 'view'">•</el-button>
                            <el-divider direction="vertical"></el-divider>
                            <el-button size="small" @click="insertLink" :disabled="dialogMode === 'view'">链接</el-button>
                            <el-button size="small" @click="execCmd('removeFormat')" :disabled="dialogMode === 'view'">清除格式</el-button>
                        </div>
                        <div
                            class="rich-content"
                            :contenteditable="dialogMode !== 'view'"
                            ref="richEditorRef"
                            @input="onRichInput"
                        ></div>
                    </div>
                </el-form-item>
            </el-form>

            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="dialogVisible = false">{{ dialogMode === 'view' ? '返回' : '取消' }}</el-button>
                    <el-button v-if="dialogMode !== 'view'" type="primary" @click="submitDoc">确定</el-button>
                </span>
            </template>
        </el-dialog>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <script>
        const { createApp, ref, reactive, computed, nextTick, watch } = Vue;

        const app = createApp({
            setup() {
                const activeTab = ref('docs');
                const docLoading = ref(false);
                const authLoading = ref(false);
                const exportLoading = ref(false);
                const docExportLoading = ref(false);
                const dialogVisible = ref(false);
                const dialogMode = ref('add'); // 'add' | 'edit' | 'view'
                const richEditorRef = ref(null);
                const fileList = ref([]);
                const editingRow = ref(null);

                // ===== 文档搜索 =====
                const docSearch = reactive({ docType: '', version: '' });
                const docPage = reactive({ page: 1, size: 20 });
                const docTotal = ref(0);

                // ===== 文档表单 =====
                const docForm = reactive({
                    docType: '',
                    version: '',
                    h5Url: '',
                    remark: '',
                    richContent: '',
                });

                // ===== 模拟数据 =====
                const genMockDocData = () => {
                    const types = ['隐私政策','隐私政策摘要','用户管理规则及公约','个人信息收集清单','第三方共享个人信息清单','用户协议'];
                    const statuses = ['未发布','已发布','已下架'];
                    const creators = ['张三','李四','王五','赵六'];
                    const data = [];
                    for (let i = 1; i <= 25; i++) {
                        const docType = types[i % 6];
                        const status = statuses[i % 3];
                        data.push({
                            id: i,
                            status: status,
                            docType: docType,
                            h5Url: 'https://h5.qdama.cn/privacy/doc/' + i,
                            version: 'v' + (Math.ceil(i/3)) + '.0',
                            remark: i % 4 === 0 ? '这是备注内容示例，用于测试超长显示' : (i % 3 === 0 ? '测试备注' : '-'),
                            createdBy: creators[i % 4],
                            createdAt: '2026-07-' + String(i).padStart(2,'0') + ' ' + (8 + i%10) + ':00',
                            updatedBy: creators[(i+1) % 4],
                            updatedAt: '2026-07-' + String(i+1).padStart(2,'0') + ' ' + (10 + i%8) + ':30',
                            hasFile: docType === '隐私政策' && status !== '未发布',
                        });
                    }
                    return data;
                };

                let allDocData = genMockDocData();
                let docTableData = ref([]);

                // ===== 授权模拟数据 =====
                const genMockAuthData = () => {
                    const types = ['相机','相册','隐私政策','隐私政策摘要','用户管理规则与公约','用户协议','个人信息下载'];
                    const data = [];
                    for (let i = 1; i <= 35; i++) {
                        data.push({
                            id: i,
                            openid: 'oABC' + String(i).padStart(4,'0') + 'xyzdefg',
                            phone: '138' + String(1000 + i).slice(1) + '5678',
                            authType: types[i % 7],
                            version: 'v' + (Math.ceil(i/6)) + '.0',
                            authTime: '2026-07-' + String(i).padStart(2,'0') + ' ' + (8 + i%12).toString().padStart(2,'0') + ':00:' + String(i*3%60).padStart(2,'0'),
                        });
                    }
                    return data;
                };

                let allAuthData = genMockAuthData();
                let authTableData = ref([]);

                const authSearch = reactive({ openid: '', phone: '', authType: '' });
                const authPage = reactive({ page: 1, size: 20 });
                const authTotal = ref(0);

                // ===== 状态标签样式 =====
                const statusTagClass = (status) => {
                    if (status === '未发布') return 'tag-draft';
                    if (status === '已发布') return 'tag-published';
                    if (status === '已下架') return 'tag-withdrawn';
                    return '';
                };

                // ===== 手机号脱敏 =====
                const maskPhone = (phone) => {
                    if (!phone || phone.length < 7) return phone;
                    return phone.slice(0, 3) + '****' + phone.slice(7);
                };

                // ===== 文档查询 =====
                const doDocSearch = () => {
                    docLoading.value = true;
                    setTimeout(() => {
                        let filtered = [...allDocData];
                        if (docSearch.docType) {
                            filtered = filtered.filter(d => d.docType === docSearch.docType);
                        }
                        if (docSearch.version) {
                            filtered = filtered.filter(d => d.version.includes(docSearch.version));
                        }
                        docTotal.value = filtered.length;
                        const start = (docPage.page - 1) * docPage.size;
                        docTableData.value = filtered.slice(start, start + docPage.size);
                        docLoading.value = false;
                    }, 200);
                };

                // ===== 授权查询 =====
                const doAuthSearch = () => {
                    authLoading.value = true;
                    setTimeout(() => {
                        let filtered = [...allAuthData];
                        if (authSearch.openid) {
                            filtered = filtered.filter(d => d.openid.includes(authSearch.openid));
                        }
                        if (authSearch.phone) {
                            filtered = filtered.filter(d => d.phone.includes(authSearch.phone));
                        }
                        if (authSearch.authType) {
                            filtered = filtered.filter(d => d.authType === authSearch.authType);
                        }
                        authTotal.value = filtered.length;
                        const start = (authPage.page - 1) * authPage.size;
                        authTableData.value = filtered.slice(start, start + authPage.size);
                        authLoading.value = false;
                    }, 200);
                };

                // ===== 页签切换 =====
                const onTabChange = (name) => {
                    if (name === 'auth' && authTableData.value.length === 0) {
                        doAuthSearch();
                    }
                };

                // ===== 新增弹窗 =====
                const openAddDialog = () => {
                    dialogMode.value = 'add';
                    editingRow.value = null;
                    docForm.docType = '';
                    docForm.version = '';
                    docForm.h5Url = '';
                    docForm.remark = '';
                    docForm.richContent = '';
                    fileList.value = [];
                    dialogVisible.value = true;
                    nextTick(() => {
                        if (richEditorRef.value) {
                            richEditorRef.value.innerHTML = '';
                        }
                    });
                };

                // ===== 详情/编辑 =====
                const openDetail = (row) => {
                    editingRow.value = row;
                    if (row.status === '未发布') {
                        dialogMode.value = 'edit';
                    } else {
                        dialogMode.value = 'view';
                    }
                    docForm.docType = row.docType;
                    docForm.version = row.version;
                    docForm.h5Url = row.h5Url;
                    docForm.remark = row.remark === '-' ? '' : row.remark;
                    docForm.richContent = row.richContent || '';
                    fileList.value = row.hasFile ? [{ name: row.docType + '_' + row.version + '.pdf', uid: row.id }] : [];
                    dialogVisible.value = true;
                    nextTick(() => {
                        if (richEditorRef.value) {
                            richEditorRef.value.innerHTML = docForm.richContent || '<p>这是文档「' + row.docType + '」的富文本内容，版本 ' + row.version + '。</p><p>此处展示完整的文档HTML内容，支持加粗、标题、列表等富文本格式。</p>';
                        }
                    });
                };

                // ===== 文件变更 =====
                const onFileChange = (file) => {
                    fileList.value = [file];
                };
                const onFileRemove = () => {
                    fileList.value = [];
                };

                // ===== 富文本操作 =====
                const execCmd = (command, value) => {
                    document.execCommand(command, false, value || null);
                    if (richEditorRef.value) {
                        richEditorRef.value.focus();
                    }
                };

                const insertLink = () => {
                    const url = prompt('请输入链接地址：', 'https://');
                    if (url) {
                        document.execCommand('createLink', false, url);
                    }
                    if (richEditorRef.value) {
                        richEditorRef.value.focus();
                    }
                };

                const onRichInput = () => {
                    if (richEditorRef.value) {
                        docForm.richContent = richEditorRef.value.innerHTML;
                    }
                };

                // ===== 提交文档 =====
                const submitDoc = () => {
                    // 校验
                    if (!docForm.docType) {
                        ElementPlus.ElMessage.warning('请选择文档类型');
                        return;
                    }
                    if (!docForm.version) {
                        ElementPlus.ElMessage.warning('请输入版本号');
                        return;
                    }
                    if (!docForm.h5Url) {
                        ElementPlus.ElMessage.warning('请输入URL地址');
                        return;
                    }
                    if (!/^https?:\/\/.+/.test(docForm.h5Url)) {
                        ElementPlus.ElMessage.warning('请输入合法的http/https链接');
                        return;
                    }
                    if (docForm.docType === '隐私政策' && fileList.value.length === 0) {
                        ElementPlus.ElMessage.warning('隐私政策类型必须上传PDF文件');
                        return;
                    }
                    // 获取富文本
                    if (richEditorRef.value) {
                        docForm.richContent = richEditorRef.value.innerHTML;
                    }
                    if (!docForm.richContent || docForm.richContent === '<br>' || docForm.richContent === '<br/>') {
                        ElementPlus.ElMessage.warning('请输入富文本内容');
                        return;
                    }

                    if (dialogMode.value === 'add') {
                        // 新增
                        const newDoc = {
                            id: allDocData.length + 1,
                            status: '未发布',
                            docType: docForm.docType,
                            h5Url: docForm.h5Url,
                            version: docForm.version,
                            remark: docForm.remark || '-',
                            createdBy: '当前用户',
                            createdAt: new Date().toISOString().slice(0,16).replace('T',' '),
                            updatedBy: '当前用户',
                            updatedAt: new Date().toISOString().slice(0,16).replace('T',' '),
                            hasFile: fileList.value.length > 0,
                            richContent: docForm.richContent,
                        };
                        allDocData.unshift(newDoc);
                        ElementPlus.ElMessage.success('新增成功');
                    } else {
                        // 编辑
                        if (editingRow.value) {
                            editingRow.value.h5Url = docForm.h5Url;
                            editingRow.value.version = docForm.version;
                            editingRow.value.remark = docForm.remark || '-';
                            editingRow.value.richContent = docForm.richContent;
                            editingRow.value.hasFile = fileList.value.length > 0;
                            editingRow.value.updatedBy = '当前用户';
                            editingRow.value.updatedAt = new Date().toISOString().slice(0,16).replace('T',' ');
                        }
                        ElementPlus.ElMessage.success('保存成功');
                    }
                    dialogVisible.value = false;
                    doDocSearch();
                };

                // ===== 发布 =====
                const publishDoc = (row) => {
                    ElementPlus.ElMessageBox.confirm('确认发布该文档？发布后小程序端可见。', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'info',
                    }).then(() => {
                        row.status = '已发布';
                        ElementPlus.ElMessage.success('发布成功');
                        doDocSearch();
                    }).catch(() => {});
                };

                // ===== 下架 =====
                const withdrawDoc = (row) => {
                    ElementPlus.ElMessageBox.confirm('确认下架该文档？下架后小程序端不可见，且不可再次发布。', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning',
                    }).then(() => {
                        row.status = '已下架';
                        ElementPlus.ElMessage.success('下架成功');
                        doDocSearch();
                    }).catch(() => {});
                };

                // ===== 复制地址 =====
                const copyUrl = (row) => {
                    navigator.clipboard.writeText(row.h5Url).then(() => {
                        ElementPlus.ElMessage.success('复制成功');
                    }).catch(() => {
                        ElementPlus.ElMessage.error('复制失败，请手动复制');
                    });
                };

                // ===== 下载文件 =====
                const downloadFile = (row) => {
                    ElementPlus.ElMessage.success('模拟下载文件：' + row.docType + '_' + row.version + '.pdf');
                };

                // ===== 导出授权 =====
                const exportAuth = () => {
                    exportLoading.value = true;
                    setTimeout(() => {
                        exportLoading.value = false;
                        ElementPlus.ElMessage.success('导出成功');
                    }, 1000);
                };

                // ===== 导出文档 =====
                const exportDocs = () => {
                    docExportLoading.value = true;
                    setTimeout(() => {
                        docExportLoading.value = false;
                        ElementPlus.ElMessage.success('导出成功，已导出 ' + docTotal.value + ' 条记录');
                    }, 800);
                };

                // ===== 初始化 =====
                doDocSearch();

                return {
                    activeTab, docSearch, docPage, docTotal, docLoading,
                    docTableData, docForm, dialogVisible, dialogMode,
                    fileList, richEditorRef, editingRow,
                    authSearch, authPage, authTotal, authLoading,
                    authTableData, exportLoading,
                    statusTagClass, maskPhone,
                    doDocSearch, doAuthSearch, onTabChange,
                    openAddDialog, openDetail,
                    onFileChange, onFileRemove,
                    execCmd, insertLink, onRichInput,
                    submitDoc, publishDoc, withdrawDoc,
                    copyUrl, downloadFile, exportAuth, exportDocs, docExportLoading,
                };
            }
        });

        app.use(ElementPlus, { locale: ElementPlusLocaleZhCn }).mount('#prd-root');
    </script>
</body>
</html>
