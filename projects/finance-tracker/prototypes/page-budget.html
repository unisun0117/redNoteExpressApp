<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>金橘记账 - 预算管理</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#FFF8F0; }
  .page { max-width:480px; margin:0 auto; padding:24px 16px 100px; }
  .header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .header a { font-size:20px; text-decoration:none; color:#1F2937; }
  .header h1 { font-size:20px; color:#1F2937; }
  .header .right { margin-left:auto; font-size:14px; color:#F59E0B; cursor:pointer; font-weight:500; }
  .total-budget { background:#fff; border-radius:16px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.06); margin-bottom:20px; }
  .total-budget .row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .total-budget .label { font-size:14px; color:#6B7280; }
  .total-budget .value { font-size:16px; font-weight:600; color:#1F2937; }
  .progress-bar { height:8px; background:#F3E8DC; border-radius:4px; overflow:hidden; }
  .progress-bar .fill { height:100%; background:linear-gradient(90deg, #F59E0B, #F97316); border-radius:4px; transition:width .6s ease; }
  .category-list { display:flex; flex-direction:column; gap:12px; }
  .cat-budget { background:#fff; border-radius:12px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.06); transition:all .2s; position:relative; }
  .cat-budget:hover { transform:translateX(4px); box-shadow:0 4px 12px rgba(0,0,0,.1); }
  .cat-budget .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .cat-budget .name { font-size:15px; font-weight:500; }
  .cat-budget .amount { font-size:14px; color:#6B7280; }
  .cat-budget .amount .used { color:#EF4444; font-weight:600; }
  .cat-budget .amount .total { color:#9CA3AF; }
  .cat-budget .bar { height:6px; background:#F3E8DC; border-radius:3px; overflow:hidden; }
  .cat-budget .bar .fill { height:100%; border-radius:3px; transition:width .6s ease; }
  .fill.safe { background:#10B981; }
  .fill.warn { background:#F59E0B; }
  .fill.danger { background:#EF4444; }
  .fill.over { background:#DC2626; }
  .cat-budget .edit-btn { position:absolute; right:16px; top:16px; background:none; border:none; font-size:14px; cursor:pointer; opacity:0; transition:opacity .2s; padding:4px 8px; color:#9CA3AF; }
  .cat-budget:hover .edit-btn { opacity:1; }
  .cat-budget .edit-btn:hover { color:#F59E0B; }
  .add-btn { width:100%; padding:14px; background:#fff; border:2px dashed #F3E8DC; border-radius:12px; font-size:15px; color:#9CA3AF; cursor:pointer; transition:all .2s; margin-top:12px; }
  .add-btn:hover { border-color:#F59E0B; color:#F59E0B; background:#FFFDF7; }
  .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); z-index:200; display:none; align-items:flex-end; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:#fff; border-radius:20px 20px 0 0; padding:24px; width:min(480px, 100vw); animation: slideUp .3s ease; }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .modal h3 { font-size:18px; margin-bottom:20px; color:#1F2937; }
  .modal .form-group { margin-bottom:16px; }
  .modal .label { font-size:13px; color:#6B7280; font-weight:500; display:block; margin-bottom:6px; }
  .modal .input { width:100%; padding:12px 16px; border:1px solid #F3E8DC; border-radius:10px; font-size:15px; outline:none; }
  .modal .input:focus { border-color:#F59E0B; }
  .modal .category-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:6px; margin-top:6px; }
  .modal .cat-opt { padding:8px 4px; border:2px solid #F3E8DC; border-radius:8px; text-align:center; font-size:13px; cursor:pointer; background:#fff; transition:all .15s; }
  .modal .cat-opt:hover { border-color:#F59E0B; }
  .modal .cat-opt.selected { border-color:#F59E0B; background:#FEF3C7; }
  .modal .btn-row { display:flex; gap:12px; margin-top:20px; }
  .modal .btn { flex:1; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
  .modal .btn-cancel { background:#F3F4F6; color:#6B7280; }
  .modal .btn-save { background:#F59E0B; color:#fff; }
  .tab-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:min(480px, 100vw); background:#fff; display:flex; border-top:1px solid #F3E8DC; padding:8px 0 env(safe-area-inset-bottom); z-index:100; }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; color:#9CA3AF; font-size:11px; cursor:pointer; padding:6px; transition:color .2s; text-decoration:none; }
  .tab:hover { color:#F59E0B; }
  .tab.active { color:#F59E0B; }
  .tab .icon { font-size:20px; transition:transform .2s; }
  .tab:hover .icon { transform:scale(1.15); }
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1F2937; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <a href="page-dashboard.html">←</a>
    <h1>🎯 月度预算</h1>
    <span class="right" onclick="showAddBudget()">+ 新增</span>
  </div>

  <div class="total-budget" onclick="showEditTotal()">
    <div class="row">
      <span class="label">月度总预算</span>
      <span class="value" id="total-budget-val">¥ 8,000</span>
    </div>
    <div class="row">
      <span class="label">已使用</span>
      <span class="value" style="color:#F59E0B;" id="total-spent-val">¥ 4,160</span>
    </div>
    <div class="progress-bar"><div class="fill" style="width:52%"></div></div>
    <div style="font-size:12px; color:#9CA3AF; margin-top:8px;">剩余 ¥3,840 · 比上月同期少花 ¥420 👍</div>
  </div>

  <div style="font-size:14px; color:#6B7280; font-weight:500; margin-bottom:10px;">分类预算</div>
  <div class="category-list" id="budget-list">
    <div class="cat-budget" data-cat="餐饮" data-emoji="🍽️" data-budget="2000" data-spent="1200">
      <div class="top">
        <span class="name">🍽️ 餐饮</span>
        <span class="amount"><span class="used">¥1,200</span><span class="total"> / ¥2,000</span></span>
      </div>
      <div class="bar"><div class="fill warn" style="width:60%"></div></div>
      <button class="edit-btn" onclick="event.stopPropagation(); showEditBudget(this.parentElement)">✏️</button>
    </div>
    <div class="cat-budget" data-cat="交通" data-emoji="🚇" data-budget="500" data-spent="180">
      <div class="top">
        <span class="name">🚇 交通</span>
        <span class="amount"><span class="used">¥180</span><span class="total"> / ¥500</span></span>
      </div>
      <div class="bar"><div class="fill safe" style="width:36%"></div></div>
      <button class="edit-btn" onclick="event.stopPropagation(); showEditBudget(this.parentElement)">✏️</button>
    </div>
    <div class="cat-budget" data-cat="购物" data-emoji="🛍️" data-budget="2000" data-spent="1850">
      <div class="top">
        <span class="name">🛍️ 购物</span>
        <span class="amount"><span class="used">¥1,850</span><span class="total"> / ¥2,000</span></span>
      </div>
      <div class="bar"><div class="fill danger" style="width:92%"></div></div>
      <button class="edit-btn" onclick="event.stopPropagation(); showEditBudget(this.parentElement)">✏️</button>
    </div>
    <div class="cat-budget" data-cat="娱乐" data-emoji="🎬" data-budget="1000" data-spent="320">
      <div class="top">
        <span class="name">🎬 娱乐</span>
        <span class="amount"><span class="used">¥320</span><span class="total"> / ¥1,000</span></span>
      </div>
      <div class="bar"><div class="fill safe" style="width:32%"></div></div>
      <button class="edit-btn" onclick="event.stopPropagation(); showEditBudget(this.parentElement)">✏️</button>
    </div>
  </div>
  <button class="add-btn" onclick="showAddBudget()">+ 添加分类预算</button>
</div>

<!-- 新增/编辑预算弹窗 -->
<div class="modal-overlay" id="budget-modal">
  <div class="modal">
    <h3 id="modal-title">新增分类预算</h3>
    <div class="form-group">
      <label class="label">分类</label>
      <div class="category-grid" id="modal-cats">
        <div class="cat-opt" onclick="selectModalCat(this)" data-cat="餐饮" data-emoji="🍽️">🍽️ 餐饮</div>
        <div class="cat-opt" onclick="selectModalCat(this)" data-cat="交通" data-emoji="🚇">🚇 交通</div>
        <div class="cat-opt" onclick="selectModalCat(this)" data-cat="购物" data-emoji="🛍️">🛍️ 购物</div>
        <div class="cat-opt" onclick="selectModalCat(this)" data-cat="娱乐" data-emoji="🎬">🎬 娱乐</div>
        <div class="cat-opt" onclick="selectModalCat(this)" data-cat="住房" data-emoji="🏠">🏠 住房</div>
        <div class="cat-opt" onclick="selectModalCat(this)" data-cat="医疗" data-emoji="💊">💊 医疗</div>
        <div class="cat-opt" onclick="selectModalCat(this)" data-cat="教育" data-emoji="📚">📚 教育</div>
        <div class="cat-opt" onclick="selectModalCat(this)" data-cat="其他" data-emoji="📌">📌 其他</div>
      </div>
    </div>
    <div class="form-group">
      <label class="label">预算金额</label>
      <input class="input" type="number" placeholder="0" id="modal-amount" value="1000">
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-save" onclick="saveBudget()">保存</button>
    </div>
  </div>
</div>

<div class="tab-bar">
  <a class="tab" href="page-dashboard.html"><span class="icon">🏠</span>首页</a>
  <a class="tab" href="page-list.html"><span class="icon">📋</span>账单</a>
  <a class="tab" href="page-form.html"><span class="icon">➕</span>记账</a>
  <a class="tab active" href="page-budget.html"><span class="icon">🎯</span>预算</a>
  <a class="tab" href="page-profile.html"><span class="icon">👤</span>我的</a>
</div>

<div class="toast" id="toast"></div>
<script>
let editingCat = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function showAddBudget() {
  editingCat = null;
  document.getElementById('modal-title').textContent = '新增分类预算';
  document.getElementById('modal-amount').value = 1000;
  document.querySelectorAll('#modal-cats .cat-opt').forEach(c => c.classList.remove('selected'));
  document.getElementById('budget-modal').classList.add('show');
}

function showEditBudget(el) {
  editingCat = el;
  document.getElementById('modal-title').textContent = '编辑 ' + el.dataset.cat + ' 预算';
  document.getElementById('modal-amount').value = el.dataset.budget;
  document.querySelectorAll('#modal-cats .cat-opt').forEach(c => {
    c.classList.toggle('selected', c.dataset.cat === el.dataset.cat);
  });
  document.getElementById('budget-modal').classList.add('show');
}

function showEditTotal() {
  editingCat = 'total';
  document.getElementById('modal-title').textContent = '设置月度总预算';
  document.getElementById('modal-amount').value = 8000;
  document.querySelectorAll('#modal-cats .cat-opt').forEach(c => c.classList.remove('selected'));
  document.getElementById('budget-modal').classList.add('show');
}

function selectModalCat(el) {
  el.parentElement.querySelectorAll('.cat-opt').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function closeModal() {
  document.getElementById('budget-modal').classList.remove('show');
}

function saveBudget() {
  const amount = document.getElementById('modal-amount').value;
  const selectedCat = document.querySelector('#modal-cats .cat-opt.selected');
  const catName = selectedCat ? selectedCat.dataset.cat : '其他';
  const emoji = selectedCat ? selectedCat.dataset.emoji : '📌';

  if (editingCat === 'total') {
    document.getElementById('total-budget-val').textContent = '¥ ' + Number(amount).toLocaleString();
    showToast('总预算已更新！');
  } else if (editingCat) {
    editingCat.dataset.budget = amount;
    editingCat.querySelector('.amount').innerHTML = `<span class="used">¥${Number(editingCat.dataset.spent).toLocaleString()}</span><span class="total"> / ¥${Number(amount).toLocaleString()}</span>`;
    showToast(editingCat.dataset.cat + ' 预算已更新！');
  } else {
    const exists = document.querySelector(`.cat-budget[data-cat="${catName}"]`);
    if (exists) { showToast('该分类已存在预算！'); return; }
    const div = document.createElement('div');
    div.className = 'cat-budget';
    div.dataset.cat = catName; div.dataset.emoji = emoji; div.dataset.budget = amount; div.dataset.spent = 0;
    div.innerHTML = `
      <div class="top"><span class="name">${emoji} ${catName}</span><span class="amount"><span class="used">¥0</span><span class="total"> / ¥${Number(amount).toLocaleString()}</span></span></div>
      <div class="bar"><div class="fill safe" style="width:0%"></div></div>
      <button class="edit-btn" onclick="event.stopPropagation(); showEditBudget(this.parentElement)">✏️</button>
    `;
    document.getElementById('budget-list').appendChild(div);
    showToast(catName + ' 预算已添加！');
  }
  closeModal();
}
</script>
</body>
</html>
