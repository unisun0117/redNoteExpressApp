<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>金橘记账 - 空状态</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#FFF8F0; }
  .page { max-width:480px; margin:0 auto; padding:24px 16px; }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; text-align:center; padding:40px 24px; }
  .empty-state .icon { font-size:64px; margin-bottom:16px; }
  .empty-state h2 { font-size:18px; color:#1F2937; margin-bottom:8px; }
  .empty-state p { font-size:14px; color:#9CA3AF; margin-bottom:24px; line-height:1.6; }
  .btn { padding:12px 32px; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-primary { background:#F59E0B; color:#fff; }
  .states-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:32px; }
  .state-card { background:#fff; border-radius:12px; padding:20px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .state-card .icon { font-size:32px; }
  .state-card .title { font-size:13px; color:#6B7280; margin-top:4px; }

  /* Loading skeleton */
  .skeleton { margin-top:32px; width:100%; }
  .skeleton .row { display:flex; gap:12px; margin-bottom:12px; align-items:center; }
  .skeleton .circle { width:44px; height:44px; border-radius:50%; background:#E5E7EB; }
  .skeleton .line { flex:1; height:14px; background:#E5E7EB; border-radius:4px; }
  .skeleton .line.short { flex:0.5; }
</style>
</head>
<body>
<div class="page">
  <!-- Empty: No records -->
  <div class="empty-state">
    <div class="icon">📭</div>
    <h2>还没有记账记录</h2>
    <p>开始记录你的第一笔收支吧<br>每一笔小钱都值得被看见 ✨</p>
    <button class="btn btn-primary">📝 记第一笔</button>
  </div>

  <div class="states-grid">
    <div class="state-card">
      <div class="icon">🔍</div>
      <div class="title">搜索无结果</div>
    </div>
    <div class="state-card">
      <div class="icon">🚫</div>
      <div class="title">网络错误</div>
    </div>
    <div class="state-card">
      <div class="icon">📅</div>
      <div class="title">该月无记录</div>
    </div>
    <div class="state-card">
      <div class="icon">🎯</div>
      <div class="title">无预算数据</div>
    </div>
  </div>

  <!-- Loading state -->
  <div class="skeleton" style="margin-top:32px;">
    <div style="font-size:13px; color:#9CA3AF; margin-bottom:12px;">加载中...</div>
    <div class="row"><div class="circle"></div><div class="line"></div><div class="line short"></div></div>
    <div class="row"><div class="circle"></div><div class="line"></div><div class="line short"></div></div>
    <div class="row"><div class="circle"></div><div class="line"></div><div class="line short"></div></div>
  </div>
</div>
</body>
</html>
