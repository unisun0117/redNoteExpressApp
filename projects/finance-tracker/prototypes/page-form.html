<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>金橘记账 - 记一笔</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#FFF8F0; }
  .page { max-width:480px; margin:0 auto; padding:24px 16px; }
  .header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
  .header a { font-size:20px; text-decoration:none; color:#1F2937; transition:transform .2s; }
  .header a:hover { transform:translateX(-2px); }
  .header h1 { font-size:20px; color:#1F2937; }
  .type-switch { display:flex; background:#fff; border-radius:12px; padding:4px; margin-bottom:24px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .type-btn { flex:1; padding:10px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; background:transparent; color:#9CA3AF; transition:all .2s; }
  .type-btn:hover { background:#F9FAFB; }
  .type-btn.active.expense-tab { background:#FEE2E2; color:#EF4444; }
  .type-btn.active.income-tab { background:#D1FAE5; color:#10B981; }
  .form-group { margin-bottom:20px; }
  .form-label { font-size:13px; color:#6B7280; font-weight:500; margin-bottom:6px; display:block; }
  .amount-input-wrap { display:flex; align-items:center; gap:8px; background:#fff; border:2px solid #F3E8DC; border-radius:12px; padding:8px 16px; transition:border-color .2s, box-shadow .2s; }
  .amount-input-wrap:focus-within { border-color:#F59E0B; box-shadow:0 0 0 3px rgba(245,158,11,.1); }
  .amount-input-wrap .currency { font-size:24px; color:#F59E0B; font-weight:600; }
  .amount-input-wrap input { flex:1; border:none; font-size:28px; font-weight:700; color:#1F2937; outline:none; width:100%; background:transparent; padding:8px 0; }
  .amount-input-wrap input::placeholder { color:#D1D5DB; }
  .category-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; }
  .cat-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:12px 8px; background:#fff; border:2px solid transparent; border-radius:12px; cursor:pointer; font-size:12px; color:#6B7280; transition:all .15s; }
  .cat-item:hover { background:#FFFDF7; transform:translateY(-1px); }
  .cat-item.selected { border-color:#F59E0B; background:#FEF3C7; transform:scale(1.02); }
  .cat-item .emoji { font-size:28px; transition:transform .2s; }
  .cat-item:hover .emoji { transform:scale(1.15); }
  .date-input { width:100%; padding:12px 16px; border:1px solid #F3E8DC; border-radius:10px; font-size:15px; background:#fff; outline:none; transition:border-color .2s, box-shadow .2s; }
  .date-input:focus { border-color:#F59E0B; box-shadow:0 0 0 3px rgba(245,158,11,.1); }
  .note-input { width:100%; padding:12px 16px; border:1px solid #F3E8DC; border-radius:10px; font-size:15px; background:#fff; outline:none; transition:border-color .2s, box-shadow .2s; }
  .note-input:focus { border-color:#F59E0B; box-shadow:0 0 0 3px rgba(245,158,11,.1); }
  .btn-row { display:flex; gap:12px; margin-top:24px; }
  .btn { flex:1; padding:16px; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; transition:all .2s; }
  .btn-save { background:#F59E0B; color:#fff; }
  .btn-save:hover { background:#D97706; transform:translateY(-1px); box-shadow:0 4px 12px rgba(245,158,11,.3); }
  .btn-save:active { transform:translateY(0); }
  .btn-delete { background:#fff; color:#EF4444; border:1px solid #FEE2E2; }
  .btn-delete:hover { background:#FEF2F2; }
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1F2937; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <a href="page-dashboard.html">←</a>
    <h1>记一笔</h1>
  </div>

  <div class="type-switch" id="type-switch">
    <button class="type-btn active expense-tab" onclick="switchType('expense')">🔴 支出</button>
    <button class="type-btn income-tab" onclick="switchType('income')">🟢 收入</button>
  </div>

  <div class="form-group">
    <label class="form-label">金额</label>
    <div class="amount-input-wrap">
      <span class="currency">¥</span>
      <input type="number" placeholder="0.00" value="32.00" id="amount">
    </div>
  </div>

  <div class="form-group" id="cat-group">
    <label class="form-label">分类</label>
    <div class="category-grid" id="expense-cats">
      <div class="cat-item selected" onclick="selectCat(this)"><span class="emoji">🍽️</span>餐饮</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">🚇</span>交通</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">🛍️</span>购物</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">🎬</span>娱乐</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">🏠</span>住房</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">💊</span>医疗</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">📚</span>教育</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">📌</span>其他</div>
    </div>
    <div class="category-grid" id="income-cats" style="display:none">
      <div class="cat-item selected" onclick="selectCat(this)"><span class="emoji">💰</span>工资</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">🧧</span>红包</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">📈</span>理财</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">🎁</span>礼物</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">💼</span>兼职</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">↩️</span>退款</div>
      <div class="cat-item" onclick="selectCat(this)"><span class="emoji">📌</span>其他</div>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">日期</label>
    <input class="date-input" type="date" value="2026-06-29">
  </div>

  <div class="form-group">
    <label class="form-label">备注（可选）</label>
    <input class="note-input" type="text" placeholder="写点什么..." value="午餐 - 黄焖鸡">
  </div>

  <div class="btn-row">
    <button class="btn btn-save" onclick="saveTx()">✓ 保存</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function switchType(type) {
  const btns = document.querySelectorAll('#type-switch .type-btn');
  btns.forEach(b => b.classList.remove('active', 'expense-tab', 'income-tab'));
  if (type === 'expense') {
    btns[0].classList.add('active', 'expense-tab');
    document.getElementById('expense-cats').style.display = 'grid';
    document.getElementById('income-cats').style.display = 'none';
  } else {
    btns[1].classList.add('active', 'income-tab');
    document.getElementById('expense-cats').style.display = 'none';
    document.getElementById('income-cats').style.display = 'grid';
  }
}
function selectCat(el) {
  el.parentElement.querySelectorAll('.cat-item').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}
function saveTx() {
  showToast('保存成功！');
  setTimeout(() => { window.location.href = 'page-dashboard.html'; }, 500);
}
</script>
</body>
</html>
