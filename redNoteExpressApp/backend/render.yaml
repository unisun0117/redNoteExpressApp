services:
  - type: web
    name: rednote-express-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rednote-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_APP.vercel.app
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: rednote-db
    plan: free
