<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>企源通 — 供应商管理系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap');

:root {
  --bg:#f7f8fa; --card:#fff; --border:#e2e6eb; --text:#1e293b; --muted:#94a3b8;
  --steel:#475569; --steel-dark:#334155; --steel-light:#f1f5f9;
  --emerald:#0f766e; --emerald-light:#ccfbf1;
  --success:#10b981; --warn:#f59e0b; --danger:#ef4444;
  --radius:12px; --shadow:0 1px 2px rgba(0,0,0,.03); --shadow-lg:0 6px 20px rgba(51,65,85,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}

.app{display:flex;min-height:100vh;}
.sidebar{width:210px;background:var(--steel-dark);flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;z-index:10;}
.side-logo{padding:18px 16px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;color:#fff;border-bottom:1px solid rgba(255,255,255,.08);}
.side-logo span{width:30px;height:30px;background:var(--emerald);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0;font-weight:800;}
.nav-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px;padding:14px 16px 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:2px 10px;border-radius:7px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 20px);text-align:left;}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600;}
.nav-item svg{width:15px;height:15px;flex-shrink:0;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:5;}
.top-title{font-size:14px;font-weight:600;color:var(--steel-dark);}
.top-sub{font-size:10px;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:.4px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--steel);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;}
.content{padding:20px 24px;flex:1;overflow-y:auto;}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);transition:box-shadow .25s;}
.card:hover{box-shadow:var(--shadow-lg);}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-hd h3{font-size:13px;font-weight:600;color:var(--steel-dark);}

.btn{font-size:11px;font-weight:500;padding:6px 12px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:var(--steel);color:#fff;}
.btn-p:hover{background:var(--steel-dark);}
.btn-e{background:var(--emerald);color:#fff;}
.btn-e:hover{background:#115e59;}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{background:#f8fafc;}
.inp{font-size:12px;padding:6px 10px;border-radius:7px;border:1px solid var(--border);outline:none;background:#f8fafc;transition:border-color .15s;}
.inp:focus{border-color:#94a3b8;background:#fff;}

.pil{display:inline-flex;align-items:center;padding:2px 8px;border-radius:11px;font-size:10px;font-weight:600;gap:3px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:2px solid #e2e6eb;}
.tbl td{padding:10px;font-size:12px;color:var(--steel-dark);border-bottom:1px solid #f1f5f9;}
.tbl tbody tr:hover td{background:#f8fafc;}

@media(max-width:768px){.sidebar{display:none;}.content{padding:10px;}}

/* Layout 1: 工作台 - Newspaper (大头条 + 三栏) */
.newspaper-hero{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px;}
.hero-main{background:linear-gradient(135deg,#334155 0%,#475569 50%,#0f766e 100%);border-radius:14px;padding:28px 30px;color:#fff;position:relative;overflow:hidden;}
.hero-main::after{content:'';position:absolute;right:-30px;bottom:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04);}
.hero-side{display:flex;flex-direction:column;gap:14px;}
.hero-mini{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;gap:12px;}
.news-col3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.news-bottom{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* Layout 2: 供应商 - Split Panel */
.split-panel{display:grid;grid-template-columns:280px 1fr;gap:14px;height:calc(100vh - 140px);}
.supplier-list{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow-y:auto;}
.supplier-list-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .12s;display:flex;align-items:center;gap:10px;}
.supplier-list-item:hover,.supplier-list-item.active{background:var(--steel-light);}
.supplier-list-item .idx{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.supplier-detail{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:20px;overflow-y:auto;}
.detail-tabs{display:flex;gap:0;border-bottom:2px solid #e2e6eb;margin-bottom:16px;}
.detail-tab{padding:8px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s;}
.detail-tab.active{color:var(--steel-dark);border-bottom-color:var(--emerald);font-weight:600;}

/* Layout 3: 采购订单 - Status Pipeline */
.pipeline{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;}
.pipeline-stage{flex:1;min-width:200px;background:#f1f5f9;border-radius:10px;padding:12px;}
.pipeline-stage .stage-hd{font-size:12px;font-weight:700;color:var(--steel-dark);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #e2e6eb;display:flex;align-items:center;gap:6px;}
.pipeline-card{background:var(--card);border-radius:8px;padding:12px;margin-bottom:6px;box-shadow:0 1px 2px rgba(0,0,0,.02);border:1px solid var(--border);cursor:pointer;font-size:12px;}
.pipeline-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.05);}

/* Layout 4: 合同管理 - Expiration Timeline */
.contract-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.contract-hero-card{border-radius:12px;padding:20px;color:#fff;position:relative;overflow:hidden;min-height:110px;}
.contract-hero-card::after{content:'';position:absolute;right:-15px;bottom:-15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06);}
.expire-timeline{display:flex;gap:10px;overflow-x:auto;padding:8px 0;}
.expire-card{min-width:200px;background:var(--card);border-radius:10px;border:1px solid var(--border);padding:14px;flex-shrink:0;border-left:4px solid #e2e6eb;}
.expire-card.urgent{border-left-color:var(--danger);background:#fef2f2;}
.expire-card.warning{border-left-color:var(--warn);background:#fffbeb;}
.expire-card.normal{border-left-color:var(--success);}

/* Layout 5: 质量管理 - Scorecard Matrix */
.scorecard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.scorecard{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:20px;text-align:center;}
.scorecard .grade{font-size:48px;font-weight:900;line-height:1;}
.scorecard .supplier-name{font-size:14px;font-weight:600;color:var(--steel-dark);margin-top:4px;}
.score-matrix{display:grid;grid-template-columns:auto repeat(5,1fr);gap:1px;background:#e2e6eb;border:1px solid #e2e6eb;border-radius:8px;overflow:hidden;}
.mx-hd{background:var(--steel-light);padding:8px;font-size:10px;font-weight:700;color:var(--steel);text-align:center;}
.mx-cell{background:var(--card);padding:8px;text-align:center;font-size:11px;font-weight:500;}

/* Layout 6: 应付账款 - Waterfall + Aging */
.aging-buckets{display:flex;gap:10px;margin-bottom:14px;}
.aging-bucket{flex:1;background:var(--card);border-radius:10px;border:1px solid var(--border);padding:16px;text-align:center;}
.aging-bucket .amount{font-size:24px;font-weight:800;color:var(--steel-dark);}
.aging-bucket .period{font-size:10px;color:var(--muted);margin-top:2px;}
.aging-bucket.overdue{border-color:var(--danger);background:#fef2f2;}
.aging-bucket.overdue .amount{color:var(--danger);}
.waterfall-grid{display:grid;grid-template-columns:auto repeat(6,1fr);gap:2px;}
.wf-row{display:contents;}
.wf-cell{background:var(--card);padding:10px;text-align:center;font-size:11px;border:1px solid #f1f5f9;}
.wf-label{font-weight:500;text-align:left;}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="side-logo"><span>企</span>企源通</div>
    <div class="nav-sec">核心业务</div>
    <button class="nav-item active" data-pg="dash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>工作台</button>

  </aside>

  <div class="main">

      <div><span class="top-sub" id="bc">工作台 / 概览</span><span class="top-title" id="pt">工作台</span></div>

<script>
var P = {dash:'工作台',supplier:'供应商管理',po:'采购订单',contract:'合同管理',quality:'质量管理',payable:'应付账款',set:'系统设置'};

h+='<div class="newspaper-hero">';

h+='<div class="hero-mini"><div style="width:40px;height:40px;border-radius:10px;background:#fef3c7;display:flex;align-items:center;justify-content:center;font-size:18px;">⚠️</div><div><div style="font-size:22px;font-weight:800;color:#b45309;">8</div><div style="font-size:10px;color:var(--muted);">需跟进异常</div></div></div>';

// ===== PAGE 2: 供应商管理 - Split Panel =====
function pgSupplier(){var h='';
h+='<div class="split-panel">';
h+='<div class="supplier-list" id="s2list"></div>';
h+='<div class="supplier-detail" id="s2detail"><div style="text-align:center;padding:40px;color:var(--muted);">👈 选择供应商查看详情</div></div>';

}

// ===== PAGE 3: 采购订单 - Status Pipeline =====
function pgPO(){var h='';

// ===== PAGE 6: 应付账款 - Aging Waterfall =====

// ===== PAGE 7: 系统设置 =====

setInterval(function(){
  var n=new Date();var w=['日','一','二','三','四','五','六'];

function bar(el,vals,lbs,h,mx,c1,c2){

}
