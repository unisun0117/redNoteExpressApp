<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>旅悦会 — 会员管理系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap');

:root {
  --bg:#fafaf9; --card:#fff; --border:#e8e4e0; --text:#1c1917; --muted:#a8a29e;
  --teal:#0d9488; --teal-dark:#0f766e; --teal-light:#ccfbf1;
  --coral:#f97316; --coral-light:#fff7ed;
  --success:#10b981; --warn:#f59e0b; --danger:#ef4444; --violet:#8b5cf6;
  --radius:14px; --shadow:0 1px 3px rgba(0,0,0,.04); --shadow-lg:0 10px 30px rgba(15,118,110,.06),0 3px 8px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d6d3d1;border-radius:2px;}

.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:#fff;border-right:1px solid var(--border);flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;z-index:10;}
.side-logo{padding:18px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:var(--teal-dark);border-bottom:1px solid #f5f5f4;}
.side-logo span{width:32px;height:32px;background:linear-gradient(135deg,var(--teal),var(--coral));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0;}
.nav-sec{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:14px 18px 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:2px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 20px);text-align:left;}
.nav-item:hover{background:#f5f5f4;color:#44403c;}
.nav-item.active{background:var(--teal-light);color:var(--teal-dark);font-weight:600;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:5;}
.top-title{font-size:14px;font-weight:600;color:var(--teal-dark);}
.top-sub{font-size:10px;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:.4px;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--coral));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;}

.content{padding:20px 24px;flex:1;overflow-y:auto;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);transition:box-shadow .25s,transform .25s;}
.card:hover{box-shadow:var(--shadow-lg);}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-hd h3{font-size:13px;font-weight:600;color:#44403c;display:flex;align-items:center;gap:7px;}
.card-hd h3::before{content:'';width:3px;height:12px;border-radius:2px;flex-shrink:0;background:var(--teal);}

.btn{font-size:11px;font-weight:500;padding:6px 12px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:var(--teal);color:#fff;}
.btn-p:hover{background:var(--teal-dark);}
.btn-c{background:var(--coral);color:#fff;}
.btn-c:hover{background:#ea580c;}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{background:#fafaf9;}
.inp{font-size:12px;padding:6px 10px;border-radius:7px;border:1px solid var(--border);outline:none;background:#fafaf9;transition:border-color .15s;}
.inp:focus{border-color:#5eead4;background:#fff;}

.pil{display:inline-flex;align-items:center;padding:3px 9px;border-radius:13px;font-size:11px;font-weight:600;gap:3px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:2px solid #e7e5e4;}
.tbl td{padding:10px;font-size:12px;color:#44403c;border-bottom:1px solid #f5f5f4;}
.tbl tbody tr:hover td{background:#fafaf9;}

@media(max-width:768px){.sidebar{display:none;}.content{padding:12px;}}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="side-logo"><span>旅</span>旅悦会</div>
    <div class="nav-sec">会员管理</div>
    <button class="nav-item active" data-pg="dash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>工作台</button>
    <button class="nav-item" data-pg="members"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>会员管理</button>
    <button class="nav-item" data-pg="points"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>积分管理</button>
    <button class="nav-item" data-pg="tx"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>消费记录</button>
    <div class="nav-sec">运营</div>
    <button class="nav-item" data-pg="benefits"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>权益管理</button>
    <button class="nav-item" data-pg="events"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>活动管理</button>
    <div class="nav-sec">系统</div>
    <button class="nav-item" data-pg="set"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>系统设置</button>
  </aside>

  <div class="main">
    <header class="topbar">
      <div><span class="top-sub" id="bc">工作台 / 概览</span><span class="top-title" id="pt">工作台</span></div>
      <div style="display:flex;align-items:center;gap:12px;"><span style="font-size:11px;color:var(--muted);" id="clock">2026-07-01</span><div class="avatar">林</div></div>
    </header>
    <div class="content" id="ct"></div>
  </div>
</div>

<script>
const P = {dash:'工作台',members:'会员管理',points:'积分管理',tx:'消费记录',benefits:'权益管理',events:'活动管理',set:'系统设置'};

// ====== PAGE 1: 工作台 — 欢迎横幅 + 非对称网格 ======
function pageDash(){return`
<div style="background:linear-gradient(135deg, #0f766e 0%, #0d9488 40%, #f97316 100%);border-radius:16px;padding:28px 32px;color:#fff;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;">
  <div style="position:absolute;right:-20px;bottom:-30px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none;"></div>
  <div style="position:relative;z-index:1;"><h2 style="font-size:21px;font-weight:800;">欢迎回来，林经理 🌴</h2><div style="font-size:11px;opacity:.7;margin-top:3px;">旅悦会 · 今日活跃会员 486 人 · 本月新增 128 人</div></div>
  <div style="display:flex;gap:28px;position:relative;z-index:1;">
    <div style="text-align:center;"><div style="font-size:30px;font-weight:900;">38,520</div><div style="font-size:10px;opacity:.65;">会员总数</div></div>
    <div style="text-align:center;"><div style="font-size:30px;font-weight:900;">¥2,486<span style="font-size:16px;">万</span></div><div style="font-size:10px;opacity:.65;">本月消费总额</div></div>
    <div style="text-align:center;"><div style="font-size:30px;font-weight:900;">92.8<span style="font-size:16px;">%</span></div><div style="font-size:10px;opacity:.65;">活跃率</div></div>
  </div>
</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;">
  ${[{icon:'👤',bg:'var(--teal-light)',c:'var(--teal)',t:'添加会员',d:'注册新会员档案'},{icon:'⭐',bg:'var(--coral-light)',c:'var(--coral)',t:'积分兑换',d:'礼品兑换管理'},{icon:'📊',bg:'#ecfdf5',c:'var(--success)',t:'数据报表',d:'会员运营分析'},{icon:'🎯',bg:'#fef3c7',c:'var(--warn)',t:'营销活动',d:'创建促销活动'}].map(q=>`<div style="background:var(--card);border-radius:11px;border:1px solid var(--border);padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;" onmouseover="this.style.boxShadow='var(--shadow-lg)';this.style.transform='translateY(-2px)';" onmouseout="this.style.boxShadow='';this.style.transform='';"><div style="width:36px;height:36px;border-radius:9px;background:${q.bg};display:flex;align-items:center;justify-content:center;font-size:16px;">${q.icon}</div><div><div style="font-weight:600;font-size:12px;color:${q.c};">${q.t}</div><div style="font-size:10px;color:var(--muted);">${q.d}</div></div></div>`).join('')}
</div>
<div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;">
  <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>月度新增会员趋势</h3></div><div id="d1bars" style="display:flex;align-items:flex-end;gap:10px;height:180px;"></div></div>
  <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>待处理事项</h3></div><div id="d1todo"></div></div>
  <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>最新动态</h3></div><div id="d1feed"></div></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:14px;">
  <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>会员等级分布</h3></div><div id="d1tier"></div></div>
  <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>热门目的地 Top5</h3></div><div id="d1dest"></div></div>
  <div class="card" style="padding:16px 18px;"><div class="card-hd"><h3>业绩速览</h3></div><div id="d1kpi"></div></div>
</div>`;}

// ====== PAGE 2: 会员管理 — Bento Grid ======
function pageMembers(){return`
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;">
  ${[{icon:'👥',bg:'var(--teal-light)',c:'var(--teal)',n:'38,520',l:'会员总数',b:'↑ 8.2%',bc:'#ecfdf5 #059669'},{icon:'🆕',bg:'var(--coral-light)',c:'var(--coral)',n:'128',l:'本月新增',b:'↑ 15.3%',bc:'#ecfdf5 #059669'},{icon:'💎',bg:'#fef3c7',c:'#b45309',n:'2,480',l:'钻石会员',b:'消费>10万',bc:'#fef3c7 #b45309'},{icon:'⚠',bg:'#fef2f2',c:'var(--danger)',n:'86',l:'即将过期',b:'30天内到期',bc:'#fef2f2 #dc2626'}].map(m=>`<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;gap:12px;transition:box-shadow .2s;" onmouseover="this.style.boxShadow='var(--shadow-lg)'" onmouseout="this.style.boxShadow=''"><div style="width:40px;height:40px;border-radius:10px;background:${m.bg};display:flex;align-items:center;justify-content:center;font-size:17px;">${m.icon}</div><div><div style="font-size:24px;font-weight:800;color:var(--text);">${m.n}</div><div style="font-size:11px;color:var(--muted);">${m.l}</div><span class="pil" style="background:${m.bc.split(' ')[0]};color:${m.bc.split(' ')[1]};margin-top:3px;display:inline-flex;">${m.b}</span></div></div>`).join('')}
</div>
<div style="display:grid;grid-template-columns:6fr 6fr;gap:14px;margin-bottom:14px;">
  <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>会员等级分布</h3></div><div id="m2tier"></div></div>
  <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>会员增长趋势</h3></div><div id="m2growth" style="display:flex;align-items:flex-end;gap:10px;height:160px;"></div></div>
</div>
<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;">
  <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;"><input class="inp" placeholder="🔍 搜索会员姓名/手机号..." style="width:200px;"><select class="inp"><option>全部等级</option><option>钻石会员</option><option>金卡会员</option><option>银卡会员</option><option>普通会员</option></select><select class="inp"><option>全部状态</option><option>活跃</option><option>休眠</option><option>即将过期</option></select><button class="btn btn-p">查询</button><button class="btn btn-g" style="margin-left:auto;">📥 导出</button></div>
  <table class="tbl" style="margin:0;"><thead><tr><th>会员编号</th><th>姓名</th><th>等级</th><th>累计积分</th><th>累计消费(元)</th><th>注册日期</th><th>最近消费</th><th>状态</th><th>操作</th></tr></thead><tbody id="m2tbl"></tbody></table>
  <div style="display:flex;justify-content:space-between;padding:10px 16px;font-size:11px;color:var(--muted);border-top:1px solid #f5f5f4;"><span>共 <b style="color:var(--text);">38,520</b> 条</span><div style="display:flex;gap:2px;">${['‹','1','2','3','…','1284','›'].map(p=>`<button style="padding:2px 7px;border-radius:5px;border:1px solid var(--border);background:${p==='1'?'var(--teal)':'#fff'};color:${p==='1'?'#fff':'#64748b'};font-size:10px;font-weight:600;cursor:pointer;">${p}</button>`).join('')}</div></div>
</div>`;}

// ====== PAGE 3: 积分管理 — KPI Hero + 图表 ======
function pagePoints(){return`
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;">
  ${[{bg:'linear-gradient(135deg,#0f766e,#0d9488)',n:'2,486万',l:'流通总积分',sub:'↑ 12.5%'},{bg:'linear-gradient(135deg,#f97316,#fb923c)',n:'358万',l:'本月发放',sub:'↑ 18.2%'},{bg:'linear-gradient(135deg,#059669,#10b981)',n:'186万',l:'本月兑换',sub:'兑换率 52%'},{bg:'linear-gradient(135deg,#7c3aed,#8b5cf6)',n:'865万',l:'即将过期',sub:'30天内'}].map(k=>`<div style="background:${k.bg};border-radius:14px;padding:22px 20px;color:#fff;position:relative;overflow:hidden;min-height:110px;"><div style="position:absolute;right:-20px;bottom:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.06);"></div><div style="position:relative;z-index:1;"><div style="font-size:28px;font-weight:900;">${k.n}</div><div style="font-size:11px;opacity:.75;">${k.l}</div><div style="font-size:10px;opacity:.6;margin-top:2px;">${k.sub}</div></div></div>`).join('')}
</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;">
  <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>积分获取渠道占比</h3></div><div id="p3channel"></div></div>
  <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>月度积分流水</h3></div><div id="p3flow" style="display:flex;align-items:flex-end;gap:10px;height:160px;"></div></div>
  <div class="card" style="padding:18px 20px;"><div class="card-hd"><h3>热门兑换礼品 Top5</h3></div><div id="p3gift"></div></div>
</div>
<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;">
  <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;"><span style="font-size:13px;font-weight:600;color:#44403c;">积分明细流水</span><button class="btn btn-g" style="margin-left:auto;">导出</button></div>
  <table class="tbl" style="margin:0;"><thead><tr><th>流水号</th><th>会员</th><th>类型</th><th>积分变动</th><th>余额</th><th>来源/兑换</th><th>时间</th><th>操作人</th></tr></thead><tbody id="p3log"></tbody></table>
</div>`;}

// ====== PAGE 4: 消费记录 — 筛选+全宽表 ======
function pageTx(){return`
<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 18px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;"><input class="inp" placeholder="🔍 订单号/会员姓名..." style="width:200px;"><select class="inp"><option>全部类型</option><option>酒店</option><option>机票</option><option>度假套餐</option><option>景点门票</option><option>租车</option></select><select class="inp"><option>全部渠道</option><option>APP</option><option>小程序</option><option>官网</option><option>门店</option></select><input class="inp" type="date" value="2026-06-01"><span style="font-size:11px;color:var(--muted);">至</span><input class="inp" type="date" value="2026-07-01"><button class="btn btn-p">查询</button><button class="btn btn-c">导出</button></div>
<div style="background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;">
  <table class="tbl" style="margin:0;"><thead><tr><th>订单编号</th><th>会员</th><th>消费类型</th><th>金额(元)</th><th>获得积分</th><th>目的地/产品</th><th>出行日期</th><th>渠道</th><th>状态</th></tr></thead><tbody id="t4body"></tbody></table>
  <div style="display:flex;justify-content:space-between;padding:10px 16px;font-size:11px;color:var(--muted);border-top:1px solid #f5f5f4;"><span>共 <b style="color:var(--text);">12,486</b> 笔</span><div style="display:flex;gap:2px;">${['‹','1','2','3','…','416','›'].map(p=>`<button style="padding:2px 7px;border-radius:5px;border:1px solid var(--border);background:${p==='1'?'var(--teal)':'#fff'};color:${p==='1'?'#fff':'#64748b'};font-size:10px;font-weight:600;cursor:pointer;">${p}</button>`).join('')}</div></div>
